<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced AED Risk Calculator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

h1{
  margin-bottom:20px;
  color:#00ff99;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

.card{
  background:#111827;
  border-radius:12px;
  padding:20px;
  border:1px solid #1f2937;
}

label{
  display:block;
  margin-bottom:6px;
  color:#60a5fa;
  font-size:13px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

.mode{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.mode button{
  flex:1;
}

.active{
  background:#00aa66 !important;
}

.result{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

.result span{
  float:right;
  color:#00ff99;
}

.rr{
  text-align:center;
  font-size:35px;
  color:#00ff99;
  margin-top:25px;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 ADVANCED TRADE JOURNAL + AUTO RISK CALCULATOR</h1>

<div class="grid">

<div class="card">

<label>Account Balance (AED)</label>
<input type="number" id="balance" placeholder="10000">

<label>Entry Price</label>
<input type="number" id="entry" placeholder="1.10000" step="0.00001">

<label>Stop Loss Price</label>
<input type="number" id="sl" placeholder="1.09500" step="0.00001">

<label>Take Profit Price</label>
<input type="number" id="tp" placeholder="1.12000" step="0.00001">

<div class="mode">

<button id="riskBtn" class="active" onclick="setMode('risk')">
Risk %
</button>

<button id="lotBtn" onclick="setMode('lot')">
Lot Size
</button>

</div>

<div id="riskMode">

<label>Risk %</label>
<input type="number" id="riskPercent" placeholder="2">

</div>

<div id="lotMode" style="display:none;">

<label>Lot Size</label>
<input type="number" id="lotSize" placeholder="0.10" step="0.01">

</div>

<button onclick="calculate()">
CALCULATE
</button>

</div>

<div class="card">

<div class="result">
Account Balance
<span id="r_balance">0 AED</span>
</div>

<div class="result">
Risk Amount
<span id="r_risk">0 AED</span>
</div>

<div class="result">
Risk %
<span id="r_percent">0%</span>
</div>

<div class="result">
Lot Size
<span id="r_lot">0.00</span>
</div>

<div class="result">
SL Points
<span id="r_points">0</span>
</div>

<div class="result">
Potential Profit
<span id="r_profit">0 AED</span>
</div>

<div class="result">
Potential Loss
<span id="r_loss">0 AED</span>
</div>

<div class="rr" id="rr">
1 : 1
</div>

</div>

</div>

</div>

<script>

let mode = 'risk';

function setMode(type){

  mode = type;

  document.getElementById('riskBtn').classList.remove('active');
  document.getElementById('lotBtn').classList.remove('active');

  if(type === 'risk'){

    document.getElementById('riskBtn').classList.add('active');

    document.getElementById('riskMode').style.display = 'block';

    document.getElementById('lotMode').style.display = 'none';

  }else{

    document.getElementById('lotBtn').classList.add('active');

    document.getElementById('riskMode').style.display = 'none';

    document.getElementById('lotMode').style.display = 'block';
  }
}

function calculate(){

  const balance =
    parseFloat(document.getElementById('balance').value) || 0;

  const entry =
    parseFloat(document.getElementById('entry').value) || 0;

  const sl =
    parseFloat(document.getElementById('sl').value) || 0;

  const tp =
    parseFloat(document.getElementById('tp').value) || 0;

  if(!balance || !entry || !sl){

    alert('Fill all fields');

    return;
  }

  const slDistance =
    Math.abs(entry - sl);

  const slPoints =
    slDistance / 0.0001;

  let riskAED = 0;
  let riskPercent = 0;
  let lot = 0;

  // ===== RISK MODE =====

  if(mode === 'risk'){

    riskPercent =
      parseFloat(document.getElementById('riskPercent').value) || 0;

    if(!riskPercent){

      alert('Enter risk %');

      return;
    }

    riskAED =
      balance * (riskPercent / 100);

    lot =
      riskAED / (slDistance * 100000);

  }

  // ===== LOT SIZE MODE =====

  else{

    lot =
      parseFloat(document.getElementById('lotSize').value) || 0;

    if(!lot){

      alert('Enter lot size');

      return;
    }

    riskAED =
      slDistance * lot * 100000;

    riskPercent =
      (riskAED / balance) * 100;
  }

  // ===== TP =====

  let profitAED = 0;

  if(tp){

    const tpDistance =
      Math.abs(tp - entry);

    profitAED =
      tpDistance * lot * 100000;
  }

  // ===== RR =====

  const rr =
    riskAED > 0
      ? profitAED / riskAED
      : 0;

  // ===== DISPLAY =====

  document.getElementById('r_balance').innerHTML =
    balance.toFixed(2) + ' AED';

  document.getElementById('r_risk').innerHTML =
    riskAED.toFixed(2) + ' AED';

  document.getElementById('r_percent').innerHTML =
    riskPercent.toFixed(2) + '%';

  document.getElementById('r_lot').innerHTML =
    lot.toFixed(2);

  document.getElementById('r_points').innerHTML =
    slPoints.toFixed(1);

  document.getElementById('r_profit').innerHTML =
    profitAED.toFixed(2) + ' AED';

  document.getElementById('r_loss').innerHTML =
    riskAED.toFixed(2) + ' AED';

  document.getElementById('rr').innerHTML =
    '1 : ' + rr.toFixed(2);
}

</script>

</body>
</html>
