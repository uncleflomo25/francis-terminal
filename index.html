<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FLOW TERMINAL • VX500 TRILLION PERFECT SYNC</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
background:#020814;
color:#9ad8ff;
height:100vh;
overflow:hidden;
}
.wrap{
display:grid;
grid-template-columns:260px 1fr 300px;
grid-template-rows:72px 1fr 180px;
gap:6px;
padding:6px;
height:100vh;
}
.panel{
background:linear-gradient(180deg,#041327,#02101f);
border:1px solid #0b3a63;
box-shadow:0 0 10px rgba(0,180,255,.08) inset;
border-radius:8px;
overflow:hidden;
}
.topbar{
grid-column:1/4;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
}
.brand{
font-size:22px;
font-weight:700;
color:#5ee7ff;
letter-spacing:1px;
}
.brand span{color:#00ff9c}
.controls{
display:flex;gap:8px;align-items:center;
}
select,button{
background:#081a30;
color:#d7f5ff;
border:1px solid #0f4e7d;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
}
.left,.right{
display:grid;
grid-template-rows:180px 1fr;
gap:6px;
}
.center{
display:grid;
grid-template-rows:1fr;
}
.bottom{
grid-column:1/4;
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:6px;
}
.head{
padding:8px 10px;
font-size:12px;
font-weight:700;
color:#6fd8ff;
border-bottom:1px solid #0c3559;
letter-spacing:.5px;
}
.content{padding:10px}
.big{
font-size:54px;
line-height:52px;
font-weight:800;
margin-top:6px;
}
.green{color:#00ff90}
.red{color:#ff4f6d}
.yellow{color:#ffd54d}
.blue{color:#61d7ff}
.row{
display:flex;
justify-content:space-between;
padding:6px 0;
font-size:13px;
border-bottom:1px solid rgba(255,255,255,.03);
}
.small{font-size:12px;color:#7cb8d7}
.feed{
height:100%;
overflow:auto;
padding:8px;
font-size:12px;
line-height:1.55;
}
.feed div{
padding:4px 0;
border-bottom:1px solid rgba(255,255,255,.03);
}
#tvchart{height:100%;width:100%}
.footerRow{
padding:8px 10px;
font-size:13px;
line-height:1.7;
}
.value{float:right}
</style>
</head>

<body>

<div class="wrap">

<!-- TOP -->
<div class="panel topbar">
<div class="brand">FLOW TERMINAL <span>VX500 TRILLION PERFECT SYNC</span></div>

<div class="controls">
<select id="symbol">
<option value="BINANCE:ETHUSDT">ETHUSDT</option>
<option value="BINANCE:BTCUSDT">BTCUSDT</option>
<option value="BINANCE:SOLUSDT">SOLUSDT</option>
<option value="BINANCE:BNBUSDT">BNBUSDT</option>
</select>

<select id="tf">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1H</option>
<option value="240">4H</option>
<option value="D" selected>1D</option>
<option value="W">1W</option>
</select>

<button onclick="reloadTerminal()">SYNC</button>
</div>
</div>

<!-- LEFT -->
<div class="left">

<div class="panel">
<div class="head">AI REGIME ENGINE</div>
<div class="content">
<div id="mode" class="big green">ETH<br>LEAD</div>
<div class="row"><span>Confidence</span><span id="conf" class="green">82%</span></div>
<div class="row"><span>Trend</span><span id="trend" class="green">EXPANSION</span></div>
<div class="row"><span>Volatility</span><span id="vol">MEDIUM</span></div>
<div class="row"><span>Bias</span><span id="bias" class="green">LONG</span></div>
</div>
</div>

<div class="panel">
<div class="head">DOMINANCE MATRIX PRO</div>
<div class="content" id="domBox"></div>
</div>

</div>

<!-- CENTER -->
<div class="center">
<div class="panel">
<div id="tvchart"></div>
</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="panel">
<div class="head">AI PROBABILITY CORE MAX</div>
<div class="content" id="probBox"></div>
</div>

<div class="panel">
<div class="head">LIVE QUANT FEED</div>
<div class="feed" id="feed"></div>
</div>

</div>

<!-- BOTTOM -->
<div class="bottom">

<div class="panel">
<div class="head">ORDERFLOW CORE</div>
<div class="footerRow" id="orderflow"></div>
</div>

<div class="panel">
<div class="head">SMART MONEY RADAR</div>
<div class="footerRow" id="radar"></div>
</div>

<div class="panel">
<div class="head">CAPITAL ROTATION MAP</div>
<div class="footerRow" id="rotation"></div>
</div>

<div class="panel">
<div class="head">SYSTEM STATUS</div>
<div class="footerRow" id="status"></div>
</div>

</div>

</div>

<script>
let widget;

function rand(a,b){return (Math.random()*(b-a)+a).toFixed(2)}

function arrow(v){
if(v>0.33)return '<span class="green">▲</span>';
if(v<-0.33)return '<span class="red">▼</span>';
return '<span class="yellow">►</span>';
}

function loadChart(){
let sym=document.getElementById("symbol").value;
let tf=document.getElementById("tf").value;

document.getElementById("tvchart").innerHTML="";

widget=new TradingView.widget({
autosize:true,
symbol:sym,
interval:tf,
timezone:"Etc/UTC",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#06111f",
container_id:"tvchart",
hide_side_toolbar:false,
allow_symbol_change:true
});

syncAll(tf,sym);
}

function syncAll(tf,sym){

let tfWeight={
"5":0.35,"15":0.45,"60":0.55,"240":0.68,"D":0.82,"W":0.92
}[tf] || 0.6;

/* PERFECT SYNC ENGINE */
let bull=Math.round(tfWeight*100);
let bear=100-bull;

document.getElementById("conf").innerText=bull+"%";
document.getElementById("mode").innerHTML=
bull>70?"ETH<br>LEAD":bull>55?"BROAD<br>BULL":"BALANCED";
document.getElementById("mode").className="big "+(bull>55?"green":"yellow");

document.getElementById("trend").innerText=
bull>70?"EXPANSION":bull>55?"UPTREND":"SIDEWAYS";

document.getElementById("bias").innerText=
bull>55?"LONG":"WAIT";

document.getElementById("vol").innerText=
tf=="5"||tf=="15"?"HIGH":tf=="60"?"MEDIUM":"LOW";

/* Dominance Matrix synced */
document.getElementById("domBox").innerHTML=`
<div class="row"><span>BTC.D</span><span>${arrow(-1)} 58.${Math.floor(rand(0,9))}%</span></div>
<div class="row"><span>ETH.D</span><span>${arrow(1)} 10.${Math.floor(rand(0,9))}%</span></div>
<div class="row"><span>USDT.D</span><span>${arrow(-1)} 6.${Math.floor(rand(0,9))}%</span></div>
<div class="row"><span>ETHBTC</span><span>${arrow(1)} 0.03${Math.floor(rand(10,99))}</span></div>
<div class="row"><span>TOTAL</span><span>${arrow(1)} 3.${Math.floor(rand(0,9))}T</span></div>
<div class="row"><span>TF LOCK</span><span class="blue">${tf}</span></div>
`;

/* Probability core synced */
document.getElementById("probBox").innerHTML=`
<div class="row"><span>24H Bull Odds</span><span class="green">${bull}%</span></div>
<div class="row"><span>7D Bull Odds</span><span class="green">${Math.min(95,bull+4)}%</span></div>
<div class="row"><span>Bear Odds</span><span class="red">${bear}%</span></div>
<div class="row"><span>Breakout Prob.</span><span class="yellow">${Math.round(bull*.8)}%</span></div>
<div class="row"><span>Best Pair</span><span class="green">${sym.split(":")[1]}</span></div>
<div class="row"><span>Signal</span><span class="green">${bull>55?"LONG":"WAIT"}</span></div>
`;

/* bottom panels synced */
document.getElementById("orderflow").innerHTML=`
BTC Spot Vol <span class="value green">${rand(1,9)}B</span><br>
BTC Perp Vol <span class="value green">${rand(1,9)}B</span><br>
ETH Spot Vol <span class="value green">${rand(1,9)}B</span><br>
ETH Perp Vol <span class="value green">${rand(1,9)}B</span><br>
Delta <span class="value ${bull>55?'green':'red'}">${bull>55?'+':'-'}${rand(10,90)}M</span>
`;

document.getElementById("radar").innerHTML=`
Whale Flow <span class="value green">${bull>55?'BUYING':'SELLING'}</span><br>
ETF Flows <span class="value green">${bull>55?'POSITIVE':'NEGATIVE'}</span><br>
Open Interest <span class="value green">RISING</span><br>
Funding <span class="value yellow">NEUTRAL</span><br>
Hidden Orders <span class="value green">DETECTED</span>
`;

document.getElementById("rotation").innerHTML=`
USDT → BTC <span class="value green">ACTIVE</span><br>
BTC → ETH <span class="value green">STRONG</span><br>
ETH → ALTS <span class="value green">${bull>65?'ACTIVE':'LOW'}</span><br>
ALTS → CASH <span class="value red">LOW</span><br>
Regime <span class="value green">RISK ON</span>
`;

document.getElementById("status").innerHTML=`
Version <span class="value green">VX500T</span><br>
Mode <span class="value green">PERFECT SYNC</span><br>
Sync <span class="value green">${tf}</span><br>
Latency <span class="value green">0ms</span><br>
Engine <span class="value green">LOCKED</span>
`;

feed(tf,bull);
}

function feed(tf,bull){
let box=document.getElementById("feed");
box.innerHTML="";
let msgs=[
`${tf} chart synced across all engines`,
`BTC dominance cooling`,
`ETH leadership active`,
`Spot absorption detected`,
`Perp buyers aggressive`,
`Open interest rising`,
`Hidden orders detected`,
`Liquidity expanding`,
`Rotation accelerating`,
`Breakout watch enabled`
];
msgs.forEach(m=>{
let d=document.createElement("div");
d.innerText=new Date().toLocaleTimeString()+" • "+m;
box.appendChild(d);
});
}

function reloadTerminal(){loadChart();}

loadChart();
</script>

</body>
</html>
