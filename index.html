<!-- ===================================================== -->
<!-- AUTO RISK CALCULATION BASED ON LOT SIZE -->
<!-- ===================================================== -->

<!-- REPLACE THIS OLD INPUT -->

<div class="form-group">
  <label>Risk Amount (AED)</label>
  <input 
    type="number"
    id="riskAEDInput"
    placeholder="e.g., 500 AED"
    step="1"
    onchange="calculateLotSize()"
  />
</div>

<!-- ===================================================== -->
<!-- WITH THIS NEW AUTO RISK DISPLAY -->
<!-- ===================================================== -->

<div class="form-group">
  <label>Lot Size</label>
  <input
    type="number"
    id="lotSize"
    placeholder="e.g. 0.10"
    step="0.01"
    onchange="calculateLotSize()"
  />
</div>

<div class="form-group">
  <label class="auto-label">🔄 Auto Risk Amount (AED)</label>
  <input
    type="number"
    id="riskAEDInput"
    readonly
    class="auto-calculated-field"
    placeholder="Auto Calculated"
  />
</div>

<script>

// =====================================================
// FULL AUTO RISK CALCULATION BASED ON LOT SIZE
// =====================================================

function calculateLotSize() {

  // =========================================
  // INPUTS
  // =========================================

  const balance =
    parseFloat(document.getElementById('accountBalance').value) || 0;

  const entryPrice =
    parseFloat(document.getElementById('entryPrice').value) || 0;

  const lotSize =
    parseFloat(document.getElementById('lotSize').value) || 0;

  let slPrice = 0;

  // =========================================
  // SL METHOD
  // =========================================

  if (slMethod === 'manual') {

    slPrice =
      parseFloat(document.getElementById('slPriceManual').value) || 0;

  } else if (slMethod === 'points') {

    slPrice =
      parseFloat(document.getElementById('slPriceAuto').value) || 0;

  } else if (slMethod === 'lotsize') {

    slPrice =
      parseFloat(document.getElementById('slPriceLotAuto').value) || 0;
  }

  const tpPrice =
    parseFloat(document.getElementById('tpPrice').value) ||
    parseFloat(document.getElementById('tpPriceAuto').value) || 0;

  // =========================================
  // DISPLAY BALANCE
  // =========================================

  document.getElementById('displayBalance').textContent =
    balance.toFixed(2) + ' AED';

  // =========================================
  // VALIDATION
  // =========================================

  if (!entryPrice || !slPrice || !lotSize) {
    return;
  }

  // =========================================
  // STOP LOSS POINTS
  // =========================================

  const slPoints =
    Math.abs((entryPrice - slPrice) / 0.0001);

  document.getElementById('slPointsDisplay').textContent =
    slPoints.toFixed(0) + ' pts';

  document.getElementById('slPriceDisplay').textContent =
    slPrice.toFixed(4);

  // =========================================
  // AUTO RISK CALCULATION
  // =========================================

  const riskAED =
    (slPoints * 0.0001 * lotSize * 100000);

  const riskUSD =
    riskAED / exchangeRate;

  // =========================================
  // DISPLAY AUTO RISK
  // =========================================

  document.getElementById('riskAEDInput').value =
    riskAED.toFixed(2);

  document.getElementById('riskAmountAED').textContent =
    riskAED.toFixed(2) + ' AED';

  document.getElementById('riskAmountUSD').textContent =
    riskUSD.toFixed(2) + ' USD';

  document.getElementById('riskMetric').textContent =
    riskAED.toFixed(0);

  // =========================================
  // DISPLAY LOT SIZE
  // =========================================

  document.getElementById('calculatedLotSize').textContent =
    lotSize.toFixed(2);

  // =========================================
  // POTENTIAL LOSS
  // =========================================

  document.getElementById('potentialLossAED').textContent =
    riskAED.toFixed(2) + ' AED';

  document.getElementById('potentialLossUSD').textContent =
    riskUSD.toFixed(2) + ' USD';

  // =========================================
  // TP CALCULATIONS
  // =========================================

  if (tpPrice > 0) {

    const tpPoints =
      Math.abs((tpPrice - entryPrice) / 0.0001);

    const potentialProfitAED =
      (tpPoints * 0.0001 * lotSize * 100000);

    const potentialProfitUSD =
      potentialProfitAED / exchangeRate;

    document.getElementById('tpPointsDisplay').textContent =
      tpPoints.toFixed(0) + ' pts';

    document.getElementById('tpPriceDisplay').textContent =
      tpPrice.toFixed(4);

    document.getElementById('potentialProfitAED').textContent =
      potentialProfitAED.toFixed(2) + ' AED';

    document.getElementById('potentialProfitUSD').textContent =
      potentialProfitUSD.toFixed(2) + ' USD';

    document.getElementById('rewardMetric').textContent =
      potentialProfitAED.toFixed(0);

    // =========================================
    // RR RATIO
    // =========================================

    const rrRatio =
      potentialProfitAED / riskAED;

    document.getElementById('rrRatio').textContent =
      '1:' + rrRatio.toFixed(2);

    // =========================================
    // BREAKEVEN %
    // =========================================

    const breakevenRate =
      (100 / (1 + rrRatio));

    document.getElementById('breakevenRate').textContent =
      breakevenRate.toFixed(1) + '%';

    // =========================================
    // RR BAR
    // =========================================

    const ratioFillWidth =
      (100 / (1 + rrRatio));

    document.getElementById('ratioFill').style.width =
      ratioFillWidth + '%';
  }
}

</script>
