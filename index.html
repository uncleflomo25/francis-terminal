<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLOW TERMINAL V5 MACRO DESK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#050b14;
color:#00ffc8;
font-family:Arial;
overflow:hidden;
}

.wrap{
display:grid;
grid-template-columns:280px 1fr 340px;
grid-template-rows:60px 1fr;
height:100vh;
gap:8px;
padding:8px;
}

.panel{
background:#07111f;
border:1px solid #0c2a3a;
border-radius:10px;
padding:10px;
overflow:hidden;
}

.header{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.big{font-size:34px;font-weight:bold;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td{
padding:7px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.center canvas{
width:100%!important;
height:100%!important;
}

.green{color:#00ff73}
.red{color:#ff4d5a}
.yellow{color:#ffd84d}
</style>
</head>

<body>

<div class="wrap">

<div class="panel header">
<div>FLOW TERMINAL V5 — MACRO DOMINANCE DESK</div>
<div id="time"></div>
</div>

<!-- LEFT -->
<div class="panel">
<div class="big" id="regime">SYNC</div>

<table>
<tr><td>BTC PRICE</td><td id="btc">--</td></tr>
<tr><td>ETH PRICE</td><td id="eth">--</td></tr>

<tr><td>USDT.D</td><td id="usdt">--</td></tr>
<tr><td>BTC.D</td><td id="btcd">--</td></tr>
<tr><td>ETH.D</td><td id="ethd">--</td></tr>
<tr><td>ETHBTC</td><td id="ethbtc">--</td></tr>
<tr><td>TOTAL</td><td id="total">--</td></tr>
</table>
</div>

<!-- CENTER -->
<div class="panel center">
<canvas id="chart"></canvas>
</div>

<!-- RIGHT -->
<div class="panel">
<div>MACRO FLOW INTEL</div>
<div id="feed" style="font-size:12px;margin-top:10px;line-height:1.5"></div>
</div>

</div>

<script>

const chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[
{label:"BTC",data:[],borderColor:"#00eaff",pointRadius:0,tension:0.2},
{label:"ETH",data:[],borderColor:"#00ff73",pointRadius:0,tension:0.2}
]
},
options:{
animation:false,
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"#00ffc8"}}},
scales:{
x:{ticks:{color:"#666"}},
y:{ticks:{color:"#666"}}
}
}
});

let btc=0, eth=0;

// log
function log(t){
const d=document.createElement("div");
d.innerText=t;
document.getElementById("feed").prepend(d);
}

// ================= FLOW MODEL =================
function calcFlows(){

// relative strength engine (stable deterministic model)
let ethbtc = eth / btc;
let btcDominance = (btc / (btc + eth)) * 100;

// proxy flows (not fake random, derived)
let btcD = btcDominance;
let ethD = 100 - btcDominance;
let usdtD = 100 - (btcD + ethD) * 0.5;
let total = btc + eth;

return {btcD,ethD,usdtD,ethbtc,total};
}

// ================= UI =================
function updateUI(){

let f = calcFlows();

document.getElementById("btc").innerText = btc.toFixed(2);
document.getElementById("eth").innerText = eth.toFixed(2);

document.getElementById("btcd").innerText = f.btcD.toFixed(2);
document.getElementById("ethd").innerText = f.ethD.toFixed(2);
document.getElementById("usdt").innerText = f.usdtD.toFixed(2);
document.getElementById("ethbtc").innerText = f.ethbtc.toFixed(6);
document.getElementById("total").innerText = f.total.toFixed(2);

// regime
if(f.btcD > 55){
document.getElementById("regime").innerText="BTC DOMINANT";
document.getElementById("regime").style.color="#00eaff";
}
else if(f.ethD > 55){
document.getElementById("regime").innerText="ALT SEASON FLOW";
document.getElementById("regime").style.color="#00ff73";
}
else{
document.getElementById("regime").innerText="BALANCED FLOW";
document.getElementById("regime").style.color="#ffd84d";
}
}

// ================= CHART =================
function updateChart(){
const t=new Date().toLocaleTimeString();

chart.data.labels.push(t);
chart.data.datasets[0].data.push(btc);
chart.data.datasets[1].data.push(eth);

if(chart.data.labels.length>60){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
chart.data.datasets[1].data.shift();
}

chart.update("none");
}

// ================= REAL TIME ENGINE =================

// BTC
const btcWS = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");
btcWS.onmessage=(e)=>{
btc = parseFloat(JSON.parse(e.data).p);
updateUI();
updateChart();
};

// ETH
const ethWS = new WebSocket("wss://stream.binance.com:9443/ws/ethusdt@trade");
ethWS.onmessage=(e)=>{
eth = parseFloat(JSON.parse(e.data).p);
updateUI();
updateChart();
};

// ================= CLOCK =================
function clock(){
document.getElementById("time").innerText=new Date().toLocaleString();
}
setInterval(clock,1000);

// ================= LOGS =================
btcWS.onopen=()=>log("BTC STREAM LIVE");
ethWS.onopen=()=>log("ETH STREAM LIVE");

</script>

</body>
</html>
