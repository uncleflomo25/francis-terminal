<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Liquidity X Real-Time Trading Platform</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
}

#chart{
    width:100%;
    height:100%;
}

.market{
    cursor:pointer;
    transition:0.2s;
}

.market:hover{
    border-color:#00ff88;
}

.active{
    border-color:#00ff88;
    background:#101010;
}

</style>
</head>

<body>

<div class="h-screen w-full flex overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col">

        <div class="p-5 border-b border-zinc-800">

            <h1 class="text-3xl font-black text-emerald-400">
                LIQUIDITY X
            </h1>

            <p class="text-zinc-500 text-sm mt-1">
                Real-Time Trading Platform
            </p>

        </div>

        <div class="p-4">

            <button class="w-full p-3 rounded-2xl bg-emerald-500 text-black font-bold">
                Connect Wallet
            </button>

        </div>

        <div class="px-4 pb-2 text-xs text-zinc-500 uppercase tracking-widest">
            Markets
        </div>

        <div class="flex-1 overflow-auto px-3 space-y-2">

            <div onclick="switchMarket('btcusdt')" class="market active rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                BTCUSD
            </div>

            <div onclick="switchMarket('ethusdt')" class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                ETHUSD
            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- TOP -->
        <div class="h-16 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-6">

            <div>

                <div id="pairName" class="text-2xl font-bold">
                    BTCUSD
                </div>

                <div class="text-zinc-500 text-sm">
                    Binance Real-Time Feed
                </div>

            </div>

            <div class="flex gap-2">

                <button onclick="changeInterval('1m')" class="px-4 py-2 rounded-xl bg-zinc-900 border border-zinc-800">
                    1M
                </button>

                <button onclick="changeInterval('5m')" class="px-4 py-2 rounded-xl bg-zinc-900 border border-zinc-800">
                    5M
                </button>

                <button onclick="changeInterval('1h')" class="px-4 py-2 rounded-xl bg-emerald-500 text-black font-bold">
                    1H
                </button>

                <button onclick="changeInterval('4h')" class="px-4 py-2 rounded-xl bg-zinc-900 border border-zinc-800">
                    4H
                </button>

            </div>

        </div>

        <!-- CENTER -->
        <div class="flex-1 flex overflow-hidden">

            <!-- CHART -->
            <div class="flex-1 relative bg-black">

                <div class="absolute top-5 left-5 z-10 bg-black/70 backdrop-blur-md border border-zinc-800 rounded-2xl px-5 py-4">

                    <div id="livePrice" class="text-5xl font-black">
                        Loading...
                    </div>

                    <div class="text-emerald-400 text-lg">
                        LIVE MARKET
                    </div>

                </div>

                <div id="chart"></div>

            </div>

            <!-- ORDER PANEL -->
            <div class="w-96 bg-zinc-950 border-l border-zinc-800 p-5 overflow-auto">

                <h2 class="text-2xl font-bold mb-5">
                    Trade Panel
                </h2>

                <div class="space-y-5">

                    <select class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4">

                        <option>BTCUSD</option>
                        <option>ETHUSD</option>

                    </select>

                    <div class="grid grid-cols-2 gap-3">

                        <button class="rounded-2xl bg-emerald-500 text-black font-black p-4">
                            BUY
                        </button>

                        <button class="rounded-2xl bg-red-500 text-white font-black p-4">
                            SELL
                        </button>

                    </div>

                    <input
                        type="number"
                        placeholder="Order Size"
                        class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4">

                    <button class="w-full rounded-2xl bg-emerald-500 text-black font-black p-4">
                        Execute Trade
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

// =============================
// GLOBAL VARIABLES
// =============================

let currentSymbol = 'btcusdt'
let currentInterval = '1h'

let candleSeries
let socket

// =============================
// CREATE CHART
// =============================

const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {

        layout:{
            background:{ color:'#050505' },
            textColor:'#888'
        },

        grid:{
            vertLines:{ color:'#111' },
            horzLines:{ color:'#111' }
        },

        width:window.innerWidth - 640,
        height:window.innerHeight - 64,

        rightPriceScale:{
            borderColor:'#222'
        },

        timeScale:{
            borderColor:'#222',
            timeVisible:true
        }

    }
)

candleSeries = chart.addCandlestickSeries({

    upColor:'#00ff88',
    downColor:'#ff4444',

    borderUpColor:'#00ff88',
    borderDownColor:'#ff4444',

    wickUpColor:'#00ff88',
    wickDownColor:'#ff4444'

})

// =============================
// LOAD HISTORICAL DATA
// =============================

async function loadCandles(){

    const url =
    `https://api.binance.com/api/v3/klines?symbol=${currentSymbol.toUpperCase()}&interval=${currentInterval}&limit=500`

    const response = await fetch(url)

    const data = await response.json()

    const candles = data.map(d => ({

        time:d[0] / 1000,

        open:parseFloat(d[1]),
        high:parseFloat(d[2]),
        low:parseFloat(d[3]),
        close:parseFloat(d[4])

    }))

    candleSeries.setData(candles)

    const last = candles[candles.length - 1]

    document.getElementById('livePrice').innerHTML =
        last.close.toLocaleString()

}

// =============================
// LIVE WEBSOCKET
// =============================

function connectSocket(){

    if(socket){
        socket.close()
    }

    socket = new WebSocket(

        `wss://stream.binance.com:9443/ws/${currentSymbol}@kline_${currentInterval}`

    )

    socket.onmessage = (event) => {

        const message = JSON.parse(event.data)

        const k = message.k

        const candle = {

            time:k.t / 1000,

            open:parseFloat(k.o),
            high:parseFloat(k.h),
            low:parseFloat(k.l),
            close:parseFloat(k.c)

        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            candle.close.toLocaleString()

    }

}

// =============================
// SWITCH MARKET
// =============================

function switchMarket(symbol){

    currentSymbol = symbol

    document.getElementById('pairName').innerHTML =
        symbol.toUpperCase()

    loadCandles()

    connectSocket()

}

// =============================
// CHANGE INTERVAL
// =============================

function changeInterval(interval){

    currentInterval = interval

    loadCandles()

    connectSocket()

}

// =============================
// RESIZE
// =============================

window.addEventListener('resize',()=>{

    chart.applyOptions({

        width:window.innerWidth - 640,
        height:window.innerHeight - 64

    })

})

// =============================
// INITIALIZE
// =============================

loadCandles()

connectSocket()

</script>

</body>
</html>
