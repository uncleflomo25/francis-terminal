<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>V6 REAL DATA DESKTOP ELITE</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#061018;
color:#dce8ff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}
header{
height:48px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:#09121c;
border-bottom:1px solid #17304a;
font-size:13px;
font-weight:700;
}
#grid{
display:grid;
grid-template-columns:1fr 1fr 340px;
grid-template-rows:300px 300px 300px calc(100vh - 956px);
gap:8px;
padding:8px;
height:calc(100vh - 48px);
}
.panel{
background:#0b1622;
border:1px solid #17304a;
border-radius:10px;
overflow:hidden;
}
.title{
height:28px;
padding:7px 9px;
font-size:12px;
color:#8fb8ea;
border-bottom:1px solid #13283d;
}
.chart{
height:calc(100% - 28px);
}
#side{
grid-row:1/span 4;
grid-column:3;
display:grid;
grid-template-rows:260px 1fr;
gap:8px;
background:none;
border:none;
}
.box{
padding:12px;
font-size:12px;
}
.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #13283d;
}
.big{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}
.green{color:#32d583}
.red{color:#ff5d73}
.gold{color:#ffd166}
table{
width:100%;
border-collapse:collapse;
font-size:11px;
}
td{
padding:6px;
border-bottom:1px solid #13283d;
}
.small{
font-size:11px;
color:#8ea8c7;
margin-top:8px;
}
</style>
</head>
<body>

<header>
<span>V6 REAL DATA DESKTOP ELITE</span>
<span id="clock"></span>
</header>

<div id="grid">

<div class="panel"><div class="title">BTCUSDT LIVE</div><div id="c1" class="chart"></div></div>
<div class="panel"><div class="title">ETHUSDT LIVE</div><div id="c2" class="chart"></div></div>

<div class="panel"><div class="title">ETHBTC LIVE</div><div id="c3" class="chart"></div></div>
<div class="panel"><div class="title">BTC.D</div><div id="c4" class="chart"></div></div>

<div class="panel"><div class="title">USDT.D</div><div id="c5" class="chart"></div></div>
<div class="panel"><div class="title">TOTAL Market Proxy</div><div id="c6" class="chart"></div></div>

<div class="panel"><div class="title">AI Rotation Score</div><div id="c7" class="chart"></div></div>
<div class="panel"><div class="title">ETH Leadership</div><div id="c8" class="chart"></div></div>

<div id="side">

<div class="panel">
<div class="title">AI Regime Engine</div>
<div class="box">
<div class="big" id="regime">CONNECTING...</div>
<div class="row"><span>BTC Edge</span><span id="btcEdge">--</span></div>
<div class="row"><span>ETH Edge</span><span id="ethEdge">--</span></div>
<div class="row"><span>Alt Season</span><span id="altProb">--</span></div>
<div class="row"><span>Signal</span><span id="signal">--</span></div>
<div class="small" id="status">Waiting for live market...</div>
</div>
</div>

<div class="panel">
<div class="title">Live Feed</div>
<table id="feed"></table>
</div>

</div>
</div>

<script>
clock.innerText=new Date().toLocaleTimeString();
setInterval(()=>clock.innerText=new Date().toLocaleTimeString(),1000);

function mkChart(id,color){
let chart=LightweightCharts.createChart(document.getElementById(id),{
layout:{background:{color:"#0b1622"},textColor:"#8fb8ea"},
grid:{vertLines:{color:"#102236"},horzLines:{color:"#102236"}},
rightPriceScale:{borderColor:"#17304a"},
timeScale:{borderColor:"#17304a",timeVisible:true,secondsVisible:false},
crosshair:{mode:1}
});
let line=chart.addLineSeries({color:color,lineWidth:2});
return {chart,line,data:[]};
}

function add(o,v){
let t=Math.floor(Date.now()/1000);
o.data.push({time:t,value:v});
if(o.data.length>240)o.data.shift();
o.line.setData(o.data);
}

const A=mkChart("c1","#32d583");
const B=mkChart("c2","#ff8fab");
const C=mkChart("c3","#5fa8ff");
const D=mkChart("c4","#ffd166");
const E=mkChart("c5","#ff5d73");
const F=mkChart("c6","#00d1ff");
const G=mkChart("c7","#b388ff");
const H=mkChart("c8","#9eff6b");

let btc=0,eth=0,pair=0;
let ws;

function connect(){
status.innerHTML="<span class='gold'>Connecting...</span>";

ws=new WebSocket("wss://stream.binance.com:9443/stream?streams=btcusdt@miniTicker/ethusdt@miniTicker/ethbtc@miniTicker");

ws.onopen=()=>{
status.innerHTML="<span class='green'>LIVE CONNECTED</span>";
};

ws.onmessage=(msg)=>{
let j=JSON.parse(msg.data);
let s=j.data.s;
let p=parseFloat(j.data.c);

if(s==="BTCUSDT") btc=p;
if(s==="ETHUSDT") eth=p;
if(s==="ETHBTC") pair=p;

if(btc && eth && pair) update();
};

ws.onerror=()=>{
status.innerHTML="<span class='red'>Feed Error</span>";
};

ws.onclose=()=>{
status.innerHTML="<span class='gold'>Reconnecting...</span>";
setTimeout(connect,3000);
};
}

function update(){

let btcd=(btc/(btc+eth*15))*100;
let usdt=100-btcd;
let total=(btc*21 + eth*120)/1000;
let ethLead=pair*100000;

add(A,btc);
add(B,eth);
add(C,pair);
add(D,btcd);
add(E,usdt);
add(F,total);
add(H,ethLead);

let bm=A.data.length>10 ? btc-A.data[A.data.length-10].value : 0;
let em=B.data.length>10 ? eth-B.data[B.data.length-10].value : 0;
let pm=C.data.length>10 ? pair-C.data[C.data.length-10].value : 0;

let score=(bm*0.01)+(em*0.08)+(pm*100000);
add(G,score);

let regime="NEUTRAL";
let sig="WAIT";

if(bm>0 && pm<0){
regime="BTC SEASON";
sig="BUY BTC";
}else if(em>0 && pm>0){
regime="ETH ROTATION";
sig="BUY ETH";
}else if(bm<0 && em<0){
regime="RISK OFF";
sig="REDUCE";
}else{
regime="BROAD BULL";
sig="BUY DIPS";
}

document.getElementById("regime").innerText=regime;
btcEdge.innerHTML="<span class='green'>"+(50+bm/20).toFixed(1)+"%</span>";
ethEdge.innerHTML="<span class='gold'>"+(50+em/2).toFixed(1)+"%</span>";
altProb.innerHTML="<span class='red'>"+(50+pm*9000).toFixed(1)+"%</span>";
signal.innerText=sig;

feed.innerHTML="<tr><td>"+new Date().toLocaleTimeString()+"</td><td>"+regime+"</td><td>"+sig+"</td></tr>"+feed.innerHTML;
if(feed.rows.length>25)feed.deleteRow(25);
}

connect();
</script>
</body>
</html>
