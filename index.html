<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V10 Multi-Timeframe Liquidity Footprint</title>

<style>
body {
  margin:0;
  background:#05070c;
  color:#cbd5e1;
  font-family: monospace;
}

#topbar {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  background:#0f172a;
}

.box {
  padding:6px 10px;
  background:#111827;
  border-radius:6px;
}

select {
  background:#111827;
  color:#cbd5e1;
  border:none;
}

#chart {
  width:100%;
  height:85vh;
}
</style>
</head>

<body>

<div id="topbar">

  <div class="box">
    TF:
    <select id="tf" onchange="switchTF()">
      <option value="1">1m</option>
      <option value="5">5m</option>
      <option value="15">15m</option>
      <option value="60">1h</option>
      <option value="240">4h</option>
      <option value="1440">1D</option>
      <option value="10080">1W</option>
    </select>
  </div>

  <div class="box">FLOW: <span id="flow">--</span></div>
  <div class="box">DELTA: <span id="delta">0</span></div>

</div>

<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.85;

// -------------------------
// TIMEFRAME STORAGE
// -------------------------
const TFs = {
  1: [], 5: [], 15: [],
  60: [], 240: [],
  1440: [], 10080: []
};

let currentTF = 1;

// -------------------------
// MARKET STATE
// -------------------------
let TOTAL = 1000;
let USDT = 6;

function rand(){
  return (Math.random()-0.5)*2;
}

// -------------------------
// COMPUTE DELTA PER TF
// -------------------------
function computeTF(tfArr){

  let prevTOTAL = TOTAL;
  let prevUSDT = USDT;

  TOTAL += rand()*6;
  USDT += rand()*0.2;

  let dTOTAL = TOTAL - prevTOTAL;
  let dUSDT = USDT - prevUSDT;

  let DELTA = dTOTAL - dUSDT;

  tfArr.push({DELTA});

  if(tfArr.length > 120) tfArr.shift();

  return DELTA;
}

// -------------------------
// GLOBAL UPDATE
// -------------------------
function update(){

  let tfArr = TFs[currentTF];

  let delta = computeTF(tfArr);

  let flow = "NEUTRAL";

  if(delta > 0) flow = "LIQUIDITY RISK-ON";
  else if(delta < 0) flow = "LIQUIDITY RISK-OFF";

  document.getElementById("delta").innerText = delta.toFixed(2);
  document.getElementById("flow").innerText = flow;

  return delta;
}

// -------------------------
// DRAW FOOTPRINT
// -------------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let tfArr = TFs[currentTF];

  let x = 50;
  let scale = 25;

  for(let i=0;i<tfArr.length;i++){

    let d = tfArr[i].DELTA;

    ctx.fillStyle = d > 0 ? "#22c55e" : "#ef4444";

    let h = Math.abs(d)*scale;

    ctx.fillRect(x, canvas.height/2 - h, 6, h);

    x += 8;
  }
}

// -------------------------
// SWITCH TF
// -------------------------
function switchTF(){
  currentTF = parseInt(document.getElementById("tf").value);
}

// -------------------------
// LOOP
// -------------------------
setInterval(()=>{
  update();
  draw();
}, 250);

</script>

</body>
</html>
