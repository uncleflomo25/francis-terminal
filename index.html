<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidity X MT5 Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#050505;
    color:white;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.market{
    cursor:pointer;
    transition:0.2s;
}

.market:hover{
    border-color:#00ff88;
    background:#111;
}

#chart{
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<div class="h-screen w-full flex overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col">

        <div class="p-5 border-b border-zinc-800">

            <h1 class="text-3xl font-black text-emerald-400">
                LIQUIDITY X
            </h1>

            <p class="text-zinc-500 text-sm mt-1">
                MT5 Real-Time Trading Terminal
            </p>

        </div>

        <div class="p-4">

            <button
                class="w-full p-3 rounded-2xl bg-emerald-500 text-black font-bold">
                Connect Wallet
            </button>

        </div>

        <div class="px-4 pb-2 text-xs uppercase tracking-widest text-zinc-500">
            Markets
        </div>

        <div class="flex-1 overflow-auto px-3 space-y-2 pb-5">

            <div onclick="switchMarket('BTCUSD')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                BTCUSD
            </div>

            <div onclick="switchMarket('ETHUSD')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                ETHUSD
            </div>

            <div onclick="switchMarket('XAUUSD')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                XAUUSD
            </div>

            <div onclick="switchMarket('Volatility 25 Index')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V25
            </div>

            <div onclick="switchMarket('Volatility 75 Index')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V75
            </div>

            <div onclick="switchMarket('Volatility 100 Index')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V100
            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- TOPBAR -->
        <div class="h-16 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-6">

            <div>

                <div id="marketName"
                     class="text-2xl font-bold">
                    XAUUSD
                </div>

                <div class="text-zinc-500 text-sm">
                    MT5 Real-Time Feed
                </div>

            </div>

            <div id="livePrice"
                 class="text-4xl font-black text-emerald-400">
                Loading...
            </div>

        </div>

        <!-- CHART -->
        <div class="flex-1 bg-black relative">

            <div id="chart"></div>

        </div>

    </div>

</div>

<script>

// =====================================
// CHART
// =====================================

const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {

        layout:{
            background:{ color:'#050505' },
            textColor:'#888'
        },

        grid:{
            vertLines:{ color:'#111' },
            horzLines:{ color:'#111' }
        },

        width:window.innerWidth - 256,
        height:window.innerHeight - 64,

        rightPriceScale:{
            borderColor:'#222'
        },

        timeScale:{
            borderColor:'#222',
            timeVisible:true
        }

    }
)

const candleSeries = chart.addCandlestickSeries({

    upColor:'#00ff88',
    downColor:'#ff4444',

    borderUpColor:'#00ff88',
    borderDownColor:'#ff4444',

    wickUpColor:'#00ff88',
    wickDownColor:'#ff4444'

})

// =====================================
// CURRENT MARKET
// =====================================

let currentMarket = 'XAUUSD'

// =====================================
// LOAD MT5 DATA
// =====================================

async function loadMT5(symbol){

    currentMarket = symbol

    document.getElementById('marketName').innerHTML = symbol

    try{

        const response = await fetch(
            `http://localhost:5000/candles/${encodeURIComponent(symbol)}`
        )

        const candles = await response.json()

        candleSeries.setData(candles)

        if(candles.length){

            const last = candles[candles.length - 1]

            document.getElementById('livePrice').innerHTML =
                Number(last.close).toLocaleString()

        }

    }

    catch(error){

        console.log(error)

    }

}

// =====================================
// LIVE REFRESH
// =====================================

setInterval(()=>{

    loadMT5(currentMarket)

},2000)

// =====================================
// SWITCH MARKET
// =====================================

function switchMarket(symbol){

    loadMT5(symbol)

}

// =====================================
// RESIZE
// =====================================

window.addEventListener('resize',()=>{

    chart.applyOptions({

        width:window.innerWidth - 256,
        height:window.innerHeight - 64

    })

})

// =====================================
// INIT
// =====================================

loadMT5('XAUUSD')

</script>

</body>
</html>
