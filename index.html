<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>REALTIME ORDERFLOW TERMINAL</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#05070b;
    color:#d1d5db;
    font-family:monospace;
    overflow:hidden;
}

.wrapper{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.topbar{
    height:42px;
    background:#0b1220;
    border-bottom:1px solid #1f2937;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    font-size:12px;
}

.left-controls{
    display:flex;
    align-items:center;
    gap:15px;
}

select{
    background:#111827;
    color:white;
    border:1px solid #374151;
    padding:5px 10px;
    outline:none;
}

.status{
    color:#00ff88;
}

.canvas-wrap{
    flex:1;
    position:relative;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="topbar">

        <div class="left-controls">
            <div>⚡ REALTIME BTCUSDT ORDERFLOW TERMINAL</div>

            <select id="tf">
                <option value="1m">1M</option>
                <option value="5m">5M</option>
                <option value="15m">15M</option>
                <option value="1h">1H</option>
            </select>
        </div>

        <div class="status">
            BINANCE LIVE FEED ACTIVE
        </div>

    </div>

    <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>

</div>

<script>

// =====================================================
// CANVAS ENGINE
// =====================================================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let dpr = window.devicePixelRatio || 1;

let W = 0;
let H = 0;

function resize(){

    W = canvas.parentElement.clientWidth;
    H = canvas.parentElement.clientHeight;

    canvas.width = W * dpr;
    canvas.height = H * dpr;

    canvas.style.width = W + "px";
    canvas.style.height = H + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

window.addEventListener("resize", resize);

resize();

// =====================================================
// CONFIG
// =====================================================

const barWidth = 72;
const barGap = 28;
const rowHeight = 15;

const maxBars = 14;

let currentTF = "1m";

const tfMap = {
    "1m": 60000,
    "5m": 300000,
    "15m": 900000,
    "1h": 3600000
};

document.getElementById("tf").addEventListener("change",(e)=>{

    currentTF = e.target.value;

    bars = [];
    currentBar = null;
});

// =====================================================
// DATA ENGINE
// =====================================================

let bars = [];
let currentBar = null;

function roundPrice(price){

    return Math.round(price / 5) * 5;
}

function createBar(bucket){

    return {

        bucket,

        footprint:{},

        delta:0,

        buyVolume:0,
        sellVolume:0,

        high:-Infinity,
        low:Infinity,

        close:0
    };
}

// =====================================================
// PROCESS TRADE
// =====================================================

function processTrade(price, qty, isSeller){

    const tf = tfMap[currentTF];

    const now = Date.now();

    const bucket = Math.floor(now / tf) * tf;

    if(!currentBar || currentBar.bucket !== bucket){

        currentBar = createBar(bucket);

        bars.push(currentBar);

        if(bars.length > maxBars){

            bars.shift();
        }
    }

    currentBar.close = price;

    currentBar.high = Math.max(currentBar.high, price);
    currentBar.low = Math.min(currentBar.low, price);

    const p = roundPrice(price);

    if(!currentBar.footprint[p]){

        currentBar.footprint[p] = {

            buy:0,
            sell:0
        };
    }

    if(isSeller){

        currentBar.footprint[p].sell += qty;
        currentBar.sellVolume += qty;
        currentBar.delta -= qty;

    }else{

        currentBar.footprint[p].buy += qty;
        currentBar.buyVolume += qty;
        currentBar.delta += qty;
    }
}

// =====================================================
// BINANCE WEBSOCKET
// =====================================================

const ws = new WebSocket(
"wss://fstream.binance.com/ws/btcusdt@aggTrade"
);

ws.onmessage = (event)=>{

    const t = JSON.parse(event.data);

    const price = parseFloat(t.p);
    const qty = parseFloat(t.q);

    const isSeller = t.m;

    processTrade(price, qty, isSeller);
};

// =====================================================
// DRAW ENGINE
// =====================================================

function draw(){

    ctx.fillStyle = "#05070b";
    ctx.fillRect(0,0,W,H);

    const mainHeight = H * 0.78;

    ctx.strokeStyle = "#111827";
    ctx.beginPath();
    ctx.moveTo(0,mainHeight);
    ctx.lineTo(W,mainHeight);
    ctx.stroke();

    let x = W - 120;

    for(let i=bars.length-1;i>=0;i--){

        const bar = bars[i];

        const prices = Object.keys(bar.footprint)
            .map(Number)
            .sort((a,b)=>b-a);

        let y = 60;

        for(let p of prices){

            const node = bar.footprint[p];

            const buy = node.buy;
            const sell = node.sell;

            const total = buy + sell;

            let imbalance = buy / (sell || 1);

            let color;

            if(bar.delta >= 0){

                color = `rgba(34,197,94,${
                    Math.min(total / 8,0.9)
                })`;

            }else{

                color = `rgba(239,68,68,${
                    Math.min(total / 8,0.9)
                })`;
            }

            if(imbalance > 4 || imbalance < 0.25){

                color = "#facc15";
            }

            ctx.fillStyle = color;

            ctx.fillRect(
                x,
                y,
                barWidth,
                rowHeight-1
            );

            ctx.fillStyle = "#e5e7eb";

            if(color === "#facc15"){

                ctx.fillStyle = "#000";
            }

            ctx.font = "10px monospace";

            ctx.textAlign = "center";

            ctx.fillText(

                `${buy.toFixed(1)} | ${sell.toFixed(1)}`,

                x + barWidth/2,

                y + 10
            );

            y += rowHeight;

            if(y > mainHeight - 20){

                break;
            }
        }

        // DELTA PANEL

        const deltaY = mainHeight + 20;

        ctx.fillStyle =
            bar.delta >= 0
            ? "#22c55e"
            : "#ef4444";

        ctx.fillRect(
            x,
            deltaY,
            barWidth,
            55
        );

        ctx.fillStyle = "white";

        ctx.fillText(

            Math.round(bar.delta),

            x + barWidth/2,

            deltaY + 30
        );

        // PRICE LABEL

        ctx.fillStyle = "#00ff88";

        ctx.textAlign = "left";

        ctx.fillText(

            bar.close.toFixed(2),

            x + 2,

            20
        );

        x -= (barWidth + barGap);
    }

    // RIGHT AXIS

    ctx.fillStyle = "#0b1220";

    ctx.fillRect(
        W - 80,
        0,
        80,
        H
    );

    ctx.strokeStyle = "#1f2937";

    ctx.beginPath();

    ctx.moveTo(W - 80,0);
    ctx.lineTo(W - 80,H);

    ctx.stroke();

    // HEADER INFO

    ctx.fillStyle = "#00ff88";

    ctx.font = "11px monospace";

    ctx.fillText(

        "LIVE FLOW",

        W - 72,

        20
    );
}

// =====================================================
// RENDER LOOP
// =====================================================

function animate(){

    draw();

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
