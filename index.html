<script>

const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {
        layout:{
            background:{ color:'#050505' },
            textColor:'#888'
        },

        grid:{
            vertLines:{ color:'#111' },
            horzLines:{ color:'#111' }
        },

        width:window.innerWidth - 256,
        height:window.innerHeight - 64,

        rightPriceScale:{
            borderColor:'#222'
        },

        timeScale:{
            borderColor:'#222',
            timeVisible:true
        }
    }
)

const candleSeries = chart.addCandlestickSeries({

    upColor:'#00ff88',
    downColor:'#ff4444',

    borderUpColor:'#00ff88',
    borderDownColor:'#ff4444',

    wickUpColor:'#00ff88',
    wickDownColor:'#ff4444'

})

let socket = null
let demoInterval = null

async function loadBinance(symbol){

    if(socket) socket.close()

    clearInterval(demoInterval)

    const response = await fetch(
        `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=300`
    )

    const data = await response.json()

    const candles = data.map(c => ({

        time:c[0] / 1000,

        open:parseFloat(c[1]),
        high:parseFloat(c[2]),
        low:parseFloat(c[3]),
        close:parseFloat(c[4])

    }))

    candleSeries.setData(candles)

    document.getElementById('livePrice').innerHTML =
        candles[candles.length - 1].close.toLocaleString()

    socket = new WebSocket(
        `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_1m`
    )

    socket.onmessage = (event)=>{

        const msg = JSON.parse(event.data)

        const k = msg.k

        const candle = {

            time:k.t / 1000,
            open:parseFloat(k.o),
            high:parseFloat(k.h),
            low:parseFloat(k.l),
            close:parseFloat(k.c)

        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            Number(k.c).toLocaleString()

    }

}

function syntheticFeed(startPrice){

    if(socket) socket.close()

    clearInterval(demoInterval)

    const candles = []

    let price = startPrice

    for(let i=0;i<300;i++){

        const open = price
        const close = open + (Math.random()-0.5)*100
        const high = Math.max(open,close) + Math.random()*30
        const low = Math.min(open,close) - Math.random()*30

        candles.push({
            time:1642425322 + (i*60),
            open,
            high,
            low,
            close
        })

        price = close

    }

    candleSeries.setData(candles)

    document.getElementById('livePrice').innerHTML =
        price.toFixed(2)

    demoInterval = setInterval(()=>{

        const last = candles[candles.length-1]

        const open = last.close
        const close = open + (Math.random()-0.5)*80
        const high = Math.max(open,close) + Math.random()*20
        const low = Math.min(open,close) - Math.random()*20

        const candle = {
            time:last.time + 60,
            open,
            high,
            low,
            close
        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            close.toFixed(2)

    },1000)

}

function syntheticCryptoBasket(){

    if(socket) socket.close()

    clearInterval(demoInterval)

    const candles = []

    let btc = 105000
    let eth = 2500
    let total3 = 950000000000
    let usdt = 4.8

    for(let i=0;i<300;i++){

        btc += (Math.random()-0.48) * 800
        eth += (Math.random()-0.48) * 40
        total3 += (Math.random()-0.48) * 9000000000
        usdt += (Math.random()-0.52) * 0.08

        const synth =
            (btc * 0.35)
            + (eth * 0.20)
            + ((total3 / 1000000000) * 0.20)
            - (usdt * 0.15 * 1000)

        const open = synth

        const close = open + (Math.random()-0.5)*500

        const high = Math.max(open,close) + Math.random()*120

        const low = Math.min(open,close) - Math.random()*120

        candles.push({
            time:1642425322 + (i*60),
            open,
            high,
            low,
            close
        })

    }

    candleSeries.setData(candles)

    demoInterval = setInterval(()=>{

        const last = candles[candles.length-1]

        btc += (Math.random()-0.48) * 600
        eth += (Math.random()-0.48) * 25
        total3 += (Math.random()-0.48) * 6000000000
        usdt += (Math.random()-0.52) * 0.05

        const synth =
            (btc * 0.35)
            + (eth * 0.20)
            + ((total3 / 1000000000) * 0.20)
            - (usdt * 0.15 * 1000)

        const open = last.close

        const close = synth

        const high = Math.max(open,close) + Math.random()*80

        const low = Math.min(open,close) - Math.random()*80

        const candle = {
            time:last.time + 60,
            open,
            high,
            low,
            close
        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            Number(close).toLocaleString()

    },1000)

}

function switchMarket(symbol){

    document.getElementById('marketName').innerHTML = symbol

    if(symbol === 'BTCUSDT'){
        loadBinance('BTCUSDT')
    }

    else if(symbol === 'ETHUSDT'){
        loadBinance('ETHUSDT')
    }

    

    else if(symbol === 'LX_SYNTH'){
        syntheticCryptoBasket()
    }

}

window.addEventListener('resize',()=>{

    chart.applyOptions({
        width:window.innerWidth - 256,
        height:window.innerHeight - 64
    })

})

switchMarket('BTCUSDT')

</script>

</body>
</html>
