<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V12 Liquidity Footprint</title>

<style>
body {
  margin:0;
  background:#05070c;
  font-family: monospace;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------------
// MARKET STATE
// ---------------------
let TOTAL = 1000;
let USDT = 6;

function rand(){
  return (Math.random()-0.5)*2;
}

// ---------------------
// DATA
// ---------------------
let candles = [];

// ---------------------
// CREATE FOOTPRINT CANDLE
// ---------------------
function createCandle(){

  let prevT = TOTAL;
  let prevU = USDT;

  TOTAL += rand()*6;
  USDT += rand()*0.2;

  let delta = (TOTAL - prevT) - (USDT - prevU);

  // convert delta into blocks
  let blocks = Math.floor(Math.abs(delta) * 3);

  candles.push({
    delta,
    blocks
  });

  if(candles.length > 60) candles.shift();
}

// ---------------------
// DRAW FOOTPRINT
// ---------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let x = 50;

  candles.forEach(c => {

    let blockSize = 6;
    let centerY = canvas.height / 2;

    for(let i=0;i<c.blocks;i++){

      let y;

      if(c.delta > 0){
        y = centerY - i * blockSize;
        ctx.fillStyle = "#22c55e";
      } else {
        y = centerY + i * blockSize;
        ctx.fillStyle = "#ef4444";
      }

      ctx.fillRect(x, y, 10, blockSize - 1);
    }

    x += 14;
  });
}

// ---------------------
// LOOP
// ---------------------
setInterval(()=>{
  createCandle();
  draw();
}, 600);

</script>

</body>
</html>
