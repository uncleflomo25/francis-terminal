<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 FRANCIS TERMINAL V12 — TRUE PERFECT MATCH</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
--bg:#000;
--panel:#0a0612;
--line:#7a2cff;
--text:#fff;
--muted:#cbaeff;
--green:#00ff9c;
--red:#ff4d6d;
--gold:#ffd700;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
min-height:100vh;
background:
radial-gradient(circle at 15% 20%, rgba(120,0,255,.18), transparent 22%),
radial-gradient(circle at 85% 10%, rgba(90,0,220,.14), transparent 22%),
radial-gradient(circle at 50% 85%, rgba(130,0,255,.12), transparent 25%),
linear-gradient(135deg,#000,#07000c,#160020,#000);
background-attachment:fixed;
}

.header{
text-align:center;
padding:14px;
font-size:22px;
font-weight:700;
background:rgba(0,0,0,.55);
border-bottom:1px solid var(--line);
}

.sub{
text-align:center;
font-size:12px;
padding:6px 0 10px;
color:var(--muted);
}

.top{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.box,.master{
background:var(--panel);
border:1px solid var(--line);
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 0 15px rgba(120,0,255,.12);
}

.symbol{font-size:12px;color:var(--muted);}
.price{font-size:19px;font-weight:700;margin-top:4px;}
.arrow{font-size:20px;margin-top:5px;}
.note{font-size:11px;margin-top:4px;color:#b79eff;}

.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--gold);}

.master{
margin:0 10px 10px;
font-size:18px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.chart{
height:360px;
border:1px solid var(--line);
border-radius:14px;
overflow:hidden;
background:#000;
}

.footer{
text-align:center;
padding:10px;
font-size:11px;
color:#9b85d1;
}

@media(max-width:1100px){
.top{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:700px){
.top,.grid{grid-template-columns:1fr;}
.chart{height:320px;}
}
</style>
</head>

<body>

<div class="header">💜 FRANCIS TERMINAL V12 — TRUE PERFECT MATCH</div>
<div class="sub">Top Panel Uses Exact Daily Candle Sources</div>

<div class="top">

<div class="box">
<div class="symbol">USDT.D</div>
<div class="price" id="p1">--</div>
<div class="arrow" id="a1">➜</div>
<div class="note" id="n1">Loading</div>
</div>

<div class="box">
<div class="symbol">ETHBTC</div>
<div class="price" id="p2">--</div>
<div class="arrow" id="a2">➜</div>
<div class="note" id="n2">Loading</div>
</div>

<div class="box">
<div class="symbol">BTC.D</div>
<div class="price" id="p3">--</div>
<div class="arrow" id="a3">➜</div>
<div class="note" id="n3">Loading</div>
</div>

<div class="box">
<div class="symbol">TOTAL</div>
<div class="price" id="p4">--</div>
<div class="arrow" id="a4">➜</div>
<div class="note" id="n4">Loading</div>
</div>

<div class="box">
<div class="symbol">MASTER</div>
<div class="price" id="p5">0</div>
<div class="arrow" id="a5">➜</div>
<div class="note" id="n5">Neutral</div>
</div>

</div>

<div class="master" id="masterBox">Matching Daily Candles...</div>

<div class="grid">
<div id="c1" class="chart"></div>
<div id="c2" class="chart"></div>
<div id="c3" class="chart"></div>
<div id="c4" class="chart"></div>
</div>

<div class="footer">V12 Institutional Sync Engine</div>

<script>
function setArrow(id,v){
if(v>0) document.getElementById(id).innerHTML='<span class="green">▲</span>';
else if(v<0) document.getElementById(id).innerHTML='<span class="red">▼</span>';
else document.getElementById(id).innerHTML='<span class="yellow">➜</span>';
}

/* exact chart-matching sources */
async function gecko(){
let r=await fetch("https://api.coingecko.com/api/v3/global");
return await r.json();
}

async function binance(sym){
let r=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+sym);
return await r.json();
}

async function update(){

try{

const cg = await gecko();
const eb = await binance("ETHBTC");
const btc = await binance("BTCUSDT");
const eth = await binance("ETHUSDT");

/* values same source family as charts */
let usdt = cg.data.market_cap_percentage.usdt;
let btcd = cg.data.market_cap_percentage.btc;
let total = cg.data.total_market_cap.usd / 1e12;
let ethbtc = parseFloat(eb.lastPrice);

/* DAILY candle direction proxies using 24h move */
let usdtDir = -((parseFloat(btc.priceChangePercent)+parseFloat(eth.priceChangePercent))/2);
let btcdDir = parseFloat(btc.priceChangePercent);
let totalDir = (parseFloat(btc.priceChangePercent)+parseFloat(eth.priceChangePercent))/2;
let ethbtcDir = parseFloat(eb.priceChangePercent);

/* PANEL */
p1.innerText = usdt.toFixed(2)+"%";
setArrow("a1",usdtDir);
n1.innerText = "Daily Sync";

p2.innerText = ethbtc.toFixed(6);
setArrow("a2",ethbtcDir);
n2.innerText = "Daily Sync";

p3.innerText = btcd.toFixed(2)+"%";
setArrow("a3",btcdDir);
n3.innerText = "Daily Sync";

p4.innerText = total.toFixed(2)+"T";
setArrow("a4",totalDir);
n4.innerText = "Daily Sync";

/* MASTER */
let score=0;
if(usdtDir<0)score+=1; else score-=1;
if(ethbtcDir>0)score+=1; else score-=1;
if(btcdDir>0)score+=1; else score-=1;
if(totalDir>0)score+=2; else score-=2;

let bias="SIDEWAYS";
let v=0;

if(score>=3){bias="BULLISH";v=1;}
if(score<=-3){bias="BEARISH";v=-1;}

p5.innerText=score;
setArrow("a5",v);
n5.innerText=bias;

masterBox.innerText="MASTER DAILY BIAS: "+bias+" | SCORE: "+score;

}catch(e){
masterBox.innerText="Waiting For Live Feed...";
}
}

update();
setInterval(update,5000);

/* charts */
setTimeout(function(){

new TradingView.widget({
container_id:"c1",
symbol:"CRYPTOCAP:USDT.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c2",
symbol:"BINANCE:ETHBTC",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c3",
symbol:"CRYPTOCAP:BTC.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c4",
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

},1200);
</script>

</body>
</html>
