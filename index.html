<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V5 Accurate Engine</title><style>body{margin:0;background:#03070d;color:#dbe7f1;font-family:Arial,sans-serif}header{padding:12px 16px;background:#06111d;border-bottom:1px solid #163047;font-size:22px;font-weight:700}.wrap{padding:10px}.card{background:#07121d;border:1px solid #163047;border-radius:12px;padding:10px;margin-bottom:10px}.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th,.tbl td{padding:8px;border-bottom:1px solid #102234;text-align:left}.up{color:#00d26a}.down{color:#ff5252}.side{color:#ffd54a}.strong{font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><header>CRYPTO V5 ACCURATE ENGINE</header><div class='wrap'><div class='card'><table class='tbl'><thead><tr><th>Panel</th><th>Asset</th><th>Price</th><th>24H%</th><th>Weight</th><th>Signal</th><th>Direction</th></tr></thead><tbody id='main'></tbody></table></div><div class='grid'><div class='card'><table class='tbl'><tbody><tr><td>Daily Bias</td><td id='bias'></td></tr><tr><td>Confidence</td><td id='conf'></td></tr><tr><td>Risk Mode</td><td id='risk'></td></tr><tr><td>Alt Rotation</td><td id='alt'></td></tr></tbody></table></div><div class='card'><table class='tbl'><tbody><tr><td>USDT.D Impact</td><td id='u'></td></tr><tr><td>BTC Leadership</td><td id='b'></td></tr><tr><td>ETH Strength</td><td id='e'></td></tr><tr><td>Updated</td><td id='clock'></td></tr></tbody></table></div></div></div><script>const assets=[['BTCUSDT','USDT.D',-1.6],['BTCUSDT','BTC.D',1.3],['ETHBTC','ETHBTC',1.4],['BTCUSDT','TOTAL',1.8],['ETHUSDT','ETH.D',1.2]];const st={};function arr(v){if(v>0.55)return `<span class='up strong'>▲ UP</span>`;if(v<-0.55)return `<span class='down strong'>▼ DOWN</span>`;return `<span class='side strong'>▶ SIDEWAYS</span>`}function sig(v){return v>0?'Bullish':v<0?'Bearish':'Neutral'}function render(){let html='',score=0,totalW=0;assets.forEach(a=>{let s=st[a[1]]||{p:'--',c:0};let val=s.c*a[2];score+=val;totalW+=Math.abs(a[2]);let panel=(a[1]==='USDT.D'||a[1]==='BTC.D')?'Dominance':'Rotation';html+=`<tr><td>${panel}</td><td>${a[1]}</td><td>${s.p}</td><td class='${s.c>=0?'up':'down'}'>${s.c.toFixed(2)}%</td><td>${a[2].toFixed(1)}</td><td>${sig(val)}</td><td>${arr(val)}</td></tr>`});document.getElementById('main').innerHTML=html;let norm=score/totalW;document.getElementById('bias').innerHTML=arr(norm);document.getElementById('conf').textContent=Math.min(100,Math.abs(norm*100)).toFixed(0)+'%';document.getElementById('risk').innerHTML=norm>0?"<span class='up'>RISK ON</span>":norm<0?"<span class='down'>RISK OFF</span>":"<span class='side'>NEUTRAL</span>";document.getElementById('alt').innerHTML=((st['ETHBTC']||{c:0}).c>0&&(st['ETH.D']||{c:0}).c>0)?"<span class='up'>YES</span>":"<span class='down'>NO</span>";document.getElementById('u').innerHTML=arr(-((st['USDT.D']||{c:0}).c));document.getElementById('b').innerHTML=arr((st['BTC.D']||{c:0}).c);document.getElementById('e').innerHTML=arr(((st['ETHBTC']||{c:0}).c+(st['ETH.D']||{c:0}).c)/2);document.getElementById('clock').textContent=new Date().toLocaleTimeString()}function ws(pair,label){let w=new WebSocket('wss://stream.binance.com:9443/ws/'+pair.toLowerCase()+'@ticker');w.onmessage=e=>{let d=JSON.parse(e.data);st[label]={p:parseFloat(d.c).toFixed(4),c:parseFloat(d.P)};render()};w.onclose=()=>setTimeout(()=>ws(pair,label),3000)}assets.forEach(a=>ws(a[0],a[1]));setInterval(render,1000);</script></body></html>
