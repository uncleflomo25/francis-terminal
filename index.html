<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRANCIS TERMINAL REAL V9</title>

<style>
body{margin:0;background:#0f1722;color:#fff;font-family:Arial}
.wrap{display:grid;grid-template-columns:1fr 320px;height:100vh}
.left{position:relative}
.right{
background:#0d1520;
border-left:1px solid #1f2937;
display:flex;
flex-direction:column;
}

/* DOM */
.dom{flex:1;overflow:auto;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px}
.bid{color:#26a69a}
.ask{color:#ef5350}

/* TAPE */
.tape{
height:200px;
overflow:auto;
border-top:1px solid #1f2937;
font-size:12px;
}
.trade{display:flex;justify-content:space-between;padding:2px}
.buy{color:#26a69a}
.sell{color:#ef5350}
</style>
</head>

<body>

<div class="wrap">

<div class="left">
<canvas id="c"></canvas>
</div>

<div class="right">
<div style="padding:6px">ORDER BOOK</div>
<div id="dom" class="dom"></div>

<div style="padding:6px">TRADE TAPE</div>
<div id="tape" class="tape"></div>
</div>

</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
const domEl=document.getElementById("dom");
const tapeEl=document.getElementById("tape");

let bars=[];
let bids=[],asks=[];
let heatmap=[];
let trades=[];
let price=0;

/* RESIZE */
function resize(){
c.width=window.innerWidth-320;
c.height=window.innerHeight;
}
window.onresize=resize;
resize();

/* LOAD REAL CANDLES */
async function loadCandles(){
let res=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=150");
let data=await res.json();
bars=data.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4]}));
}

/* WEBSOCKETS */
let depthWS=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@depth20@100ms");
let tradeWS=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

/* DEPTH */
depthWS.onmessage=(e)=>{
let d=JSON.parse(e.data);
bids=d.bids.map(b=>[+b[0],+b[1]]);
asks=d.asks.map(a=>[+a[0],+a[1]]);
price=bids[0][0];

heatmap.push([...bids,...asks]);
if(heatmap.length>80) heatmap.shift();

renderDOM();
};

/* TRADES */
tradeWS.onmessage=(e)=>{
let t=JSON.parse(e.data);

let trade={
price:+t.p,
qty:+t.q,
side:t.m ? "sell" : "buy"
};

trades.unshift(trade);
if(trades.length>50) trades.pop();

renderTape();
};

/* DOM */
function renderDOM(){
domEl.innerHTML="";
asks.slice().reverse().forEach(a=>{
domEl.innerHTML+=`<div class="row ask"><span>${a[0]}</span><span>${a[1]}</span></div>`;
});
bids.forEach(b=>{
domEl.innerHTML+=`<div class="row bid"><span>${b[0]}</span><span>${b[1]}</span></div>`;
});
}

/* TAPE */
function renderTape(){
tapeEl.innerHTML="";
trades.forEach(t=>{
tapeEl.innerHTML+=`
<div class="trade ${t.side}">
<span>${t.price}</span>
<span>${t.qty}</span>
</div>`;
});
}

/* DRAW */
function draw(){

ctx.fillStyle="#0f1722";
ctx.fillRect(0,0,c.width,c.height);

if(!bars.length) return;

/* SCALE */
let max=Math.max(...bars.map(b=>b.h));
let min=Math.min(...bars.map(b=>b.l));
let range=max-min;

/* DRAW CANDLES */
let w=5,x=20;
bars.forEach(b=>{
let col=b.c>b.o?"#26a69a":"#ef5350";

let yo=(max-b.o)/range*c.height;
let yc=(max-b.c)/range*c.height;
let yh=(max-b.h)/range*c.height;
let yl=(max-b.l)/range*c.height;

ctx.strokeStyle=col;
ctx.beginPath();
ctx.moveTo(x,yh);
ctx.lineTo(x,yl);
ctx.stroke();

ctx.fillStyle=col;
ctx.fillRect(x-2,Math.min(yo,yc),4,Math.abs(yc-yo));

x+=w;
});

/* HEATMAP */
heatmap.forEach((snap,i)=>{
let px=i*(c.width/heatmap.length);

snap.forEach(([p,v])=>{
let y=(max-p)/range*c.height;
let alpha=Math.min(v/5,1);

ctx.fillStyle = p>price
? `rgba(239,83,80,${alpha*0.25})`
: `rgba(38,166,154,${alpha*0.25})`;

ctx.fillRect(px,y,3,2);
});
});

/* PRICE LINE */
let py=(max-price)/range*c.height;
ctx.strokeStyle="#fff";
ctx.beginPath();
ctx.moveTo(0,py);
ctx.lineTo(c.width,py);
ctx.stroke();

requestAnimationFrame(draw);
}

/* INIT */
async function init(){
await loadCandles();
draw();
}
init();
</script>

</body>
</html>
