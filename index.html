<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Footprint Ladder Style</title>

<style>
body {
  margin:0;
  background:#05070c;
  font-family: monospace;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------------
// MARKET STATE
// ---------------------
let TOTAL = 1000;
let USDT = 6;

function rand(){
  return (Math.random()-0.5)*2;
}

// ---------------------
// DATA
// ---------------------
let candles = [];

// ---------------------
// CREATE FOOTPRINT
// ---------------------
function createCandle(){

  let prevT = TOTAL;
  let prevU = USDT;

  TOTAL += rand()*6;
  USDT += rand()*0.2;

  let delta = (TOTAL - prevT) - (USDT - prevU);

  let levels = [];

  let rows = Math.floor(Math.abs(delta) * 4) + 3;

  for(let i=0;i<rows;i++){

    let vol = Math.floor(Math.random()*90 + 10); // fake volume numbers

    levels.push({
      vol,
      color: delta > 0 ? "#22c55e" : "#ef4444"
    });
  }

  candles.push({levels});

  if(candles.length > 20) candles.shift();
}

// ---------------------
// DRAW FOOTPRINT
// ---------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let x = 100;

  candles.forEach(c => {

    let y = canvas.height / 2;

    c.levels.forEach((lvl, i) => {

      let rowHeight = 18;

      let posY = y - i * rowHeight;

      // background box
      ctx.fillStyle = "rgba(20,20,20,0.9)";
      ctx.fillRect(x, posY, 60, rowHeight - 2);

      // color highlight
      ctx.fillStyle = lvl.color;
      ctx.globalAlpha = 0.3;
      ctx.fillRect(x, posY, 60, rowHeight - 2);
      ctx.globalAlpha = 1;

      // text (volume)
      ctx.fillStyle = "#fff";
      ctx.font = "12px monospace";
      ctx.fillText(lvl.vol + "M", x + 10, posY + 13);

    });

    x += 70;
  });
}

// ---------------------
// LOOP
// ---------------------
setInterval(()=>{
  createCandle();
  draw();
}, 800);

</script>

</body>
</html>
