<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Composite Footprint Terminal</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#e5e7eb}
header{padding:10px;border-bottom:1px solid #1e293b}
.wrap{padding:10px}
.panel{background:#07101d;border-radius:10px;padding:10px}
button{margin:2px;padding:6px 8px;background:#0f172a;color:white;border:none;border-radius:6px;cursor:pointer}
button.active{background:#1d4ed8}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table td{padding:4px;border-bottom:1px solid #132033;position:relative}
.green{color:#22c55e}
.red{color:#ef4444}
.blue{color:#60a5fa}
</style>
</head>

<body>

<header>
<b>Composite Candle Footprint (Real-Time)</b>
</header>

<div class="wrap">

<div id="tfButtons"></div>

<div class="panel">
<table class="table" id="tbl"></table>
</div>

</div>

<script>

/* ================= CONFIG ================= */

const CLUSTER_SIZE = 5;

const TF_MAP = {
 '1m':60,
 '5m':300,
 '15m':900,
 '1h':3600,
 '4h':14400,
 '6h':21600,
 '12h':43200,
 '1d':86400,
 '1w':604800
};

let tf = '1m';

/* ================= STATE ================= */

let candles = [];
let current = null;

/* ================= UI ================= */

const tfContainer = document.getElementById("tfButtons");

Object.keys(TF_MAP).forEach(t=>{
 let btn=document.createElement("button");
 btn.innerText=t;
 if(t===tf) btn.classList.add("active");

 btn.onclick=()=>{
  tf=t;
  candles=[];
  current=null;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
 };

 tfContainer.appendChild(btn);
});

/* ================= WEBSOCKET ================= */

let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@aggTrade");

ws.onmessage = (m)=>{

 let data = JSON.parse(m.data);

 let trade = {
  time: Date.now()/1000,
  price: parseFloat(data.p),
  qty: parseFloat(data.q),
  side: data.m ? 'sell':'buy'
 };

 buildCandle(trade);
 render();

};

/* ================= BUILD ================= */

function buildCandle(trade){

 let tfSec = TF_MAP[tf];
 let bucket = Math.floor(trade.time / tfSec) * tfSec;

 if(!current || current.time !== bucket){

  if(current){
   candles.push(current);
   if(candles.length > 50) candles.shift();
  }

  current = {
   time: bucket,
   open: trade.price,
   high: trade.price,
   low: trade.price,
   close: trade.price,
   buy:0,
   sell:0,
   ladder:{}
  };
 }

 current.high = Math.max(current.high, trade.price);
 current.low  = Math.min(current.low, trade.price);
 current.close = trade.price;

 let cluster = Math.round(trade.price / CLUSTER_SIZE) * CLUSTER_SIZE;

 if(!current.ladder[cluster]){
  current.ladder[cluster] = {buy:0,sell:0};
 }

 if(trade.side==="buy"){
  current.ladder[cluster].buy += trade.qty;
  current.buy += trade.qty;
 } else {
  current.ladder[cluster].sell += trade.qty;
  current.sell += trade.qty;
 }

}

/* ================= RENDER ================= */

function render(){

 let html="";

 candles.slice().reverse().forEach(c=>{

  let delta = c.buy - c.sell;

  let maxVol = 0;
  Object.values(c.ladder).forEach(v=>{
   let t=v.buy+v.sell;
   if(t>maxVol) maxVol=t;
  });

  html += `
  <tr>
   <td colspan="5" class="blue">
    ${new Date(c.time*1000).toLocaleString()} |
    O:${c.open.toFixed(0)} H:${c.high.toFixed(0)} 
    L:${c.low.toFixed(0)} C:${c.close.toFixed(0)} 
    Δ:${delta.toFixed(2)}
   </td>
  </tr>`;

  Object.keys(c.ladder)
  .sort((a,b)=>b-a)
  .forEach(p=>{

   let b=c.ladder[p].buy;
   let s=c.ladder[p].sell;
   let d=b-s;
   let t=b+s;

   let width = maxVol ? (t/maxVol)*100 : 0;
   let intensity = t ? Math.min(Math.abs(d)/t,1) : 0;

   html += `
   <tr>

    <td>${p}</td>

    <td class="green">${b.toFixed(2)}</td>
    <td class="red">${s.toFixed(2)}</td>

    <td>
     <div style="
      position:absolute;
      left:0;top:0;height:100%;
      width:${width}%;
      background:rgba(59,130,246,0.25);
     "></div>

     <span class="${d>0?'green':'red'}">
      ${d.toFixed(2)}
     </span>
    </td>

    <td>
     <div style="
      height:6px;
      background:${d>0
        ? `rgba(34,197,94,${intensity})`
        : `rgba(239,68,68,${intensity})`
      };
     "></div>
    </td>

   </tr>`;
  });

 });

 document.getElementById("tbl").innerHTML = html;

}

</script>

</body>
</html>
