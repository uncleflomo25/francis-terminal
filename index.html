<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>V900 Today Candle Institutional Engine</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
background:#06111f;
color:#d7e6ff;
padding:14px;
}
h1{
font-size:20px;
margin-bottom:12px;
color:#7ec8ff;
letter-spacing:1px;
}
.grid{
display:grid;
grid-template-columns:2fr 2fr 1.1fr;
gap:12px;
height:calc(100vh - 70px);
}
.panel{
background:#091a2d;
border:1px solid #12395f;
border-radius:10px;
padding:10px;
overflow:auto;
box-shadow:0 0 10px rgba(0,0,0,.35);
}
.title{
font-size:13px;
color:#8fbfff;
margin-bottom:8px;
font-weight:700;
text-transform:uppercase;
}
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}
th,td{
padding:7px 6px;
border-bottom:1px solid #102e4c;
text-align:left;
}
th{color:#7ca9d6;font-size:12px}
.up{color:#00e676;font-weight:700}
.down{color:#ff5252;font-weight:700}
.side{color:#ffd54f;font-weight:700}
.small{font-size:12px;color:#7ca9d6}
.badge{
padding:5px 8px;
border-radius:7px;
font-weight:700;
display:inline-block;
margin-top:6px;
}
.green{background:#10361f;color:#00e676}
.red{background:#3b1313;color:#ff6565}
.yellow{background:#41380d;color:#ffd54f}
.feed{
font-size:12px;
line-height:1.7;
max-height:420px;
overflow:auto;
}
.row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
padding-bottom:8px;
border-bottom:1px solid #102e4c;
}
.big{
font-size:28px;
font-weight:800;
margin-bottom:6px;
}
.footer{
position:fixed;
bottom:8px;
right:15px;
font-size:11px;
color:#6b93bf;
}
</style>
</head>
<body>

<h1>V900 TODAY CANDLE INSTITUTIONAL ENGINE</h1>

<div class="grid">

<div class="panel">
<div class="title">Today Candle Matrix (Daily Candle Only)</div>
<table>
<thead>
<tr>
<th>Asset</th>
<th>Open</th>
<th>Live</th>
<th>%</th>
<th>Bias</th>
</tr>
</thead>
<tbody id="assetRows"></tbody>
</table>
</div>

<div class="panel">
<div class="title">Institutional Rotation Logic</div>
<table>
<thead>
<tr>
<th>Metric</th>
<th>Value</th>
<th>Today Bias</th>
<th>Meaning</th>
</tr>
</thead>
<tbody id="logicRows"></tbody>
</table>

<br>

<div class="title">Execution Board</div>
<table>
<thead>
<tr>
<th>Market</th>
<th>Signal</th>
<th>Status</th>
</tr>
</thead>
<tbody id="execRows"></tbody>
</table>
</div>

<div class="panel">
<div class="title">AI Regime Engine</div>
<div id="regime" class="big">LOADING...</div>
<div id="desc" class="small"></div>
<div id="signal"></div>

<br><br>

<div class="title">Live Feed</div>
<div class="feed" id="feed"></div>
</div>

</div>

<div class="footer">Realtime Binance + Today Candle Logic</div>

<script>
const assets = [
{key:"BTCUSDT",label:"BTCUSDT"},
{key:"ETHUSDT",label:"ETHUSDT"},
{key:"ETHBTC",label:"ETHBTC"}
];

// synthetic dominance metrics
let synthetic = {
BTCD:60.40,
ETHD:10.92,
USDTD:5.14,
TOTAL:3.10
};

function biasFromPct(p){
if(p > 1.2) return ['▲▲ STRONG UP','up'];
if(p > 0.15) return ['▲ UP','up'];
if(p < -1.2) return ['▼▼ STRONG DOWN','down'];
if(p < -0.15) return ['▼ DOWN','down'];
return ['▶ SIDEWAYS','side'];
}

async function getDaily(symbol){
const url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1d&limit=1`;
const r=await fetch(url);
const d=await r.json();
return {
open:parseFloat(d[0][1]),
close:parseFloat(d[0][4])
};
}

function addFeed(txt){
const el=document.getElementById("feed");
const time=new Date().toLocaleTimeString();
el.innerHTML=`<div class="row"><span>${time}</span><span>${txt}</span></div>`+el.innerHTML;
}

async function run(){
try{
let rows="";
let data={};

for(let a of assets){
const k=await getDaily(a.key);
const pct=((k.close-k.open)/k.open)*100;
const [txt,cls]=biasFromPct(pct);
data[a.key]={...k,pct,bias:txt,cls};

rows += `
<tr>
<td>${a.label}</td>
<td>${k.open.toFixed(a.key==="ETHBTC"?5:2)}</td>
<td>${k.close.toFixed(a.key==="ETHBTC"?5:2)}</td>
<td class="${cls}">${pct.toFixed(2)}%</td>
<td class="${cls}">${txt}</td>
</tr>`;
}

document.getElementById("assetRows").innerHTML=rows;

/* synthetic today movement */
synthetic.BTCD += (Math.random()-.5)*0.15;
synthetic.ETHD += (Math.random()-.5)*0.12;
synthetic.USDTD += (Math.random()-.5)*0.08;
synthetic.TOTAL += (Math.random()-.5)*0.20;

let logic = [
["BTC.D",synthetic.BTCD.toFixed(2)+"%", biasFromPct((Math.random()-.5)*2)[0],"Bitcoin share"],
["ETH.D",synthetic.ETHD.toFixed(2)+"%", biasFromPct((Math.random()-.5)*2)[0],"Ethereum share"],
["USDT.D",synthetic.USDTD.toFixed(2)+"%", biasFromPct((Math.random()-.5)*2)[0],"Cash demand"],
["TOTAL",synthetic.TOTAL.toFixed(2)+"T", biasFromPct((Math.random()-.5)*2)[0],"Total market cap"]
];

let logicRows="";
logic.forEach(x=>{
let c=x[2].includes("UP")?"up":x[2].includes("DOWN")?"down":"side";
logicRows+=`
<tr>
<td>${x[0]}</td>
<td>${x[1]}</td>
<td class="${c}">${x[2]}</td>
<td>${x[3]}</td>
</tr>`;
});
document.getElementById("logicRows").innerHTML=logicRows;

/* regime logic */
let regime="SIDEWAYS";
let desc="Mixed candle pressure";
let cls="yellow";
let sig="WAIT";

if(data.BTCUSDT.pct>0 && data.ETHBTC.pct<0){
regime="BTC SEASON TODAY";
desc="Bitcoin stronger than ETH";
cls="green";
sig="BUY BTC DIPS";
}
if(data.ETHUSDT.pct>0 && data.ETHBTC.pct>0){
regime="ETH ROTATION TODAY";
desc="Ethereum outperforming BTC";
cls="green";
sig="BUY ETH";
}
if(data.BTCUSDT.pct<0 && data.ETHUSDT.pct<0){
regime="RISK OFF TODAY";
desc="Both majors under pressure";
cls="red";
sig="REDUCE RISK";
}

document.getElementById("regime").textContent=regime;
document.getElementById("desc").textContent=desc;
document.getElementById("signal").innerHTML=`<span class="badge ${cls}">${sig}</span>`;

/* execution */
document.getElementById("execRows").innerHTML=`
<tr><td>BTCUSDT</td><td>${data.BTCUSDT.pct>0?'LONG':'SHORT'}</td><td class="${data.BTCUSDT.cls}">${data.BTCUSDT.bias}</td></tr>
<tr><td>ETHUSDT</td><td>${data.ETHUSDT.pct>0?'LONG':'SHORT'}</td><td class="${data.ETHUSDT.cls}">${data.ETHUSDT.bias}</td></tr>
<tr><td>ETHBTC</td><td>${data.ETHBTC.pct>0?'LONG ETH':'LONG BTC'}</td><td class="${data.ETHBTC.cls}">${data.ETHBTC.bias}</td></tr>
`;

addFeed(regime);

}catch(e){
document.getElementById("regime").textContent="API ERROR";
document.getElementById("desc").textContent="Binance blocked / retrying...";
}
}

run();
setInterval(run,10000);
</script>

</body>
</html>
