<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLOW TERMINAL V100 QUANT CORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#020814;
color:#00ffc8;
font-family:Arial;
overflow:hidden;
}

.wrap{
display:grid;
grid-template-columns:320px 1fr 360px;
grid-template-rows:60px 1fr;
height:100vh;
gap:8px;
padding:8px;
}

.panel{
background:#071c2e;
border:1px solid #0b3b5d;
border-radius:10px;
padding:10px;
overflow:hidden;
}

.header{
grid-column:1/4;
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:18px;
}

.big{font-size:28px;font-weight:bold;}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.center canvas{
width:100%!important;
height:100%!important;
}

.green{color:#00ff73}
.red{color:#ff4d5a}
.yellow{color:#ffd84d}
.blue{color:#00eaff}
</style>
</head>

<body>

<div class="wrap">

<div class="panel header">
<div>FLOW TERMINAL V100 — REAL-TIME QUANT CORE</div>
<div id="time"></div>
</div>

<!-- LEFT PANEL -->
<div class="panel">
<div class="big" id="regime">BOOTING ENGINE</div>

<table>
<tr><td>BTC</td><td id="btc">--</td></tr>
<tr><td>ETH</td><td id="eth">--</td></tr>

<tr><td>VELOCITY</td><td id="vel">--</td></tr>
<tr><td>ACCEL</td><td id="acc">--</td></tr>
<tr><td>FLOW SCORE</td><td id="flow">--</td></tr>
<tr><td>RISK</td><td id="risk">--</td></tr>
<tr><td>STATE</td><td id="state">--</td></tr>
</table>
</div>

<!-- CENTER -->
<div class="panel center">
<canvas id="chart"></canvas>
</div>

<!-- RIGHT -->
<div class="panel">
<div>INSTITUTIONAL FLOW STREAM</div>
<div id="feed" style="font-size:12px;margin-top:10px;line-height:1.5"></div>
</div>

</div>

<script>

// ================= CHART =================
const chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[
{label:"BTC",data:[],borderColor:"#00eaff",pointRadius:0,tension:0.2},
{label:"ETH",data:[],borderColor:"#00ff73",pointRadius:0,tension:0.2}
]
},
options:{
animation:false,
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"#00ffc8"}}},
scales:{
x:{ticks:{color:"#666"}},
y:{ticks:{color:"#666"}}
}
}
});

// ================= STATE =================
let btc=0, eth=0;
let prevBTC=0, prevETH=0;
let prevVelBTC=0, prevVelETH=0;

// ================= LOG =================
function log(t){
const d=document.createElement("div");
d.innerText=t;
document.getElementById("feed").prepend(d);
}

// ================= AI ENGINE =================
function engine(){

// velocity
let vBTC = btc - prevBTC;
let vETH = eth - prevETH;

// acceleration (V100 upgrade)
let aBTC = vBTC - prevVelBTC;
let aETH = vETH - prevVelETH;

// flow metrics
let velocity = (vBTC + vETH) * 100;
let accel = (aBTC + aETH) * 100;
let flow = (vETH - vBTC) * 100;
let risk = Math.abs(flow) + Math.abs(accel);

// state engine
let state =
risk > 2 ? "EXPANSION VOLATILITY" :
flow > 1 ? "ETH ROTATION" :
flow < -1 ? "BTC DOMINANCE" :
"BALANCED"

// store history
prevBTC = btc;
prevETH = eth;
prevVelBTC = vBTC;
prevVelETH = vETH;

return {velocity,accel,flow,risk,state};
}

// ================= UI =================
function updateUI(){

let e = engine();

document.getElementById("btc").innerText = btc.toFixed(2);
document.getElementById("eth").innerText = eth.toFixed(2);

document.getElementById("vel").innerText = e.velocity.toFixed(3);
document.getElementById("acc").innerText = e.accel.toFixed(3);
document.getElementById("flow").innerText = e.flow.toFixed(3);
document.getElementById("risk").innerText = e.risk.toFixed(3);
document.getElementById("state").innerText = e.state;

// regime color
if(e.state === "EXPANSION VOLATILITY"){
setRegime("LIQUIDITY EXPANSION","#00ff73");
}
else if(e.state === "ETH ROTATION"){
setRegime("RISK-ON ROTATION","#00eaff");
}
else if(e.state === "BTC DOMINANCE"){
setRegime("RISK-OFF FLOW","#ff4d5a");
}
else{
setRegime("NEUTRAL FLOW","#aaaaaa");
}
}

function setRegime(t,c){
document.getElementById("regime").innerText=t;
document.getElementById("regime").style.color=c;
}

// ================= CHART =================
function updateChart(){
const t=new Date().toLocaleTimeString();

chart.data.labels.push(t);
chart.data.datasets[0].data.push(btc);
chart.data.datasets[1].data.push(eth);

if(chart.data.labels.length>100){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
chart.data.datasets[1].data.shift();
}

chart.update("none");
}

// ================= REAL-TIME DATA =================
const btcWS = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");
btcWS.onmessage=(e)=>{
btc = +JSON.parse(e.data).p;
updateUI();
updateChart();
};

const ethWS = new WebSocket("wss://stream.binance.com:9443/ws/ethusdt@trade");
ethWS.onmessage=(e)=>{
eth = +JSON.parse(e.data).p;
updateUI();
updateChart();
};

// ================= CLOCK =================
setInterval(()=>document.getElementById("time").innerText=new Date().toLocaleString(),1000);

// ================= INIT =================
btcWS.onopen=()=>log("BTC STREAM ONLINE");
ethWS.onopen=()=>log("ETH STREAM ONLINE");

</script>

</body>
</html>
