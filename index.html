<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRANCIS TERMINAL • TradingView Style</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0a0e14;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
padding:0;
overflow:hidden;
}
.topbar{
height:48px;
background:#131722;
border-bottom:1px solid #2a2e39;
display:flex;
align-items:center;
padding:0 14px;
gap:14px;
font-size:14px;
}
.logo{
font-weight:700;
color:#fff;
}
.btn{
padding:6px 10px;
background:#1e222d;
border-radius:6px;
color:#c7cbd1;
}
.wrap{
display:grid;
grid-template-columns:1fr 300px;
height:calc(100vh - 48px);
}
.left{
position:relative;
background:#131722;
}
.right{
background:#0f1623;
border-left:1px solid #2a2e39;
padding:12px;
display:grid;
gap:10px;
align-content:start;
}
.card{
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
padding:12px;
}
.lab{
font-size:11px;
color:#9aa4af;
}
.val{
font-size:28px;
font-weight:700;
margin-top:6px;
}
canvas{
width:100%;
height:100%;
display:block;
}
.watermark{
position:absolute;
left:18px;
top:16px;
font-size:26px;
font-weight:700;
color:rgba(255,255,255,.05);
pointer-events:none;
}
.status{
position:absolute;
left:16px;
bottom:12px;
font-size:13px;
color:#9aa4af;
display:flex;
gap:16px;
}
.green{color:#26a69a}
.red{color:#ef5350}
.gold{color:#f0b90b}
@media(max-width:900px){
.wrap{grid-template-columns:1fr}
.right{display:none}
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">FRANCIS TERMINAL</div>
<div class="btn">1m</div>
<div class="btn">5m</div>
<div class="btn">1H</div>
<div class="btn">4H</div>
<div class="btn">1D</div>
<div class="btn">Indicators</div>
</div>

<div class="wrap">

<div class="left">
<div class="watermark">FRANCIS TERMINAL</div>
<canvas id="chart" width="1400" height="900"></canvas>

<div class="status">
<div>BTC.D / USDT.D / ETHBTC / ETH.D / TOTAL</div>
<div>Refresh: 5s</div>
<div id="clock"></div>
</div>
</div>

<div class="right">

<div class="card"><div class="lab">BTC.D</div><div class="val" id="btc">--</div></div>
<div class="card"><div class="lab">USDT.D</div><div class="val" id="usdt">--</div></div>
<div class="card"><div class="lab">ETHBTC</div><div class="val" id="ethbtc">--</div></div>
