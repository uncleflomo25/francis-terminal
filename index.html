<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INSTITUTIONAL FOOTPRINT V4</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#e5e7eb}

header{
display:flex;justify-content:space-between;
padding:12px 16px;border-bottom:1px solid #1e293b;
}

.wrap{
display:grid;
grid-template-columns:260px 1fr 340px;
gap:12px;padding:12px;
}

.panel{
background:#07101d;
border:1px solid #1e293b;
border-radius:16px;
padding:12px;
}

.title{font-size:13px;font-weight:700;margin-bottom:8px}

.big{font-size:26px;font-weight:800}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#eab308}

.tf{
padding:6px 8px;
margin:2px;
background:#0f172a;
border-radius:6px;
display:inline-block;
cursor:pointer;
font-size:12px;
}

.tf.active{background:#1d4ed8}

.signal{
font-size:34px;
text-align:center;
padding:10px;
}

.table{
width:100%;
font-size:12px;
border-collapse:collapse;
}

.table td{
padding:4px;
border-bottom:1px solid #132033;
}

.heat{
display:grid;
grid-template-columns:repeat(20,1fr);
gap:2px;
}

.heat div{height:14px}

.small{font-size:12px;color:#94a3b8}

</style>
</head>

<body>

<header>
<div>INSTITUTIONAL FOOTPRINT V4</div>
<div id="status" class="yellow">CONNECTING...</div>
</header>

<div class="wrap">

<!-- LEFT -->
<div class="panel">

<div class="title">Timeframes</div>

<span class="tf active" onclick="setTF('1m',this)">1m</span>
<span class="tf" onclick="setTF('5m',this)">5m</span>
<span class="tf" onclick="setTF('15m',this)">15m</span>
<span class="tf" onclick="setTF('1h',this)">1H</span>
<span class="tf" onclick="setTF('4h',this)">4H</span>
<span class="tf" onclick="setTF('6h',this)">6H</span>
<span class="tf" onclick="setTF('12h',this)">12H</span>
<span class="tf" onclick="setTF('3d',this)">3D</span>
<span class="tf" onclick="setTF('1w',this)">1W</span>

<div class="title" style="margin-top:12px">Price</div>
<div class="big" id="price">0</div>

<div class="title">CVD</div>
<div class="big yellow" id="cvd">0</div>

<div class="title">Delta</div>
<div class="big" id="delta">0</div>

<div class="title">Buy / Sell</div>
<div class="big green" id="buy">0</div>
<div class="big red" id="sell">0</div>

</div>

<!-- CENTER -->
<div class="panel">

<div class="title">Footprint Ladder</div>
<table class="table" id="tbl"></table>

<div class="title">Pressure Heatmap</div>
<div class="heat" id="heat"></div>

</div>

<!-- RIGHT -->
<div class="panel">

<div class="title">Signal Engine</div>
<div class="signal yellow" id="signal">WAIT</div>

<div class="title">Reason</div>
<div class="small" id="why">Waiting for flow...</div>

</div>

</div>

<script>

let ws;
let trades=[];
let tf='1m';
let lastPrice=0;
let cvd=0;

const tfSec={
'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,
'6h':21600,'12h':43200,'3d':259200,'1w':604800
};

function now(){return Math.floor(Date.now()/1000);}

// CONNECT
function connect(){
ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');

ws.onopen=()=>{
setStatus("LIVE","green");
};

ws.onclose=()=>{
setStatus("RECONNECTING","red");
setTimeout(connect,2000);
};

ws.onmessage=(m)=>{
const t=JSON.parse(m.data);
process(t);
update();
};
}

function setStatus(t,c){
let el=document.getElementById("status");
el.innerText=t;
el.className=c;
}

// PROCESS FLOW
function process(t){
let price=parseFloat(t.p);
let qty=parseFloat(t.q);
let sell=t.m;

lastPrice=price;

// CVD (institutional core)
cvd += sell ? -qty : qty;

trades.push({
time:Math.floor(t.T/1000),
price,
qty,
side:sell?'sell':'buy'
});
}

// BUILD FOOTPRINT
function build(){
let cut=now()-tfSec[tf];

let buy=0,sell=0;
let ladder={};

trades=trades.filter(t=>t.time>=cut);

// memory control (VERY IMPORTANT for 3D/1W)
if(trades.length>50000) trades=trades.slice(-30000);

for(let t of trades){

let p=t.price.toFixed(1);

if(!ladder[p]) ladder[p]={buy:0,sell:0};

if(t.side==='buy'){
ladder[p].buy+=t.qty;
buy+=t.qty;
}else{
ladder[p].sell+=t.qty;
sell+=t.qty;
}
}

return {ladder,buy,sell,delta:buy-sell};
}

// SIGNAL ENGINE (smart money logic)
function signal(d,buy,sell){
let total=buy+sell;

if(total<8) return ["WAIT","Low participation","yellow"];

if(Math.abs(d)<total*0.1 && total>20)
return ["ABSORPTION","Big passive absorption","yellow"];

if(d>total*0.3)
return ["LONG","Aggressive buying pressure","green"];

if(d<-total*0.3)
return ["SHORT","Aggressive selling pressure","red"];

return ["CHOP","Balanced flow","yellow"];
}

// UPDATE UI
function update(){

let {ladder,buy,sell,delta}=build();

document.getElementById("price").innerText=lastPrice.toFixed(2);
document.getElementById("cvd").innerText=cvd.toFixed(2);
document.getElementById("buy").innerText=buy.toFixed(2);
document.getElementById("sell").innerText=sell.toFixed(2);
document.getElementById("delta").innerText=delta.toFixed(2);

let [s,w,c]=signal(delta,buy,sell);

let sig=document.getElementById("signal");
sig.innerText=s;
sig.className="signal "+c;

document.getElementById("why").innerText=w;

// FOOTPRINT TABLE
let html="";

Object.keys(ladder)
.sort((a,b)=>b-a)
.slice(0,25)
.forEach(p=>{
let b=ladder[p].buy;
let s=ladder[p].sell;
let d=b-s;

html+=`
<tr>
<td>${p}</td>
<td class="green">${b.toFixed(2)}</td>
<td class="red">${s.toFixed(2)}</td>
<td class="${d>0?'green':'red'}">${d.toFixed(2)}</td>
</tr>`;
});

document.getElementById("tbl").innerHTML=html;

// HEATMAP
let heat=document.getElementById("heat");
heat.innerHTML="";

for(let i=0;i<20;i++){
let d=document.createElement("div");
let inten=Math.min(Math.abs(delta)/60,1);

d.style.background =
delta>0
?`rgba(34,197,94,${inten})`
:`rgba(239,68,68,${inten})`;

heat.appendChild(d);
}

}

// TF SWITCH
function setTF(x,el){
tf=x;

document.querySelectorAll(".tf")
.forEach(e=>e.classList.remove("active"));

el.classList.add("active");
}

// START
connect();

</script>

</body>
</html>
