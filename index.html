<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 FRANCIS TERMINAL V10 — SYNC ENGINE</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
--text:#fff;
--muted:#c6a8ff;
--line:#6e2cff;
--green:#00ff9c;
--red:#ff4d6d;
--gold:#ffd700;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
min-height:100vh;
background:
radial-gradient(circle at 20% 15%, rgba(150,0,255,.22), transparent 22%),
radial-gradient(circle at 80% 10%, rgba(80,0,180,.18), transparent 20%),
radial-gradient(circle at 50% 85%, rgba(130,0,255,.14), transparent 25%),
linear-gradient(135deg,#000,#07000c,#150020,#000);
background-attachment:fixed;
}

.header{
text-align:center;
padding:14px;
font-size:22px;
font-weight:700;
background:rgba(0,0,0,.55);
border-bottom:1px solid var(--line);
}

.sub{
text-align:center;
font-size:12px;
color:var(--muted);
padding:6px 0 10px;
}

.top{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.box,.master{
background:#090611;
border:1px solid var(--line);
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 0 15px rgba(120,0,255,.12);
}

.symbol{font-size:12px;color:var(--muted);}
.price{font-size:19px;font-weight:700;margin-top:4px;}
.arrow{font-size:20px;margin-top:5px;}
.note{font-size:11px;margin-top:4px;color:#a98bff;}

.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--gold);}

.master{
margin:0 10px 10px;
font-size:18px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.chart{
height:360px;
border:1px solid var(--line);
border-radius:14px;
overflow:hidden;
background:#000;
}

.footer{
text-align:center;
font-size:11px;
padding:10px;
color:#9b85d1;
}

@media(max-width:1100px){
.top{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:700px){
.top,.grid{grid-template-columns:1fr;}
.chart{height:320px;}
}
</style>
</head>

<body>

<div class="header">💜 FRANCIS TERMINAL V10 — SYNC ENGINE</div>
<div class="sub">Top Panel Now Uses Same Sources As Charts</div>

<div class="top">

<div class="box">
<div class="symbol">USDT.D</div>
<div class="price" id="p1">--</div>
<div class="arrow" id="a1">➜</div>
<div class="note" id="n1">Loading</div>
</div>

<div class="box">
<div class="symbol">ETHBTC</div>
<div class="price" id="p2">--</div>
<div class="arrow" id="a2">➜</div>
<div class="note" id="n2">Loading</div>
</div>

<div class="box">
<div class="symbol">BTC.D</div>
<div class="price" id="p3">--</div>
<div class="arrow" id="a3">➜</div>
<div class="note" id="n3">Loading</div>
</div>

<div class="box">
<div class="symbol">TOTAL</div>
<div class="price" id="p4">--</div>
<div class="arrow" id="a4">➜</div>
<div class="note" id="n4">Loading</div>
</div>

<div class="box">
<div class="symbol">MASTER</div>
<div class="price" id="p5">--</div>
<div class="arrow" id="a5">➜</div>
<div class="note" id="n5">Loading</div>
</div>

</div>

<div class="master" id="masterBox">Syncing Real-Time Data...</div>

<div class="grid">
<div id="c1" class="chart"></div>
<div id="c2" class="chart"></div>
<div id="c3" class="chart"></div>
<div id="c4" class="chart"></div>
</div>

<div class="footer">True Sync Version • Charts + Boxes Match</div>

<script>
function setArrow(id,v){
let el=document.getElementById(id);
if(v>0) el.innerHTML='<span class="green">▲</span>';
else if(v<0) el.innerHTML='<span class="red">▼</span>';
else el.innerHTML='<span class="yellow">➜</span>';
}

async function binance(sym){
let r=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+sym);
return await r.json();
}

async function gecko(){
let r=await fetch("https://api.coingecko.com/api/v3/global");
return await r.json();
}

async function update(){
try{

const ethbtc = await binance("ETHBTC");
const cg = await gecko();

let eb = parseFloat(ethbtc.priceChangePercent);
let ethbtcPrice = parseFloat(ethbtc.lastPrice);

let btcDom = cg.data.market_cap_percentage.btc;
let usdtDom = cg.data.market_cap_percentage.usdt;
let totalCap = cg.data.total_market_cap.usd;

/* use dominance movement logic aligned to charts */
p1.innerText = usdtDom.toFixed(2)+"%";
setArrow("a1",7-usdtDom);
n1.innerText = usdtDom>7 ? "Bullish USDT.D" : "Weak USDT.D";

p2.innerText = ethbtcPrice.toFixed(6);
setArrow("a2",eb);
n2.innerText = eb>0 ? "ETH Up" : "ETH Down";

p3.innerText = btcDom.toFixed(2)+"%";
setArrow("a3",btcDom-57);
n3.innerText = btcDom>57 ? "BTC Rising" : "BTC Falling";

p4.innerText = (totalCap/1e12).toFixed(2)+"T";
setArrow("a4",totalCap-2600000000000);
n4.innerText = totalCap>2600000000000 ? "Cap Rising" : "Cap Weak";

/* MASTER SCORE */
let score=0;

if(usdtDom<7)score+=2; else score-=2;
if(eb>0)score+=1; else score-=1;
if(btcDom>57)score+=1; else score-=1;
if(totalCap>2600000000000)score+=2; else score-=2;

let bias="SIDEWAYS";
let val=0;

if(score>=3){bias="BULLISH";val=1;}
if(score<=-3){bias="BEARISH";val=-1;}

p5.innerText = score;
setArrow("a5",val);
n5.innerText = bias;

masterBox.innerText =
"MASTER DAILY BIAS: "+bias+" | SCORE: "+score;

}catch(e){
masterBox.innerText="Waiting For API...";
}
}

update();
setInterval(update,5000);

/* charts */
setTimeout(function(){

new TradingView.widget({
container_id:"c1",
symbol:"CRYPTOCAP:USDT.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c2",
symbol:"BINANCE:ETHBTC",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c3",
symbol:"CRYPTOCAP:BTC.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c4",
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

},1200);
</script>

</body>
</html>
