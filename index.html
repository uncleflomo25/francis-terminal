<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Institutional Orderflow Terminal</title>
<style>
body{margin:0;background:#050b12;color:#d8e6f3;font-family:Arial,sans-serif}header{padding:14px 18px;border-bottom:1px solid #183047;display:flex;justify-content:space-between;align-items:center}h1{margin:0;font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}.card{background:#08131f;border:1px solid #183047;border-radius:14px;padding:12px;box-shadow:0 0 18px rgba(0,0,0,.35)}.row{display:flex;justify-content:space-between;align-items:center}.sym{font-size:22px;font-weight:700}.chg.up{color:#00d26a}.chg.down{color:#ff4d4d}canvas{width:100%;height:140px;background:#06101a;border-radius:10px;margin-top:8px}.meter{height:10px;background:#102234;border-radius:8px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#00d26a,#0ff)}table{width:100%;font-size:12px;border-collapse:collapse;margin-top:8px}td,th{padding:4px;border-bottom:1px solid #102234;text-align:right}th:first-child,td:first-child{text-align:left}.footer{padding:12px;color:#7ea0bf}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
<header><h1>CRYPTO ORDERFLOW TERMINAL</h1><div id='clock'></div></header>
<div class='grid' id='grid'></div>
<div class='footer'>Single-file dashboard • simulated live data • Chrome ready</div>
<script>
const symbols=['BTC.USDT.D','ETHBTC','TOTAL','ETH'];
const state={};
function rnd(a,b){return Math.random()*(b-a)+a}
function makeCard(sym){state[sym]={price:rnd(10,100),chg:rnd(-1,1),vals:Array.from({length:40},()=>rnd(30,100))};return `<div class='card'><div class='row'><div class='sym'>${sym}</div><div class='chg' id='chg-${sym}'></div></div><div id='px-${sym}'></div><canvas id='cv-${sym}' width='600' height='140'></canvas><div style='margin-top:8px'>Liquidity</div><div class='meter'><div class='fill' id='liq-${sym}' style='width:50%'></div></div><table><tr><th>Level</th><th>Bid</th><th>Ask</th></tr><tbody id='tb-${sym}'></tbody></table></div>`}
document.getElementById('grid').innerHTML=symbols.map(makeCard).join('');
function draw(sym){const c=document.getElementById('cv-'+sym),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);x.strokeStyle='#123';for(let i=0;i<6;i++){x.beginPath();x.moveTo(0,i*24);x.lineTo(c.width,i*24);x.stroke()}const v=state[sym].vals;x.beginPath();x.strokeStyle='#00d26a';v.forEach((n,i)=>{let px=i*(c.width/(v.length-1)),py=c.height-(n/100*c.height);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleString();symbols.forEach(sym=>{let s=state[sym];s.price+=rnd(-1,1);s.chg+=rnd(-.2,.2);s.vals.push(Math.max(10,Math.min(100,s.vals.at(-1)+rnd(-8,8))));s.vals.shift();document.getElementById('px-'+sym).textContent='Price: '+s.price.toFixed(2);const ch=document.getElementById('chg-'+sym);ch.textContent=(s.chg>0?'+':'')+s.chg.toFixed(2)+'%';ch.className='chg '+(s.chg>=0?'up':'down');document.getElementById('liq-'+sym).style.width=(50+s.chg*10)+'%';let rows='';for(let i=1;i<=6;i++)rows+=`<tr><td>${i}</td><td>${rnd(1,99).toFixed(1)}M</td><td>${rnd(1,99).toFixed(1)}M</td></tr>`;document.getElementById('tb-'+sym).innerHTML=rows;draw(sym);});}
setInterval(tick,1000);tick();
</script>
</body></html>
