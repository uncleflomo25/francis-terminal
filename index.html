<!-- DAILY ENGINE MODE ENABLED -->
<script>

/* ===============================
   FRANCIS TERMINAL GOD MODE V2
   DAILY TIMEFRAME ENGINE
================================= */

const TIMEFRAME = "1D";   // SET TO DAILY
const REFRESH_MS = 60000; // refresh every 60 sec

async function loadDailyEngine(){

// COINGECKO GLOBAL DAILY SNAPSHOT
const cg = await fetch("https://api.coingecko.com/api/v3/global")
.then(r=>r.json());

// BINANCE DAILY CANDLE ETHBTC
const ethbtc = await fetch(
"https://api.binance.com/api/v3/klines?symbol=ETHBTC&interval=1d&limit=2"
).then(r=>r.json());

// BINANCE DAILY BTCUSDT
const btc = await fetch(
"https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=2"
).then(r=>r.json());

/* ==========================
   DAILY VALUES
========================== */

let btcDom = cg.data.market_cap_percentage.btc;
let usdtDom = cg.data.market_cap_percentage.usdt;
let ethDom = cg.data.market_cap_percentage.eth;
let total = cg.data.total_market_cap.usd;

// ETHBTC DAILY CHANGE
let eOpen = parseFloat(ethbtc[1][1]);
let eClose = parseFloat(ethbtc[1][4]);
let ethbtcChange = ((eClose-eOpen)/eOpen)*100;

// BTC DAILY CHANGE
let bOpen = parseFloat(btc[1][1]);
let bClose = parseFloat(btc[1][4]);
let btcChange = ((bClose-bOpen)/bOpen)*100;

/* ==========================
   DAILY BIAS ENGINE
========================== */

let score = 0;

// BTC strength
if(btcDom > 57) score += 2;
if(btcChange > 0) score += 2;

// USDT weakness bullish
if(usdtDom < 8) score += 2;
else score -= 2;

// ETHBTC strength alt bullish
if(ethbtcChange > 0) score += 2;
else score -= 1;

// TOTAL size
if(total > 2.5e12) score += 1;

let bias = "SIDEWAYS";
let color = "yellow";
let arrow = "▶";

if(score >=5){
bias="BULLISH";
color="#16c784";
arrow="▲";
}
else if(score <=1){
bias="BEARISH";
color="#ea3943";
arrow="▼";
}

/* ==========================
   DISPLAY
========================== */

document.getElementById("engineTF").innerText = "DAILY TF";
document.getElementById("biasText").innerText = arrow+" "+bias;
document.getElementById("biasText").style.color = color;

document.getElementById("btcdom").innerText = btcDom.toFixed(2)+"%";
document.getElementById("usdtdom").innerText = usdtDom.toFixed(2)+"%";
document.getElementById("ethdom").innerText = ethDom.toFixed(2)+"%";
document.getElementById("ethbtc").innerText = eClose.toFixed(5);
document.getElementById("total").innerText =
"$"+(total/1e12).toFixed(2)+"T";

}

/* START */
loadDailyEngine();
setInterval(loadDailyEngine,REFRESH_MS);

</script>
