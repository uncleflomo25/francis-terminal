<!DOCTYPE html>
<html>
<head>
    <title>Live Composite Terminal</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0b0f1a;
            color: white;
            font-family: monospace;
        }

        #topbar {
            padding: 10px;
            background: #111827;
            font-size: 14px;
        }

        #chart {
            width: 100%;
            height: 95vh;
        }
    </style>
</head>

<body>

<div id="topbar">
    ⚡ LIVE COMPOSITE LIQUIDITY STREAM (USDT.D vs TOTAL)
</div>

<div id="chart"></div>

<script>
let chartDiv = document.getElementById("chart");

async function loadChart() {
    const res = await fetch("/data");
    const fig = await res.json();

    Plotly.react("chart", fig.data, fig.layout);
}

// initial load
loadChart();

// 🔥 LIVE STREAM LOOP (every 5 seconds)
setInterval(loadChart, 5000);

</script>

</body>
</html>
