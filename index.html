<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V17 Institutional Liquidity Footprint Desk</title>

<style>
body {
  margin:0;
  background:#05070c;
  font-family: monospace;
  color:#e5e7eb;
}

#topbar {
  padding:10px;
  background:#0f172a;
  display:flex;
  gap:10px;
  align-items:center;
}

select, button {
  background:#111827;
  color:white;
  border:none;
  padding:6px 10px;
}

#stats {
  margin-left:10px;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<div id="topbar">
  TF:
  <select id="tf">
    <option value="60000">1m</option>
    <option value="300000">5m</option>
    <option value="900000">15m</option>
    <option value="3600000">1H</option>
    <option value="14400000">4H</option>
    <option value="86400000">1D</option>
  </select>

  <button onclick="toggle()">START / STOP</button>

  <div id="stats">
    FLOW: <span id="flow">--</span>
  </div>
</div>

<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

// ---------------- STATE ----------------
let running = true;
let candles = [];

let currentTF = parseInt(document.getElementById("tf").value);

let lastTOTAL = 0;
let lastUSDT = 0;
let lastBTC = 0;

let tfStart = Date.now();
let tfFlow = 0;

// ---------------- DATA ----------------
async function fetchTOTAL(){
  try {
    let res = await fetch("https://api.llama.fi/globaldata");
    let d = await res.json();
    return d.totalMarketCap || 1;
  } catch(e){
    return 1000000000000;
  }
}

async function fetchBTC(){
  try {
    let res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    let d = await res.json();
    return parseFloat(d.price);
  } catch(e){
    return 40000;
  }
}

// ---------------- USDT.D MODEL (FIXED) ----------------
function calcUSDTD(total){
  return 100 / (total / 1e12);
}

// ---------------- FLOW ENGINE ----------------
function computeFlow(total, usdt, btc){

  let dT = total - lastTOTAL;
  let dU = usdt - lastUSDT;
  let dB = btc - lastBTC;

  lastTOTAL = total;
  lastUSDT = usdt;
  lastBTC = btc;

  return (dT * 0.5) - (dU * 0.3) + (dB * 0.2);
}

// ---------------- CANDLE CLOSE ----------------
function closeCandle(){

  if(tfFlow === 0) return;

  let levels = [];
  let intensity = Math.min(10, Math.max(3, Math.abs(tfFlow) / 50));

  for(let i=0;i<intensity;i++){
    levels.push({
      vol: Math.floor(Math.abs(tfFlow) * (Math.random()*0.4+0.6)),
      side: tfFlow > 0 ? "buy" : "sell"
    });
  }

  candles.push({flow: tfFlow, levels});

  if(candles.length > 30) candles.shift();

  tfFlow = 0;
}

// ---------------- DRAW ----------------
function draw(){

  ctx.fillStyle = "#05070c";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let x = 80;
  let center = canvas.height/2;

  candles.forEach(c => {

    c.levels.forEach((lvl,i)=>{

      let y = center - i*18;

      ctx.fillStyle = "#111";
      ctx.fillRect(x,y,60,16);

      ctx.fillStyle = lvl.side === "buy"
        ? "rgba(34,197,94,0.55)"
        : "rgba(239,68,68,0.55)";

      ctx.fillRect(x,y,60,16);

      ctx.fillStyle = "#fff";
      ctx.font = "12px monospace";
      ctx.fillText(lvl.vol, x+10, y+12);
    });

    x += 75;
  });
}

// ---------------- ENGINE ----------------
async function engine(){

  if(!running) return;

  let total = await fetchTOTAL();
  let btc = await fetchBTC();
  let usdt = calcUSDTD(total);

  let flow = computeFlow(total, usdt, btc);

  tfFlow += flow;

  document.getElementById("flow").innerText = tfFlow.toFixed(2);

  draw();
}

// ---------------- LOOP ----------------
setInterval(() => {

  if(!running) return;

  let now = Date.now();

  if(now - tfStart >= currentTF){
    closeCandle();
    tfStart = now;
  }

  engine();

}, 1200);

// ---------------- UI ----------------
function toggle(){
  running = !running;
}

document.getElementById("tf").addEventListener("change", e=>{
  currentTF = parseInt(e.target.value);
  tfStart = Date.now();
});

</script>

</body>
</html>
