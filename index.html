<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FOOTPRINT ELITE V2 PRO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#e5e7eb}
header{padding:12px 16px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between}
.wrap{display:grid;grid-template-columns:260px 1fr 320px;gap:12px;padding:12px}
.panel{background:#07101d;border:1px solid #1e293b;border-radius:16px;padding:12px}
.title{font-size:13px;font-weight:700;margin-bottom:8px}
.big{font-size:28px;font-weight:800}
.green{color:#22c55e}.red{color:#ef4444}.yellow{color:#eab308}
.signal{font-size:36px;text-align:center;padding:10px 0}
.tf{padding:6px;margin:2px;background:#0f172a;border-radius:6px;display:inline-block;cursor:pointer}
.tf.active{background:#1d4ed8}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table td{padding:4px;border-bottom:1px solid #132033}
.heat{display:grid;grid-template-columns:repeat(20,1fr);gap:2px}
.heat div{height:14px}
</style>
</head>

<body>

<header>
<div>FOOTPRINT ELITE V2 PRO</div>
<div id="status" class="yellow">CONNECTING...</div>
</header>

<div class="wrap">

<!-- LEFT -->
<div class="panel">
<div class="title">Timeframes</div>
<div>
<span class="tf active" onclick="setTF('1m',this)">1m</span>
<span class="tf" onclick="setTF('5m',this)">5m</span>
<span class="tf" onclick="setTF('15m',this)">15m</span>
<span class="tf" onclick="setTF('1h',this)">1H</span>
<span class="tf" onclick="setTF('4h',this)">4H</span>
<span class="tf" onclick="setTF('1d',this)">1D</span>
</div>

<div class="title">Price</div>
<div class="big" id="price">0</div>

<div class="title">Delta</div>
<div class="big yellow" id="delta">0</div>

<div class="title">Buy</div>
<div class="big green" id="buy">0</div>

<div class="title">Sell</div>
<div class="big red" id="sell">0</div>
</div>

<!-- CENTER -->
<div class="panel">
<div class="title">Footprint</div>
<table class="table" id="tbl"></table>

<div class="title">Heatmap</div>
<div class="heat" id="heat"></div>
</div>

<!-- RIGHT -->
<div class="panel">
<div class="title">Signal</div>
<div class="signal yellow" id="signal">WAIT</div>

<div class="title">Reason</div>
<div id="why">Waiting...</div>
</div>

</div>

<script>

let ws;
let trades=[];
let currentTF='1m';
let lastPrice=0;

const tfSec={
'1m':60,
'5m':300,
'15m':900,
'1h':3600,
'4h':14400,
'1d':86400
};

function now(){return Math.floor(Date.now()/1000);}

// CONNECT
function connect(){
  ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');

  ws.onopen=()=>{
    document.getElementById('status').innerText="LIVE";
  };

  ws.onclose=()=>{
    document.getElementById('status').innerText="RECONNECTING";
    setTimeout(connect,2000);
  };

  ws.onmessage=(msg)=>{
    const t=JSON.parse(msg.data);
    processTrade(t);
    update();
  };
}

// PROCESS TRADE
function processTrade(t){
  const price=parseFloat(t.p);
  const qty=parseFloat(t.q);
  const isSell=t.m;

  lastPrice=price;

  trades.push({
    time:Math.floor(t.T/1000),
    price,
    qty,
    side:isSell?'sell':'buy'
  });
}

// BUILD DATA
function build(){
  const cutoff=now()-tfSec[currentTF];

  let buy=0,sell=0;
  let ladder={};

  trades=trades.filter(t=>t.time>=cutoff);

  trades.forEach(t=>{
    let p=t.price.toFixed(1);

    if(!ladder[p]) ladder[p]={buy:0,sell:0};

    if(t.side==='buy'){
      ladder[p].buy+=t.qty;
      buy+=t.qty;
    }else{
      ladder[p].sell+=t.qty;
      sell+=t.qty;
    }
  });

  return {ladder,buy,sell,delta:buy-sell};
}

// SIGNAL
function signal(delta,buy,sell){
  const total=buy+sell;

  if(total<5) return ["WAIT","Low volume","yellow"];

  if(delta>total*0.25) return ["LONG","Aggressive buyers","green"];

  if(delta<-total*0.25) return ["SHORT","Aggressive sellers","red"];

  return ["CHOP","Balanced","yellow"];
}

// DRAW
function update(){
  const {ladder,buy,sell,delta}=build();

  document.getElementById('price').innerText=lastPrice.toFixed(2);
  document.getElementById('buy').innerText=buy.toFixed(2);
  document.getElementById('sell').innerText=sell.toFixed(2);
  document.getElementById('delta').innerText=delta.toFixed(2);

  const [s,w,c]=signal(delta,buy,sell);

  let sig=document.getElementById('signal');
  sig.innerText=s;
  sig.className="signal "+c;

  document.getElementById('why').innerText=w;

  // TABLE
  let html="";
  Object.keys(ladder).sort((a,b)=>b-a).slice(0,20).forEach(p=>{
    let b=ladder[p].buy;
    let s=ladder[p].sell;
    let d=b-s;

    html+=`<tr>
      <td>${p}</td>
      <td class="green">${b.toFixed(2)}</td>
      <td class="red">${s.toFixed(2)}</td>
      <td class="${d>0?'green':'red'}">${d.toFixed(2)}</td>
    </tr>`;
  });
  document.getElementById('tbl').innerHTML=html;

  // HEAT
  let heat=document.getElementById('heat');
  heat.innerHTML='';
  for(let i=0;i<20;i++){
    let d=document.createElement('div');
    let inten=Math.min(Math.abs(delta)/50,1);
    d.style.background=delta>0?`rgba(34,197,94,${inten})`:`rgba(239,68,68,${inten})`;
    heat.appendChild(d);
  }
}

// TF SWITCH
function setTF(tf,el){
  currentTF=tf;
  document.querySelectorAll('.tf').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

// START
connect();

</script>

</body>
</html>
