<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composite Footprint Dashboard</title>
<style>
body{margin:0;background:#05080d;color:#e5e7eb;font-family:Arial,sans-serif}header{padding:12px 16px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center}.grid{display:grid;grid-template-columns:280px 1fr 320px;gap:12px;padding:12px}.panel{background:#0b1220;border:1px solid #1f2937;border-radius:16px;padding:12px}.title{font-weight:700;margin-bottom:10px}.controls label{display:block;font-size:12px;margin-top:8px}.controls select,.controls input{width:100%;padding:8px;border-radius:10px;background:#111827;color:#fff;border:1px solid #374151}.table{width:100%;border-collapse:collapse;font-size:12px}.table td,.table th{padding:6px;border-bottom:1px solid #1f2937;text-align:right}.buy{color:#22c55e}.sell{color:#ef4444}.bars div{height:16px;margin:6px 0;background:#111827;position:relative;border-radius:8px;overflow:hidden}.bars span{position:absolute;top:0;bottom:0;left:0;background:#22c55e}.gauge{height:180px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#22c55e}.small{font-size:12px;color:#9ca3af}.heat{display:grid;grid-template-columns:repeat(30,1fr);gap:2px}.heat div{height:18px;background:#111827;border-radius:3px}.footer{padding:0 12px 12px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>
<header><div><strong>COMPOSITE FOOTPRINT PRO</strong><div class='small'>BTC + ETHBTC + USDT.D + BTC.D</div></div><div id='clock'></div></header>
<div class='grid'>
<div class='panel controls'>
<div class='title'>Settings</div>
<label>Timeframe</label><select id='tf'><option>1m</option><option>5m</option><option>15m</option><option>1H</option><option>4H</option><option>1D</option></select>
<label>Refresh Speed</label><select><option>1s</option><option>3s</option><option>5s</option></select>
<label>BTC Weight</label><input type='range' min='0' max='100' value='40'>
<label>ETHBTC Weight</label><input type='range' min='0' max='100' value='25'>
<label>BTC.D Weight</label><input type='range' min='0' max='100' value='20'>
<label>USDT.D Weight</label><input type='range' min='0' max='100' value='15'>
<label>Theme</label><select><option>Dark</option><option>Midnight</option><option>Terminal</option></select>
<label>Signal Sensitivity</label><select><option>Low</option><option>Normal</option><option>High</option></select>
</div>
<div class='panel'>
<div class='title'>Footprint Matrix</div>
<table class='table' id='tbl'><tr><th>Price</th><th>Buy</th><th>Sell</th><th>Delta</th></tr></table>
</div>
<div class='panel'>
<div class='title'>Composite Summary</div>
<div class='gauge' id='flow'>+0</div>
<div class='small' id='signal'>NEUTRAL</div>
<div class='title' style='margin-top:12px'>Delta Bars</div>
<div class='bars' id='bars'></div>
</div>
</div>
<div class='footer row2'>
<div class='panel'><div class='title'>Heatmap</div><div class='heat' id='heat'></div></div>
<div class='panel'><div class='title'>Customization Options</div><div class='small'>Columns on/off • Number format • Sound alerts • Auto scale • Symbol source • Export CSV • Compact mode • Multi-monitor mode</div></div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function render(){let t=document.getElementById('tbl');t.innerHTML='<tr><th>Price</th><th>Buy</th><th>Sell</th><th>Delta</th></tr>';let bars='';let net=0;for(let i=0;i<12;i++){let p=69000-i*25,b=rnd(200,3900),s=rnd(200,3900),d=b-s;net+=d;t.innerHTML+=`<tr><td>${p}</td><td class='buy'>${b}</td><td class='sell'>${s}</td><td class='${d>=0?'buy':'sell'}'>${d}</td></tr>`;bars+=`<div><span style='width:${Math.min(Math.abs(d)/40,100)}%;background:${d>=0?'#22c55e':'#ef4444'}'></span></div>`}document.getElementById('bars').innerHTML=bars;document.getElementById('flow').textContent=(net>0?'+':'')+net;document.getElementById('flow').style.color=net>=0?'#22c55e':'#ef4444';document.getElementById('signal').textContent=net>1500?'STRONG BUY':net<-1500?'STRONG SELL':'MIXED';let h='';for(let i=0;i<30;i++){let v=rnd(-10,10);h+=`<div style='background:${v>0?'#16a34a':v<0?'#b91c1c':'#a16207'}'></div>`}document.getElementById('heat').innerHTML=h;document.getElementById('clock').textContent=new Date().toLocaleTimeString();}
render();setInterval(render,2000);
</script>
</body></html>
