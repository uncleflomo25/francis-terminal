<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FLOW TERMINAL V7000</title>
<style>
body{margin:0;background:#06111f;color:#d7e7ff;font-family:Segoe UI}
.wrap{display:grid;grid-template-columns:60% 40%;height:100vh}
.panel{padding:10px}
.title{font-size:12px;color:#7fbfff;margin-bottom:6px}
table{width:100%;font-size:12px}
td{padding:4px}
.bid{color:#00e676}
.ask{color:#ff5252}
canvas{background:#07192c;border:1px solid #12304f;border-radius:10px}
</style>
</head>
<body>

<div class="wrap">

<div class="panel">
<div class="title">ORDERBOOK HEATMAP</div>
<canvas id="heatmap" width="700" height="500"></canvas>
</div>

<div class="panel">
<div class="title">DOM (DEPTH LADDER)</div>
<table id="dom"></table>
</div>

</div>

<script>
const canvas=document.getElementById("heatmap");
const ctx=canvas.getContext("2d");

let bids=[],asks=[];

// DRAW HEATMAP
function drawHeatmap(){
ctx.clearRect(0,0,canvas.width,canvas.height);

let levels=20;

// normalize size
let maxVol=Math.max(
...bids.map(b=>b[1]),
...asks.map(a=>a[1]),
1
);

// draw bids (bottom half)
bids.slice(0,levels).forEach((b,i)=>{
let intensity=b[1]/maxVol;
ctx.fillStyle=`rgba(0,255,150,${intensity})`;
ctx.fillRect(0,canvas.height/2 + i*10,canvas.width,10);
});

// draw asks (top half)
asks.slice(0,levels).forEach((a,i)=>{
let intensity=a[1]/maxVol;
ctx.fillStyle=`rgba(255,80,80,${intensity})`;
ctx.fillRect(0,canvas.height/2 - (i+1)*10,canvas.width,10);
});
}

// UPDATE DOM TABLE
function updateDOM(){
let rows="";

for(let i=19;i>=0;i--){
let a=asks[i];
if(!a)continue;
rows+=`<tr><td class="ask">${a[0]}</td><td class="ask">${a[1]}</td></tr>`;
}

rows+=`<tr><td colspan="2" style="text-align:center">---</td></tr>`;

for(let i=0;i<20;i++){
let b=bids[i];
if(!b)continue;
rows+=`<tr><td class="bid">${b[0]}</td><td class="bid">${b[1]}</td></tr>`;
}

document.getElementById("dom").innerHTML=rows;
}

// WEBSOCKET DEPTH STREAM
let ws=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@depth20@100ms");

ws.onmessage=(e)=>{
let data=JSON.parse(e.data);

// parse
bids=data.b.map(x=>[parseFloat(x[0]),parseFloat(x[1])]);
asks=data.a.map(x=>[parseFloat(x[0]),parseFloat(x[1])]);

updateDOM();
drawHeatmap();
};

</script>

</body>
</html>
