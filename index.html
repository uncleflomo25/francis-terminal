<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRANCIS TERMINAL V11</title>

<style>
body{
margin:0;
background:#0b0f14;
color:#fff;
font-family:Arial;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:40px 1fr 200px;
height:100vh;
gap:6px;
padding:6px;
}

/* TOP BAR */
.top{
grid-column:1/5;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:13px;
}

/* PANELS */
.panel{
background:#0f1722;
border:1px solid #1f2937;
position:relative;
overflow:hidden;
}

canvas{
position:absolute;
inset:0;
}

/* FOOTER */
.footer{
grid-column:1/5;
display:grid;
grid-template-columns:2fr 2fr 2fr 1fr;
gap:6px;
}

.box{
background:#0f1722;
border:1px solid #1f2937;
padding:6px;
font-size:12px;
}
</style>
</head>

<body>

<div class="grid">

<div class="top">
<div>CRYPTO ORDERFLOW DASHBOARD</div>
<div id="status">LOADING...</div>
</div>

<div class="panel"><canvas id="btc"></canvas></div>
<div class="panel"><canvas id="eth"></canvas></div>
<div class="panel"><canvas id="ethbtc"></canvas></div>
<div class="panel"><canvas id="total"></canvas></div>

<div class="footer">
<div class="box" id="metrics"></div>
<div class="box" id="heat"></div>
<div class="box" id="prints"></div>
<div class="box" id="imbalance"></div>
</div>

</div>

<script>
function createChart(canvas){
const ctx=canvas.getContext("2d");
let bars=[];

function resize(){
canvas.width=canvas.clientWidth;
canvas.height=canvas.clientHeight;
}
resize();
window.addEventListener("resize",resize);

/* LOAD */
async function load(symbol){
let r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=100`);
let d=await r.json();
bars=d.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4]}));
draw();
}

/* DRAW */
function draw(){
ctx.fillStyle="#0f1722";
ctx.fillRect(0,0,canvas.width,canvas.height);

if(!bars.length) return;

let max=Math.max(...bars.map(b=>b.h));
let min=Math.min(...bars.map(b=>b.l));
let range=max-min;

let w=4,x=10;

bars.forEach(b=>{
let col=b.c>b.o?"#26a69a":"#ef5350";

let yo=(max-b.o)/range*canvas.height;
let yc=(max-b.c)/range*canvas.height;
let yh=(max-b.h)/range*canvas.height;
let yl=(max-b.l)/range*canvas.height;

ctx.strokeStyle=col;
ctx.beginPath();
ctx.moveTo(x,yh);
ctx.lineTo(x,yl);
ctx.stroke();

ctx.fillStyle=col;
ctx.fillRect(x-2,Math.min(yo,yc),4,Math.abs(yc-yo));

x+=w;
});
}

/* LOOP */
setInterval(draw,1000);

return {load};
}

/* CREATE CHARTS */
let btc=createChart(document.getElementById("btc"));
let eth=createChart(document.getElementById("eth"));
let ethbtc=createChart(document.getElementById("ethbtc"));
let total=createChart(document.getElementById("total"));

btc.load("BTCUSDT");
eth.load("ETHUSDT");
ethbtc.load("ETHBTC");

/* TOTAL proxy */
async function loadTotal(){
let r=await fetch("https://api.coingecko.com/api/v3/global");
let d=await r.json();
document.getElementById("status").innerText =
"Market Cap: $" + (d.data.total_market_cap.usd/1e12).toFixed(2)+"T";
}
setInterval(loadTotal,5000);

/* SIMPLE METRICS */
setInterval(()=>{
document.getElementById("metrics").innerText =
"CVD: " + (Math.random()*100-50).toFixed(2) +
"\nDelta: " + (Math.random()*100-50).toFixed(2);
},2000);

/* HEATMAP (simple) */
setInterval(()=>{
document.getElementById("heat").innerText =
"Liquidity Zones Updating...";
},2000);

/* PRINTS */
setInterval(()=>{
document.getElementById("prints").innerText =
"Trades:\n" + Math.random().toFixed(4);
},1000);

/* IMBALANCE */
setInterval(()=>{
document.getElementById("imbalance").innerText =
"Buy vs Sell: " + (Math.random()*100).toFixed(1)+"%";
},2000);

</script>

</body>
</html>
