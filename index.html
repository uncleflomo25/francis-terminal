<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Institutional Risk Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#050505;
color:#d7d7d7;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:14px;
padding:25px;
}

.title{
font-size:24px;
color:#00ffd5;
margin-bottom:20px;
}

.panel{
background:#111;
border:1px solid #222;
padding:20px;
border-radius:10px;
}

.input-group{
margin-bottom:16px;
}

label{
display:block;
margin-bottom:6px;
color:#888;
}

input,
select{
width:100%;
padding:12px;
background:#050505;
border:1px solid #222;
border-radius:6px;
color:#fff;
outline:none;
}

.output{
margin-top:12px;
padding:14px;
background:#050505;
border:1px solid #222;
border-radius:8px;
font-size:17px;
}

.green{
color:#00ff95;
}

.red{
color:#ff4b4b;
}

.blue{
color:#00d0ff;
}

.yellow{
color:#ffd000;
}

button{
width:100%;
padding:14px;
background:#050505;
border:1px solid #00ffd5;
color:#00ffd5;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
transition:0.2s;
}

button:hover{
background:#00ffd5;
color:#000;
}

.footer{
margin-top:20px;
text-align:center;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
INSTITUTIONAL LOT SIZE CALCULATOR
</div>

<div class="panel">

<div class="input-group">
<label>Trading Pair</label>

<select id="pair">
<option value="BTCUSDT">BTCUSDT</option>
<option value="ETHUSDT">ETHUSDT</option>
<option value="XAUUSD">XAUUSD</option>
<option value="NAS100">NAS100</option>
<option value="EURUSD">EURUSD</option>
<option value="GBPUSD">GBPUSD</option>
</select>
</div>

<div class="input-group">
<label>Trade Type</label>

<select id="tradeType">
<option value="BUY">BUY</option>
<option value="SELL">SELL</option>
</select>
</div>

<div class="input-group">
<label>Entry Price</label>

<input type="number"
id="entry"
value="79090">
</div>

<div class="input-group">
<label>Risk Per Trade (AED)</label>

<input type="number"
id="risk"
value="50">
</div>

<div class="input-group">
<label>Stop Loss Distance (Points)</label>

<input type="number"
id="slPoints"
value="1000">
</div>

<div class="input-group">
<label>Risk Reward Ratio</label>

<select id="rrRatio">
<option value="1">1 : 1</option>
<option value="2">1 : 2</option>
<option value="3" selected>1 : 3</option>
<option value="4">1 : 4</option>
<option value="5">1 : 5</option>
</select>
</div>

<div class="input-group">
<label>USD/AED</label>

<input type="number"
id="usdAed"
value="3.67">
</div>

<button onclick="calculateTrade()">
CALCULATE TRADE
</button>

<div class="output">
Lot Size:
<span id="lotSize"
class="green">
0.00
</span>
</div>

<div class="output">
Auto Stop Loss:
<span id="slPrice"
class="red">
0.00
</span>
</div>

<div class="output">
Auto Take Profit:
<span id="tpPrice"
class="blue">
0.00
</span>
</div>

<div class="output">
USD Risk:
<span id="usdRisk"
class="yellow">
0.00
</span>
</div>

<div class="output">
Break-even Win Rate:
<span id="breakeven"
class="green">
0%
</span>
</div>

<div class="output">
Risk Exposure:
<span id="exposure"
class="green">
LOW
</span>
</div>

</div>

<div class="footer">
INSTITUTIONAL TERMINAL v7.0
</div>

</div>

<script>

function calculateTrade(){

let entry =
parseFloat(document.getElementById("entry").value) || 0;

let riskAed =
parseFloat(document.getElementById("risk").value) || 0;

let slPoints =
parseFloat(document.getElementById("slPoints").value) || 1;

let rr =
parseFloat(document.getElementById("rrRatio").value) || 1;

let usdAed =
parseFloat(document.getElementById("usdAed").value) || 3.67;

let tradeType =
document.getElementById("tradeType").value;

// AED TO USD

let usdRisk =
riskAed / usdAed;

// LOT SIZE

let lotSize =
usdRisk / slPoints;

// STOP LOSS

let stopLoss;

if(tradeType === "BUY"){

stopLoss =
entry - slPoints;

}else{

stopLoss =
entry + slPoints;

}

// TAKE PROFIT

let tpDistance =
slPoints * rr;

let takeProfit;

if(tradeType === "BUY"){

takeProfit =
entry + tpDistance;

}else{

takeProfit =
entry - tpDistance;

}

// BREAKEVEN %

let breakeven =
100 / (1 + rr);

// OUTPUTS

document.getElementById("lotSize")
.innerHTML =
lotSize.toFixed(3);

document.getElementById("slPrice")
.innerHTML =
stopLoss.toFixed(2);

document.getElementById("tpPrice")
.innerHTML =
takeProfit.toFixed(2);

document.getElementById("usdRisk")
.innerHTML =
usdRisk.toFixed(2) + " USD";

document.getElementById("breakeven")
.innerHTML =
breakeven.toFixed(1) + "%";

// EXPOSURE

let exposure =
document.getElementById("exposure");

if(lotSize > 0.05){

exposure.innerHTML = "HIGH";
exposure.className = "red";

}
else if(lotSize > 0.02){

exposure.innerHTML = "MEDIUM";
exposure.className = "yellow";

}
else{

exposure.innerHTML = "LOW";
exposure.className = "green";

}

}

// LIVE AUTO UPDATE

document.querySelectorAll("input, select")
.forEach(el=>{

el.addEventListener("input", calculateTrade);

});

calculateTrade();

</script>

</body>
</html>
