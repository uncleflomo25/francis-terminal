<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidity X Institutional Synthetic Engine</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
}

.market{
    cursor:pointer;
    transition:0.2s;
}

.market:hover{
    border-color:#00ff88;
    background:#111;
}

#chart{
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<div class="h-screen w-full flex overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col">

        <div class="p-5 border-b border-zinc-800">

            <h1 class="text-3xl font-black text-emerald-400">
                LIQUIDITY X
            </h1>

            <p class="text-zinc-500 text-sm mt-1">
                Institutional Synthetic Crypto Engine
            </p>

        </div>

        <div class="p-4">

            <button
                class="w-full p-3 rounded-2xl bg-emerald-500 text-black font-bold">
                Connect Wallet
            </button>

        </div>

        <div class="px-4 pb-2 text-xs uppercase tracking-widest text-zinc-500">
            Markets
        </div>

        <div class="flex-1 overflow-auto px-3 space-y-2 pb-5">

            <div onclick="switchMarket('BTCUSDT')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                BTCUSD
            </div>

            <div onclick="switchMarket('ETHUSDT')"
                 class="market rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                ETHUSD
            </div>

            <div onclick="switchMarket('LX_SYNTH')"
                 class="market rounded-2xl border border-emerald-500 bg-zinc-900 p-4 text-emerald-400 font-bold">
                LX SYNTH
            </div>

        </div>

    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- TOPBAR -->
        <div class="h-16 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between px-6">

            <div>

                <div id="marketName"
                     class="text-2xl font-bold">
                    LX SYNTH
                </div>

                <div class="text-zinc-500 text-sm">
                    Real-Time Institutional Composite Market
                </div>

            </div>

            <div id="livePrice"
                 class="text-4xl font-black text-emerald-400">
                Loading...
            </div>

        </div>

        <!-- CHART -->
        <div class="flex-1 relative bg-black">

            <div id="chart"></div>

        </div>

    </div>

</div>

<script>

// =====================================
// CHART
// =====================================

const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {

        layout:{
            background:{ color:'#050505' },
            textColor:'#888'
        },

        grid:{
            vertLines:{ color:'#111' },
            horzLines:{ color:'#111' }
        },

        width:window.innerWidth - 256,
        height:window.innerHeight - 64,

        rightPriceScale:{
            borderColor:'#222'
        },

        timeScale:{
            borderColor:'#222',
            timeVisible:true
        }

    }
)

const candleSeries = chart.addCandlestickSeries({

    upColor:'#00ff88',
    downColor:'#ff4444',

    borderUpColor:'#00ff88',
    borderDownColor:'#ff4444',

    wickUpColor:'#00ff88',
    wickDownColor:'#ff4444'

})

// =====================================
// GLOBALS
// =====================================

let btcSocket = null
let ethSocket = null

let btcPrice = 0
let ethPrice = 0

let usdtDominance = 4.80

let lxCurrentCandle = null

let currentMarket = 'LX_SYNTH'

// =====================================
// BTC REAL-TIME
// =====================================

function connectBTC(){

    closeSockets()

    document.getElementById('marketName').innerHTML =
        'BTCUSD'

    btcSocket = new WebSocket(
        'wss://stream.binance.com:9443/ws/btcusdt@kline_1m'
    )

    btcSocket.onmessage = (event)=>{

        const msg = JSON.parse(event.data)

        const k = msg.k

        const candle = {

            time:k.t / 1000,

            open:parseFloat(k.o),
            high:parseFloat(k.h),
            low:parseFloat(k.l),
            close:parseFloat(k.c)

        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            Number(k.c).toLocaleString()

    }

}

// =====================================
// ETH REAL-TIME
// =====================================

function connectETH(){

    closeSockets()

    document.getElementById('marketName').innerHTML =
        'ETHUSD'

    ethSocket = new WebSocket(
        'wss://stream.binance.com:9443/ws/ethusdt@kline_1m'
    )

    ethSocket.onmessage = (event)=>{

        const msg = JSON.parse(event.data)

        const k = msg.k

        const candle = {

            time:k.t / 1000,

            open:parseFloat(k.o),
            high:parseFloat(k.h),
            low:parseFloat(k.l),
            close:parseFloat(k.c)

        }

        candleSeries.update(candle)

        document.getElementById('livePrice').innerHTML =
            Number(k.c).toLocaleString()

    }

}

// =====================================
// LX SYNTH ENGINE
// =====================================

function connectLX(){

    closeSockets()

    document.getElementById('marketName').innerHTML =
        'LX SYNTH'

    btcSocket = new WebSocket(
        'wss://stream.binance.com:9443/ws/btcusdt@trade'
    )

    ethSocket = new WebSocket(
        'wss://stream.binance.com:9443/ws/ethusdt@trade'
    )

    btcSocket.onmessage = (event)=>{

        const data = JSON.parse(event.data)

        btcPrice = parseFloat(data.p)

        updateLX()

    }

    ethSocket.onmessage = (event)=>{

        const data = JSON.parse(event.data)

        ethPrice = parseFloat(data.p)

        updateLX()

    }

}

// =====================================
// LX UPDATE
// =====================================

function updateLX(){

    if(!btcPrice || !ethPrice) return

    // =====================================
    // USDT.D PRESSURE
    // =====================================

    usdtDominance +=
        (Math.random() - 0.52) * 0.01

    // =====================================
    // INSTITUTIONAL FORMULA
    // =====================================

    const lxPrice =

        (
            btcPrice * 0.65
        )

        +

        (
            ethPrice * 0.25
        )

        -

        (
            usdtDominance * 1000 * 0.10
        )

    const time =
        Math.floor(Date.now()/60000) * 60

    // =====================================
    // CREATE CANDLE
    // =====================================

    if(
        !lxCurrentCandle
        ||
        lxCurrentCandle.time !== time
    ){

        lxCurrentCandle = {

            time,

            open:lxPrice,
            high:lxPrice,
            low:lxPrice,
            close:lxPrice

        }

    }

    lxCurrentCandle.high =
        Math.max(
            lxCurrentCandle.high,
            lxPrice
        )

    lxCurrentCandle.low =
        Math.min(
            lxCurrentCandle.low,
            lxPrice
        )

    lxCurrentCandle.close = lxPrice

    candleSeries.update(lxCurrentCandle)

    document.getElementById('livePrice').innerHTML =
        lxPrice.toLocaleString(
            undefined,
            {
                maximumFractionDigits:2
            }
        )

}

// =====================================
// CLOSE SOCKETS
// =====================================

function closeSockets(){

    if(btcSocket){

        btcSocket.close()

    }

    if(ethSocket){

        ethSocket.close()

    }

}

// =====================================
// SWITCH MARKET
// =====================================

function switchMarket(symbol){

    currentMarket = symbol

    if(symbol === 'BTCUSDT'){

        connectBTC()

    }

    else if(symbol === 'ETHUSDT'){

        connectETH()

    }

    else if(symbol === 'LX_SYNTH'){

        connectLX()

    }

}

// =====================================
// RESIZE
// =====================================

window.addEventListener('resize',()=>{

    chart.applyOptions({

        width:window.innerWidth - 256,
        height:window.innerHeight - 64

    })

})

// =====================================
// INIT
// =====================================

connectLX()

</script>

</body>
</html>
