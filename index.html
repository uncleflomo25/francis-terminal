<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

// ----------------------
// STATE
// ----------------------
let currentTF = 60000;
let running = true;

let candles = [];

let lastTOTAL = 0;
let lastUSDT = 0;
let lastBTC = 0;

// ----------------------
// REAL DATA
// ----------------------
async function fetchTOTAL(){

  try {
    let res = await fetch("https://api.llama.fi/globaldata");
    let d = await res.json();
    return d.totalMarketCap || 0;
  } catch(e){
    return 1000;
  }
}

async function fetchBTC(){

  try {
    let res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    let d = await res.json();
    return parseFloat(d.price);
  } catch(e){
    return 40000;
  }
}

// ----------------------
// USDT.D PROXY MODEL
// ----------------------
function calcUSDTD(total){
  return 6 + (1000 / total);
}

// ----------------------
// LIQUIDITY DELTA
// ----------------------
function computeFlow(total, usdt){

  let dT = total - lastTOTAL;
  let dU = usdt - lastUSDT;

  lastTOTAL = total;
  lastUSDT = usdt;

  return dT - dU;
}

// ----------------------
// CANDLE BUILDER
// ----------------------
function buildCandle(flow){

  let levels = [];
  let rows = Math.max(4, Math.floor(Math.abs(flow) * 3));

  for(let i=0;i<rows;i++){
    levels.push({
      vol: Math.floor(Math.random()*90+10),
      side: flow > 0 ? "buy" : "sell"
    });
  }

  candles.push({flow, levels});

  if(candles.length > 25) candles.shift();
}

// ----------------------
// DRAW FOOTPRINT
// ----------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let x = 80;

  candles.forEach(c => {

    let center = canvas.height/2;

    c.levels.forEach((lvl,i)=>{

      let y = center - i*18;

      ctx.fillStyle = "#111";
      ctx.fillRect(x,y,60,16);

      ctx.fillStyle = lvl.side === "buy"
        ? "rgba(34,197,94,0.45)"
        : "rgba(239,68,68,0.45)";

      ctx.fillRect(x,y,60,16);

      ctx.fillStyle = "#fff";
      ctx.font = "12px monospace";
      ctx.fillText(lvl.vol+"M", x+10, y+12);

    });

    x += 70;
  });
}

// ----------------------
// ENGINE LOOP (CONTROLLED)
// ----------------------
async function engine(){

  let total = await fetchTOTAL();
  let btc = await fetchBTC();
  let usdt = calcUSDTD(total);

  let flow = computeFlow(total, usdt);

  // confirmation logic
  let btcDelta = btc - lastBTC;
  lastBTC = btc;

  let confirmedFlow = flow * Math.sign(btcDelta || 1);

  document.getElementById("flow").innerText = confirmedFlow.toFixed(2);

  buildCandle(confirmedFlow);
  draw();
}
