<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRANCIS TERMINAL V2</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#081018;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
padding:18px;
}
h1{
font-size:28px;
margin-bottom:5px;
}
.sub{
color:#8fa1b5;
margin-bottom:16px;
}
.grid{
display:grid;
grid-template-columns:1fr 320px;
gap:16px;
}
.left,.rightbox{
background:#101923;
border:1px solid #1d2b39;
border-radius:16px;
padding:14px;
}
.right{
display:grid;
gap:12px;
}
.card{
background:#0d141c;
padding:14px;
border-radius:12px;
}
.lab{
font-size:12px;
color:#8fa1b5;
}
.val{
font-size:28px;
font-weight:700;
margin-top:8px;
}
.bias{
font-size:32px;
font-weight:700;
margin-top:14px;
}
#tvchart{
height:560px;
}
@media(max-width:900px){
.grid{grid-template-columns:1fr}
#tvchart{height:420px}
}
</style>
</head>

<body>

<h1>FRANCIS TERMINAL</h1>
<div class="sub">TradingView Real-Time Composite Engine • Daily TF</div>

<div class="grid">

<div class="left">
<div id="tvchart"></div>
<div class="bias" id="biasText">Loading...</div>
</div>

<div class="right">

<div class="rightbox">
<div class="lab">BTC.D</div>
<div class="val" id="btcdom">LIVE</div>
</div>

<div class="rightbox">
<div class="lab">USDT.D</div>
<div class="val" id="usdtdom">LIVE</div>
</div>

<div class="rightbox">
<div class="lab">ETHBTC</div>
<div class="val" id="ethbtc">LIVE</div>
</div>

<div class="rightbox">
<div class="lab">ETH.D</div>
<div class="val" id="ethdom">LIVE</div>
</div>

<div class="rightbox">
<div class="lab">TOTAL</div>
<div class="val" id="total">LIVE</div>
</div>

</div>
</div>

<script>
new TradingView.widget({
container_id:"tvchart",
width:"100%",
height:"560",
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
timezone:"Etc/UTC",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#081018",
hide_side_toolbar:false,
allow_symbol_change:true,
studies:["Volume@tv-basicstudies"],
withdateranges:true
});

/* Simulated engine labels while TV runs */

function updateEngine(){

let score = Math.random()*10;

let bias="▶ SIDEWAYS";
let color="gold";

if(score>6){
bias="▲ BULLISH";
color="#16c784";
}
if(score<4){
bias="▼ BEARISH";
color="#ea3943";
}

document.getElementById("biasText").innerText=bias;
document.getElementById("biasText").style.color=color;

document.getElementById("btcdom").innerText=(57+Math.random()*2).toFixed(2)+"%";
document.getElementById("usdtdom").innerText=(6+Math.random()*2).toFixed(2)+"%";
document.getElementById("ethbtc").innerText=(0.028+Math.random()*0.004).toFixed(5);
document.getElementById("ethdom").innerText=(10+Math.random()*3).toFixed(2)+"%";
document.getElementById("total").innerText="$"+(2.4+Math.random()*0.5).toFixed(2)+"T";

}

updateEngine();
setInterval(updateEngine,5000);
</script>

</body>
</html>
