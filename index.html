<script>
const ids = ["btcdom","usdtdom","ethdom","ethbtc","total"];

function setLoading(){
ids.forEach(id=>{
document.getElementById(id).innerText="Loading...";
});
}

function setError(){
ids.forEach(id=>{
document.getElementById(id).innerText="N/A";
});
document.getElementById("biasText").innerText="▶ DATA DELAY";
document.getElementById("biasText").style.color="gold";
}

function cacheSave(key,val){
localStorage.setItem(key,JSON.stringify(val));
}

function cacheLoad(key){
try{return JSON.parse(localStorage.getItem(key));}
catch(e){return null;}
}

async function getJSON(url,ms=5000){
const ctrl = new AbortController();
setTimeout(()=>ctrl.abort(),ms);
const r = await fetch(url,{signal:ctrl.signal});
return await r.json();
}

async function loadEngine(){

setLoading();

try{

const cg = await getJSON("https://api.coingecko.com/api/v3/global");

const btcDom = cg.data.market_cap_percentage.btc;
const usdtDom = cg.data.market_cap_percentage.usdt;
const ethDom = cg.data.market_cap_percentage.eth;
const total = cg.data.total_market_cap.usd;

let bias="▶ SIDEWAYS";
let color="gold";

if(btcDom>57 && usdtDom<8){
bias="▲ BULLISH";
color="#16c784";
}
if(usdtDom>9){
bias="▼ BEARISH";
color="#ea3943";
}

document.getElementById("btcdom").innerText=btcDom.toFixed(2)+"%";
document.getElementById("usdtdom").innerText=usdtDom.toFixed(2)+"%";
document.getElementById("ethdom").innerText=ethDom.toFixed(2)+"%";
document.getElementById("ethbtc").innerText=(ethDom/btcDom).toFixed(4);
document.getElementById("total").innerText="$"+(total/1e12).toFixed(2)+"T";

document.getElementById("biasText").innerText=bias;
document.getElementById("biasText").style.color=color;

cacheSave("marketData",{btcDom,usdtDom,ethDom,total,bias,color});

}catch(e){

let c = cacheLoad("marketData");

if(c){
document.getElementById("btcdom").innerText=c.btcDom.toFixed(2)+"%";
document.getElementById("usdtdom").innerText=c.usdtDom.toFixed(2)+"%";
document.getElementById("ethdom").innerText=c.ethDom.toFixed(2)+"%";
document.getElementById("ethbtc").innerText=(c.ethDom/c.btcDom).toFixed(4);
document.getElementById("total").innerText="$"+(c.total/1e12).toFixed(2)+"T";
document.getElementById("biasText").innerText=c.bias+" (Cached)";
document.getElementById("biasText").style.color=c.color;
}else{
setError();
}

}

}

loadEngine();
setInterval(loadEngine,30000);
</script>
