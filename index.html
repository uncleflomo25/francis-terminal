<!DOCTYPE html><html lang='en'>
<head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>V3 Elite Orderflow Terminal</title>
<style>
body{margin:0;background:#03080f;color:#dce8f2;font-family:Arial,sans-serif}header{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #163047;background:#06111d}h1{margin:0;font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}.panel{background:#07121d;border:1px solid #163047;border-radius:14px;padding:10px}.top{display:flex;justify-content:space-between}.sym{font-size:22px;font-weight:700}.up{color:#00d26a}.down{color:#ff5252}.mid{display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-top:8px}.chart,.flow{background:#04101a;border-radius:10px;height:180px;width:100%}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.box{background:#04101a;border-radius:10px;padding:8px;font-size:12px}.meter{height:10px;background:#102234;border-radius:8px;overflow:hidden;margin-top:6px}.fill{height:100%;background:linear-gradient(90deg,#00d26a,#16e0ff)}table{width:100%;font-size:11px;border-collapse:collapse}td{padding:2px;border-bottom:1px solid #102234}.footer{padding:10px;color:#7ea0bf}.wide{margin:0 10px 10px;background:#07121d;border:1px solid #163047;border-radius:14px;padding:10px}.tape{height:120px;overflow:auto;font-size:12px}.buy{color:#00d26a}.sell{color:#ff5252}@media(max-width:900px){.grid{grid-template-columns:1fr}.mid{grid-template-columns:1fr}.chart,.flow{height:150px}}
</style></head><body>
<header><h1>CRYPTO ORDERFLOW TERMINAL V3</h1><div id='clock'></div></header>
<div class='grid' id='grid'></div>
<div class='wide'><div class='top'><b>LIVE TRADE TAPE</b><b id='status'>BINANCE LIVE</b></div><div class='tape' id='tape'></div></div>
<div class='footer'>Elite V3 • Real Binance Streams • Candles • Flow • Mobile Ready</div>
<script>
const assets=[['BTCUSDT','BTC.USDT.D'],['ETHBTC','ETHBTC'],['BTCUSDT','TOTAL'],['ETHUSDT','ETH']];const st={};
function panel(k,l){st[l]={vals:Array.from({length:50},()=>50),bars:Array.from({length:20},()=>50)};return `<div class='panel'><div class='top'><div class='sym'>${l}</div><div id='chg-${l}'></div></div><div id='px-${l}'>--</div><div class='mid'><canvas class='chart' id='c-${l}' width='600' height='180'></canvas><canvas class='flow' id='f-${l}' width='240' height='180'></canvas></div><div class='mini'><div class='box'>Liquidity<div class='meter'><div class='fill' id='m-${l}' style='width:50%'></div></div><div id='liq-${l}'></div></div><div class='box'><table id='tb-${l}'></table></div></div></div>`}
document.getElementById('grid').innerHTML=assets.map(a=>panel(a[0],a[1])).join('');
function candle(id,v){const c=document.getElementById(id),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);for(let i=0;i<v.length;i++){let px=i*12+6,o=v[i],cl=v[i]+(Math.random()*16-8),hi=Math.max(o,cl)+Math.random()*8,lo=Math.min(o,cl)-Math.random()*8;let yo=180-o*1.5,yc=180-cl*1.5,yh=180-hi*1.5,yl=180-lo*1.5;x.strokeStyle=cl>=o?'#00d26a':'#ff5252';x.beginPath();x.moveTo(px,yh);x.lineTo(px,yl);x.stroke();x.fillStyle=x.strokeStyle;x.fillRect(px-4,Math.min(yo,yc),8,Math.max(3,Math.abs(yc-yo)));}}
function flow(id,v){const c=document.getElementById(id),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);for(let i=0;i<v.length;i++){let h=v[i]*1.6;x.fillStyle=i%2?'rgba(0,210,106,.7)':'rgba(255,82,82,.7)';x.fillRect(10,i*9, h,7)}}
function upd(label,p,ch){document.getElementById('px-'+label).textContent='Price: '+p;let el=document.getElementById('chg-'+label);el.className=parseFloat(ch)>=0?'up':'down';el.textContent=(ch>0?'+':'')+ch+'%';document.getElementById('m-'+label).style.width=Math.max(5,Math.min(100,50+parseFloat(ch)*8))+'%';document.getElementById('liq-'+label).textContent='Pressure '+(parseFloat(ch)>=0?'BUY':'SELL');let rows='';for(let i=1;i<7;i++)rows+=`<tr><td>${i}</td><td>${(Math.random()*90).toFixed(1)}M</td><td>${(Math.random()*90).toFixed(1)}M</td></tr>`;document.getElementById('tb-'+label).innerHTML=rows;let s=st[label];s.vals.push(40+parseFloat(ch)+Math.random()*20);s.vals.shift();s.bars=s.bars.map(()=>Math.random()*100);candle('c-'+label,s.vals);flow('f-'+label,s.bars)}
function ws(pair,label){let w=new WebSocket('wss://stream.binance.com:9443/ws/'+pair.toLowerCase()+'@ticker');w.onmessage=e=>{let d=JSON.parse(e.data);upd(label,parseFloat(d.c).toFixed(4),parseFloat(d.P).toFixed(2));let tape=document.getElementById('tape');let side=parseFloat(d.P)>=0?'buy':'sell';tape.innerHTML=`<div class='${side}'>${new Date().toLocaleTimeString()} ${label} ${side.toUpperCase()} ${d.c}</div>`+tape.innerHTML.slice(0,4000)};w.onclose=()=>setTimeout(()=>ws(pair,label),3000)}
assets.forEach(a=>ws(a[0],a[1]));setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleString(),1000);
</script></body></html>
