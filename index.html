<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRANCIS TERMINAL V10</title>

<style>
body{margin:0;background:#0f1722;color:#fff;font-family:Arial}
.wrap{display:grid;grid-template-columns:1fr 320px;height:100vh}
.left{position:relative}
.right{
background:#0d1520;
border-left:1px solid #1f2937;
display:flex;
flex-direction:column;
}

/* DOM */
.dom{flex:1;overflow:auto;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px}
.bid{color:#26a69a}
.ask{color:#ef5350}

/* TAPE */
.tape{height:200px;overflow:auto;border-top:1px solid #1f2937;font-size:12px}
.trade{display:flex;justify-content:space-between;padding:2px}
.buy{color:#26a69a}
.sell{color:#ef5350}

/* CROSSHAIR */
.cross{
position:absolute;
pointer-events:none;
font-size:11px;
color:#ccc;
}
</style>
</head>

<body>

<div class="wrap">
<div class="left">
<canvas id="c"></canvas>
</div>

<div class="right">
<div style="padding:6px">ORDER BOOK</div>
<div id="dom" class="dom"></div>

<div style="padding:6px">TRADE TAPE</div>
<div id="tape" class="tape"></div>
</div>
</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
const domEl=document.getElementById("dom");
const tapeEl=document.getElementById("tape");

let bars=[];
let bids=[],asks=[],trades=[];
let price=0;

/* VIEW */
let zoom=6;
let offset=0;
let dragging=false;
let lastX=0;
let mouseX=0,mouseY=0;

/* RESIZE */
function resize(){
c.width=window.innerWidth-320;
c.height=window.innerHeight;
}
window.onresize=resize;
resize();

/* LOAD CANDLES */
async function load(){
let r=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=200");
let d=await r.json();
bars=d.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4]}));
}
load();

/* WEBSOCKETS */
let depthWS=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@depth20@100ms");
let tradeWS=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

/* DEPTH */
depthWS.onmessage=e=>{
let d=JSON.parse(e.data);
bids=d.bids.map(b=>[+b[0],+b[1]]);
asks=d.asks.map(a=>[+a[0],+a[1]]);
price=bids[0][0];
renderDOM();
};

/* TRADES */
tradeWS.onmessage=e=>{
let t=JSON.parse(e.data);
trades.unshift({
price:+t.p,
qty:+t.q,
side:t.m?"sell":"buy"
});
if(trades.length>50) trades.pop();
renderTape();
};

/* DOM */
function renderDOM(){
domEl.innerHTML="";
asks.slice().reverse().forEach(a=>{
domEl.innerHTML+=`<div class="row ask">${a[0]} ${a[1]}</div>`;
});
bids.forEach(b=>{
domEl.innerHTML+=`<div class="row bid">${b[0]} ${b[1]}</div>`;
});
}

/* TAPE */
function renderTape(){
tapeEl.innerHTML="";
trades.forEach(t=>{
tapeEl.innerHTML+=`<div class="trade ${t.side}">${t.price} ${t.qty}</div>`;
});
}

/* INTERACTION */
c.onmousedown=e=>{
dragging=true;
lastX=e.clientX;
};
window.onmouseup=()=>dragging=false;
window.onmousemove=e=>{
mouseX=e.offsetX;
mouseY=e.offsetY;
if(dragging){
offset += (e.clientX-lastX);
lastX=e.clientX;
}
};
c.onwheel=e=>{
e.preventDefault();
zoom += e.deltaY>0?-1:1;
if(zoom<2) zoom=2;
if(zoom>20) zoom=20;
};

/* DRAW */
function draw(){

ctx.fillStyle="#0f1722";
ctx.fillRect(0,0,c.width,c.height);

if(!bars.length) return;

/* SCALE */
let max=Math.max(...bars.map(b=>b.h));
let min=Math.min(...bars.map(b=>b.l));
let range=max-min;

/* POSITION */
let w=zoom;
let totalWidth=bars.length*w;
let startX=c.width-totalWidth-40+offset;

/* LIMIT OFFSET */
let minOffset=-(totalWidth-c.width+40);
if(offset<minOffset) offset=minOffset;
if(offset>0) offset=0;

/* DRAW CANDLES */
let x=startX;

bars.forEach(b=>{
let col=b.c>b.o?"#26a69a":"#ef5350";

let yo=(max-b.o)/range*c.height;
let yc=(max-b.c)/range*c.height;
let yh=(max-b.h)/range*c.height;
let yl=(max-b.l)/range*c.height;

ctx.strokeStyle=col;
ctx.beginPath();
ctx.moveTo(x,yh);
ctx.lineTo(x,yl);
ctx.stroke();

ctx.fillStyle=col;
ctx.fillRect(x-w/3,Math.min(yo,yc),w/1.5,Math.abs(yc-yo));

x+=w;
});

/* PRICE LINE */
let py=(max-price)/range*c.height;
ctx.strokeStyle="#fff";
ctx.beginPath();
ctx.moveTo(0,py);
ctx.lineTo(c.width,py);
ctx.stroke();

/* CROSSHAIR */
ctx.strokeStyle="#888";
ctx.beginPath();
ctx.moveTo(mouseX,0);
ctx.lineTo(mouseX,c.height);
ctx.moveTo(0,mouseY);
ctx.lineTo(c.width,mouseY);
ctx.stroke();

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
