<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FRANCIS TERMINAL V3 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0f1722;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
overflow:hidden;
}
.topbar{
height:50px;
background:#131722;
border-bottom:1px solid #222b39;
display:flex;
align-items:center;
gap:8px;
padding:0 12px;
}
.logo{font-weight:700;margin-right:10px}
.btn{
background:#1e222d;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
color:#cfd6e4;
}
.wrap{
display:grid;
grid-template-columns:1fr 290px;
height:calc(100vh - 50px);
}
.left{
position:relative;
background:#131722;
overflow:hidden;
}
.right{
background:#0d1520;
border-left:1px solid #1f2937;
padding:12px;
display:grid;
gap:10px;
align-content:start;
}
.card{
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
padding:12px;
}
.lab{font-size:11px;color:#8ea2bd}
.val{font-size:28px;font-weight:700;margin-top:6px}

canvas{
position:absolute;
top:0;left:0;
cursor:grab;
}

.status{
position:absolute;
bottom:12px;
left:14px;
font-size:13px;
color:#94a3b8;
display:flex;
gap:16px;
z-index:10;
}

.water{
position:absolute;
top:18px;
left:18px;
font-size:28px;
font-weight:700;
color:rgba(255,255,255,.04);
pointer-events:none;
z-index:10;
}

.green{color:#26a69a}
.red{color:#ef5350}
.gold{color:#f0b90b}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">FRANCIS TERMINAL</div>
<div class="btn" onclick="setTF(60)">1m</div>
<div class="btn" onclick="setTF(300)">5m</div>
<div class="btn" onclick="setTF(3600)">1H</div>
<div class="btn" onclick="setTF(14400)">4H</div>
<div class="btn" onclick="setTF(86400)">1D</div>
<div class="btn" onclick="zoomIn()">＋</div>
<div class="btn" onclick="zoomOut()">－</div>
<div class="btn" onclick="resetView()">Reset</div>
</div>

<div class="wrap">

<div class="left" id="chartBox">
<div class="water">FRANCIS TERMINAL</div>
<canvas id="chart"></canvas>

<div class="status">
<div>Real-Time Composite Engine</div>
<div id="clock"></div>
</div>
</div>

<div class="right">

<div class="card"><div class="lab">BTC.D</div><div class="val" id="btc">--</div></div>
<div class="card"><div class="lab">USDT.D</div><div class="val" id="usdt">--</div></div>
<div class="card"><div class="lab">ETHBTC</div><div class="val" id="ethbtc">--</div></div>
<div class="card"><div class="lab">ETH.D</div><div class="val" id="ethd">--</div></div>
<div class="card"><div class="lab">TOTAL</div><div class="val" id="total">--</div></div>
<div class="card"><div class="lab">MODE</div><div class="val" id="mode">--</div></div>

</div>
</div>

<script>
const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");
const box=document.getElementById("chartBox");

let candles=[];
let scale=1;
let offsetX=0;
let tf=5000;

/* resize */
function resize(){
canvas.width=box.clientWidth;
canvas.height=box.clientHeight;
draw();
}
window.addEventListener("resize",resize);

/* clock */
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

/* pan controls */
let dragging=false,startX=0;

canvas.onmousedown=e=>{
dragging=true;
startX=e.clientX;
canvas.style.cursor="grabbing";
};

window.onmouseup=()=>{
dragging=false;
canvas.style.cursor="grab";
};

window.onmousemove=e=>{
if(!dragging)return;
offsetX += e.clientX-startX;
startX=e.clientX;
draw();
};

canvas.onwheel=e=>{
e.preventDefault();
if(e.deltaY<0) zoomIn();
else zoomOut();
};

function zoomIn(){scale*=1.1;draw();}
function zoomOut(){scale/=1.1;draw();}
function resetView(){scale=1;offsetX=0;draw();}
function setTF(x){
tf=x*1000;
clearInterval(loop);
loop=setInterval(loadData,tf);
}
