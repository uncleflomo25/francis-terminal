<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 FRANCIS TERMINAL V9 PRO STABLE</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
--text:#ffffff;
--muted:#bfa8ff;
--panel:#090611;
--line:#5a2ea6;
--green:#00ff9c;
--red:#ff4d6d;
--gold:#ffd700;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
min-height:100vh;

/* BEAUTIFUL BLACK + DARK PURPLE BACKGROUND */
background:
radial-gradient(circle at 15% 20%, rgba(120,0,255,0.20) 0%, transparent 22%),
radial-gradient(circle at 85% 15%, rgba(180,0,255,0.14) 0%, transparent 20%),
radial-gradient(circle at 50% 80%, rgba(90,0,180,0.16) 0%, transparent 25%),
radial-gradient(circle at 20% 90%, rgba(70,0,140,0.10) 0%, transparent 18%),
linear-gradient(135deg,#000000 0%, #050008 25%, #110018 55%, #1a0028 78%, #000000 100%);

background-attachment:fixed;
}

.header{
text-align:center;
padding:14px;
font-size:22px;
font-weight:700;
background:rgba(0,0,0,.55);
backdrop-filter:blur(8px);
border-bottom:1px solid var(--line);
letter-spacing:.5px;
}

.sub{
text-align:center;
font-size:12px;
padding:6px 0 10px;
color:var(--muted);
}

.top{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.box,.master{
background:linear-gradient(180deg,#0d0818,#09040f);
border:1px solid var(--line);
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 0 18px rgba(140,0,255,.15);
}

.symbol{
font-size:12px;
color:var(--muted);
}

.price{
font-size:19px;
font-weight:700;
margin-top:4px;
}

.arrow{
font-size:20px;
margin-top:5px;
}

.note{
font-size:11px;
margin-top:4px;
color:#a892df;
}

.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--gold);}

.master{
margin:0 10px 10px;
font-size:18px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.chart{
height:360px;
border:1px solid var(--line);
border-radius:14px;
overflow:hidden;
background:#000;
box-shadow:0 0 18px rgba(140,0,255,.12);
}

.footer{
text-align:center;
font-size:11px;
padding:10px;
color:#9b85d1;
}

@media(max-width:1100px){
.top{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:700px){
.top,.grid{
grid-template-columns:1fr;
}
.chart{
height:320px;
}
}
</style>
</head>

<body>

<div class="header">💜 FRANCIS TERMINAL V9 — PRO STABLE</div>
<div class="sub">Beautiful Black + Dark Purple Theme</div>

<div class="top">

<div class="box">
<div class="symbol">USDT.D</div>
<div class="price" id="p1">--</div>
<div class="arrow" id="a1">➜</div>
<div class="note" id="n1">Risk Flow</div>
</div>

<div class="box">
<div class="symbol">ETHBTC</div>
<div class="price" id="p2">--</div>
<div class="arrow" id="a2">➜</div>
<div class="note" id="n2">Rotation</div>
</div>

<div class="box">
<div class="symbol">BTC.D</div>
<div class="price" id="p3">--</div>
<div class="arrow" id="a3">➜</div>
<div class="note" id="n3">Dominance</div>
</div>

<div class="box">
<div class="symbol">TOTAL</div>
<div class="price" id="p4">--</div>
<div class="arrow" id="a4">➜</div>
<div class="note" id="n4">Market Cap</div>
</div>

<div class="box">
<div class="symbol">MASTER</div>
<div class="price" id="p5">--</div>
<div class="arrow" id="a5">➜</div>
<div class="note" id="n5">Neutral</div>
</div>

</div>

<div class="master" id="masterBox">Loading Pro Engine...</div>

<div class="grid">
<div id="c1" class="chart"></div>
<div id="c2" class="chart"></div>
<div id="c3" class="chart"></div>
<div id="c4" class="chart"></div>
</div>

<div class="footer">Daily Bias Engine • Stable Mobile Mode • Live Feed</div>

<script>
function setArrow(id,v){
let el=document.getElementById(id);
if(v>0) el.innerHTML='<span class="green">▲</span>';
else if(v<0) el.innerHTML='<span class="red">▼</span>';
else el.innerHTML='<span class="yellow">➜</span>';
}

async function ticker(sym){
let r=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+sym);
return await r.json();
}

async function gecko(){
let r=await fetch("https://api.coingecko.com/api/v3/global");
return await r.json();
}

async function update(){
try{
const btc=await ticker("BTCUSDT");
const eth=await ticker("ETHUSDT");
const ethbtc=await ticker("ETHBTC");
const cg=await gecko();

let btcCh=parseFloat(btc.priceChangePercent);
let ethCh=parseFloat(eth.priceChangePercent);
let ebCh=parseFloat(ethbtc.priceChangePercent);

let totalCap=cg.data.total_market_cap.usd;
let btcDom=cg.data.market_cap_percentage.btc;
let usdtDom=cg.data.market_cap_percentage.usdt;

p1.innerText=usdtDom.toFixed(2)+"%";
setArrow("a1",4-usdtDom);
n1.innerText=usdtDom>4?"Cash Rising":"Risk On";

p2.innerText=parseFloat(ethbtc.lastPrice).toFixed(6);
setArrow("a2",ebCh);
n2.innerText=ebCh>0?"ETH Leads":"BTC Leads";

p3.innerText=btcDom.toFixed(2)+"%";
setArrow("a3",btcCh);
n3.innerText=btcCh>0?"BTC Strong":"BTC Weak";

p4.innerText=(totalCap/1e12).toFixed(2)+"T";
setArrow("a4",btcCh+ethCh);
n4.innerText=(btcCh+ethCh)>0?"Expansion":"Contraction";

let score=0;
if(usdtDom<4)score+=2;else score-=2;
if(ebCh>0)score+=1;else score-=1;
if(btcCh>0)score+=1;else score-=1;
if((btcCh+ethCh)>0)score+=2;else score-=2;

let bias="SIDEWAYS";
let val=0;

if(score>=3){bias="BULLISH";val=1;}
if(score<=-3){bias="BEARISH";val=-1;}

p5.innerText=score;
setArrow("a5",val);
n5.innerText=bias;

masterBox.innerText="MASTER DAILY BIAS: "+bias+" | SCORE: "+score;

}catch(e){
masterBox.innerText="Waiting For Live Feed...";
}
}

update();
setInterval(update,5000);

setTimeout(function(){

new TradingView.widget({
container_id:"c1",
symbol:"CRYPTOCAP:USDT.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c2",
symbol:"BINANCE:ETHBTC",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c3",
symbol:"CRYPTOCAP:BTC.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c4",
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

},1200);
</script>

</body>
</html>
