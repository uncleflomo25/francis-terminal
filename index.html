<title>Professional Trading Terminal - BTC + TOTAL - USDT.D</title>
<style>
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background: #0a0e1a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace;

  .app-container {
    width: 100vw;

  /* ====== TOP TOOLBAR ====== */

  .indicator-item:hover {

  .indicator-item.active {

  /* ====== CHART AREA ====== */
  .chart-area {
    flex: 1;

  .chart-container {
    flex: 1;

  canvas {
    position: absolute;
    top: 0;

  /* ====== RIGHT SIDEBAR ====== */
  .right-sidebar {
    width: 250px;
    background: #0d1117;
    border-left: 2px solid #1e3a8a;
    padding: 15px;

  }

  .panel-section {
    margin-bottom: 15px;

  }

  .panel-title {
    color: #3b82f6;

  .panel-metric {

  /* ====== BOTTOM PANEL ====== */
  .bottom-panel {

  .order-book {

  /* ====== SCROLLBAR ====== */

<body>

<div class="app-container">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-brand">🔥 PROFESSIONAL TERMINAL: (BTC + TOTAL) - USDT.D</div>
    <div class="timeframe-selector" id="timeframeSelector"></div>
    <div class="ticker-info" id="tickerInfo"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- LEFT SIDEBAR -->
    <div class="left-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">📊 Indicators</div>
        <div class="indicator-item active" data-indicator="price">
          Candlesticks
        </div>
        <div class="indicator-item" data-indicator="volume">
          Volume
        </div>
        <div class="indicator-item" data-indicator="ma20">
          MA(20)
        </div>
        <div class="indicator-item" data-indicator="ma50">
          MA(50)
        </div>
        <div class="indicator-item" data-indicator="ema">
          EMA(12)
        </div>
        <div class="indicator-item" data-indicator="rsi">
          RSI(14)
        </div>
        <div class="indicator-item" data-indicator="macd">
          MACD
        </div>
        <div class="indicator-item" data-indicator="bb">
          Bollinger Bands
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">📈 Tools</div>
        <div class="indicator-item" data-tool="trend">
          Trend Line
        </div>
        <div class="indicator-item" data-tool="horizontal">
          Horizontal
        </div>
        <div class="indicator-item" data-tool="support">
          Support/Resistance
        </div>
      </div>
    </div>

    <!-- CHART AREA -->
    <div class="chart-area">
      <div class="chart-container">
        <canvas id="mainChart"></canvas>
        <div class="crosshair-tooltip" id="tooltip"></div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="right-sidebar" id="rightPanel"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel" id="bottomPanel"></div>
</div>

<script>
// ====== CORE ENGINE ======
const canvas = document.getElementById('mainChart');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const tooltip = document.getElementById('tooltip');
const rightPanel = document.getElementById('rightPanel');
const bottomPanel = document.getElementById('bottomPanel');
const tickerInfo = document.getElementById('tickerInfo');
const timeframeSelector = document.getElementById('timeframeSelector');

let dpr = window.devicePixelRatio || 1;
let width = 0, height = 0;

// Constants
const PADDING = { top: 40, bottom: 80, left: 100, right: 50 };
const TIMEFRAMES = ['1M', '5M', '15M', '1H', '4H', '1D', '1W'];
let currentTimeframe = '1H';
let currentIndicators = new Set(['price']);

// Data storage
let candles = [];
let syntheticData = {
  btc: 67500,
  total: 2450000,
  usdtd: 110.5,
  btcChange: 2.15,
  totalChange: 1.85,
  usdtdChange: -0.45
};

// ====== SYNTHETIC CALCULATION ======
function calculateSynthetic(btc, total, usdtd) {
  const normBtc = btc / 1000;
  const normTotal = total / 100000;
  const dilutionFactor = 1 - (usdtd / 150);
  return Math.max(10, (normBtc + normTotal) * dilutionFactor * 100);
}

// ====== DATA GENERATION ======
function generateCandles(count) {
  let bars = [];
  let time = Date.now() - (count * 3600000);
  let currentPrice = calculateSynthetic(syntheticData.btc, syntheticData.total, syntheticData.usdtd);

  for (let i = 0; i < count; i++) {
    let open = currentPrice;
    let change = (Math.random() - 0.5) * 300;
    let close = open + change;
    let high = Math.max(open, close) + Math.random() * 150;
    let low = Math.min(open, close) - Math.random() * 150;
    let volume = Math.floor(Math.random() * 100000) + 50000;

    bars.push({
      time: time + (i * 3600000),
      open, close, high, low, volume,
      buyVol: Math.floor(volume * (0.4 + Math.random() * 0.2)),
      sellVol: Math.floor(volume * (0.4 + Math.random() * 0.2))
    });

    currentPrice = close;
    syntheticData.btc += (Math.random() - 0.5) * 400;
    syntheticData.total += (Math.random() - 0.5) * 100000;
    syntheticData.usdtd += (Math.random() - 0.5) * 1;
  }

  return bars;
}

candles = generateCandles(100);

// ====== TECHNICAL INDICATORS ======
function calculateMA(period) {
  let ma = [];
  for (let i = 0; i < candles.length; i++) {
    if (i < period - 1) {
      ma.push(null);
    } else {
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) {
        sum += candles[j].close;
      }
      ma.push(sum / period);
    }
  }
  return ma;
}

function calculateEMA(period) {
  let ema = [];
  let multiplier = 2 / (period + 1);
  
  for (let i = 0; i < candles.length; i++) {
    if (i === 0) {
      ema.push(candles[i].close);
    } else if (i < period) {
      let sum = 0;
      for (let j = 0; j <= i; j++) sum += candles[j].close;
      ema.push(sum / (i + 1));
    } else {
      ema.push(candles[i].close * multiplier + ema[i - 1] * (1 - multiplier));
    }
  }
  return ema;
}

function calculateRSI(period = 14) {
  let rsi = [];
  let gains = 0, losses = 0;

  for (let i = 0; i < candles.length; i++) {
    if (i === 0) {
      rsi.push(50);
    } else {
      let change = candles[i].close - candles[i - 1].close;
      if (i < period) {
        if (change > 0) gains += change;
        else losses += Math.abs(change);
      } else {
        if (change > 0) {
          gains = (gains * (period - 1) + change) / period;
          losses = (losses * (period - 1)) / period;
        } else {
          gains = (gains * (period - 1)) / period;
          losses = (losses * (period - 1) + Math.abs(change)) / period;
        }
      }
      let rs = gains / (losses || 1);
      rsi.push(100 - (100 / (1 + rs)));
    }
  }

  return rsi;
}

function calculateMACD() {
  let ema12 = calculateEMA(12);
  let ema26 = calculateEMA(26);
  let macdLine = [];
  let signal = [];
  let histogram = [];

  for (let i = 0; i < ema12.length; i++) {
    macdLine.push(ema12[i] - ema26[i]);
  }

  let signalEMA = [];
  for (let i = 0; i < macdLine.length; i++) {
    if (i < 8) {
      signalEMA.push(null);
    } else if (i === 8) {
      let sum = 0;
      for (let j = 0; j <= i; j++) sum += macdLine[j];
      signalEMA.push(sum / 9);
    } else {
      signalEMA.push(macdLine[i] * (2/10) + signalEMA[i-1] * (8/10));
    }
    signal.push(signalEMA[i]);
    histogram.push(signalEMA[i] !== null ? macdLine[i] - signalEMA[i] : null);
  }

  return { macdLine, signal, histogram };
}

function calculateBB(period = 20, stdDev = 2) {
  let ma20 = calculateMA(period);
  let bands = [];

  for (let i = 0; i < candles.length; i++) {
    if (i < period - 1) {
      bands.push(null);
    } else {
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) {
        sum += Math.pow(candles[j].close - ma20[i], 2);
      }
      let std = Math.sqrt(sum / period);
      bands.push({
        upper: ma20[i] + (std * stdDev),
        middle: ma20[i],
        lower: ma20[i] - (std * stdDev)
      });
    }
  }

  return bands;
}

// ====== CANVAS SETUP ======
function resize() {
  let container = canvas.parentElement;
  width = container.clientWidth;
  height = container.clientHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.scale(dpr, dpr);
}

window.addEventListener('resize', resize);
resize();

// ====== COORDINATE CONVERSION ======
function getChartBounds() {
  let prices = candles.flatMap(c => [c.high, c.low]);
  let min = Math.min(...prices);
  let max = Math.max(...prices);
  let range = max - min;
  let padding = range * 0.1;
  return { min: min - padding, max: max + padding, range: max - min + padding * 2 };
}

function priceToY(price, bounds) {
  let chartH = height - PADDING.top - PADDING.bottom;
  return PADDING.top + (bounds.max - price) / bounds.range * chartH;
}

function yToPrice(y, bounds) {
  let chartH = height - PADDING.top - PADDING.bottom;
  return bounds.max - (y - PADDING.top) / chartH * bounds.range;
}

function getVisibleCandleIndex(x) {
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / Math.min(candles.length, 50);
  let idx = Math.floor((x - PADDING.left) / candleW);
  return Math.min(candles.length - 1, Math.max(0, candles.length - 50 + idx));
}

// ====== DRAWING FUNCTIONS ======
function drawBackground() {
  ctx.fillStyle = '#090d14';
  ctx.fillRect(0, 0, width, height);

  // Grid
  ctx.strokeStyle = '#1a2942';
  ctx.lineWidth = 1;
  let bounds = getChartBounds();
  let levels = 8;

  for (let i = 0; i <= levels; i++) {
    let y = PADDING.top + (i / levels) * (height - PADDING.top - PADDING.bottom);
    ctx.beginPath();
    ctx.moveTo(PADDING.left, y);
    ctx.lineTo(width - PADDING.right, y);
    ctx.stroke();
  }

  // Y-Axis
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(PADDING.left, PADDING.top);
  ctx.lineTo(PADDING.left, height - PADDING.bottom);
  ctx.moveTo(width - PADDING.right, PADDING.top);
  ctx.lineTo(width - PADDING.right, height - PADDING.bottom);
  ctx.stroke();
}

function drawPriceAxis(bounds) {
  ctx.fillStyle = '#64748b';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';

  let levels = 8;
  for (let i = 0; i <= levels; i++) {
    let price = bounds.max - (i / levels) * bounds.range;
    let y = PADDING.top + (i / levels) * (height - PADDING.top - PADDING.bottom);
    ctx.fillText(price.toFixed(2), PADDING.left - 15, y);
  }
}

function drawTimeAxis() {
  ctx.fillStyle = '#64748b';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  let visibleBars = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleBars;
  let startIdx = candles.length - visibleBars;

  for (let i = startIdx; i < candles.length; i += Math.max(1, Math.floor(visibleBars / 6))) {
    let candle = candles[i];
    let x = PADDING.left + (i - startIdx) * candleW + candleW / 2;
    let date = new Date(candle.time);
    let timeStr = date.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit' });
    ctx.fillText(timeStr, x, height - PADDING.bottom + 10);
  }
}

function drawCandles(bounds) {
  let visibleCount = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleCount;
  let startIdx = candles.length - visibleCount;

  for (let i = startIdx; i < candles.length; i++) {
    let candle = candles[i];
    let x = PADDING.left + (i - startIdx) * candleW;
    let bodyWidth = candleW * 0.6;
    let xCenter = x + candleW / 2;

    let yOpen = priceToY(candle.open, bounds);
    let yClose = priceToY(candle.close, bounds);
    let yHigh = priceToY(candle.high, bounds);
    let yLow = priceToY(candle.low, bounds);

    let isBull = candle.close >= candle.open;
    let bodyColor = isBull ? '#10b981' : '#ef4444';
    let wickColor = isBull ? 'rgba(16, 185, 129, 0.6)' : 'rgba(239, 68, 68, 0.6)';

    // Wick
    ctx.strokeStyle = wickColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(xCenter, yHigh);
    ctx.lineTo(xCenter, yLow);
    ctx.stroke();

    // Body
    let bodyTop = Math.min(yOpen, yClose);
    let bodyHeight = Math.abs(yClose - yOpen) || 2;

    ctx.fillStyle = bodyColor;
    ctx.fillRect(xCenter - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(xCenter - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
  }
}

function drawMovingAverage(period, color) {
  let ma = calculateMA(period);
  let visibleCount = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleCount;
  let startIdx = candles.length - visibleCount;
  let bounds = getChartBounds();

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();

  for (let i = startIdx; i < candles.length; i++) {
    if (ma[i] === null) continue;
    let x = PADDING.left + (i - startIdx) * candleW + candleW / 2;
    let y = priceToY(ma[i], bounds);
    if (i === startIdx) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawEMA(period, color) {
  let ema = calculateEMA(period);
  let visibleCount = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleCount;
  let startIdx = candles.length - visibleCount;
  let bounds = getChartBounds();

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();

  for (let i = startIdx; i < candles.length; i++) {
    if (ema[i] === null) continue;
    let x = PADDING.left + (i - startIdx) * candleW + candleW / 2;
    let y = priceToY(ema[i], bounds);
    if (i === startIdx) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawBollingerBands(color) {
  let bb = calculateBB();
  let visibleCount = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleCount;
  let startIdx = candles.length - visibleCount;
  let bounds = getChartBounds();

  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);

  // Upper band
  ctx.beginPath();
  for (let i = startIdx; i < candles.length; i++) {
    if (bb[i] === null) continue;
    let x = PADDING.left + (i - startIdx) * candleW + candleW / 2;
    let y = priceToY(bb[i].upper, bounds);
    if (i === startIdx) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Lower band
  ctx.beginPath();
  for (let i = startIdx; i < candles.length; i++) {
    if (bb[i] === null) continue;
    let x = PADDING.left + (i - startIdx) * candleW + candleW / 2;
    let y = priceToY(bb[i].lower, bounds);
    if (i === startIdx) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.setLineDash([]);
}

function drawVolume() {
  let visibleCount = Math.min(candles.length, 50);
  let chartW = width - PADDING.left - PADDING.right;
  let candleW = chartW / visibleCount;
  let startIdx = candles.length - visibleCount;
  let maxVol = Math.max(...candles.map(c => c.volume));
  let volHeight = (height - PADDING.top - PADDING.bottom) * 0.25;

  for (let i = startIdx; i < candles.length; i++) {
    let candle = candles[i];
    let x = PADDING.left + (i - startIdx) * candleW;
    let barWidth = candleW * 0.6;
    let barHeight = (candle.volume / maxVol) * volHeight;
    let color = candle.close >= candle.open ? 'rgba(16, 185, 129, 0.3)' : 'rgba(239, 68, 68, 0.3)';

    ctx.fillStyle = color;
    ctx.fillRect(x + (candleW - barWidth) / 2, height - PADDING.bottom - barHeight, barWidth, barHeight);
  }
}

function draw() {
  drawBackground();
  let bounds = getChartBounds();
  drawPriceAxis(bounds);
  
  if (currentIndicators.has('price')) {
    drawCandles(bounds);
  }
  
  if (currentIndicators.has('volume')) {
    drawVolume();
  }
  
  if (currentIndicators.has('ma20')) {
    drawMovingAverage(20, 'rgba(255, 193, 7, 0.7)');
  }
  
  if (currentIndicators.has('ma50')) {
    drawMovingAverage(50, 'rgba(244, 67, 54, 0.7)');
  }
  
  if (currentIndicators.has('ema')) {
    drawEMA(12, 'rgba(76, 175, 80, 0.7)');
  }
  
  if (currentIndicators.has('bb')) {
    drawBollingerBands('rgba(156, 39, 176, 0.5)');
  }

  drawTimeAxis();
}

// ====== INTERACTIVE FEATURES ======
canvas.addEventListener('mousemove', (e) => {
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let idx = getVisibleCandleIndex(x);
  let candle = candles[idx];

  if (candle && x > PADDING.left && x < width - PADDING.right && y > PADDING.top && y < height - PADDING.bottom) {
    let bounds = getChartBounds();
    let price = yToPrice(y, bounds);

    tooltip.innerHTML = `
      <div style="color: #00ffff; font-weight: bold;">CANDLE #${idx}</div>
      <div>Time: ${new Date(candle.time).toLocaleString()}</div>
      <div>O: ${candle.open.toFixed(2)}</div>
      <div>H: ${candle.high.toFixed(2)}</div>
      <div>L: ${candle.low.toFixed(2)}</div>
      <div>C: ${candle.close.toFixed(2)}</div>
      <div style="margin-top: 6px; color: #3b82f6;">Price: ${price.toFixed(2)}</div>
    `;

    tooltip.style.left = (x + 15) + 'px';
    tooltip.style.top = (y - 80) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.classList.remove('visible');
});

// ====== INDICATORS TOGGLE ======
document.querySelectorAll('.indicator-item').forEach(item => {
  item.addEventListener('click', () => {
    let indicator = item.dataset.indicator;
    if (indicator) {
      if (currentIndicators.has(indicator)) {
        currentIndicators.delete(indicator);
        item.classList.remove('active');
      } else {
        currentIndicators.add(indicator);
        item.classList.add('active');
      }
      draw();
    }
  });
});

// ====== TIMEFRAME SELECTOR ======
TIMEFRAMES.forEach(tf => {
  let btn = document.createElement('button');
  btn.className = 'tf-btn' + (tf === currentTimeframe ? ' active' : '');
  btn.textContent = tf;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTimeframe = tf;
  });
  timeframeSelector.appendChild(btn);
});

// ====== RIGHT PANEL UPDATE ======
function updateRightPanel() {
  if (candles.length < 2) return;

  let current = candles[candles.length - 1];
  let prev = candles[candles.length - 2];
  let changePercent = ((current.close - prev.close) / prev.close) * 100;

  let rsi = calculateRSI();
  let currentRSI = rsi[rsi.length - 1];
  let macd = calculateMACD();
  let currentMACD = macd.macdLine[macd.macdLine.length - 1];

  let ma20 = calculateMA(20);
  let ma50 = calculateMA(50);

  rightPanel.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">📊 Price</div>
      <div class="panel-metric">
        <span class="metric-label">Close:</span>
        <span class="metric-value">${current.close.toFixed(2)}</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">Change:</span>
        <span class="metric-value" style="color: ${changePercent >= 0 ? '#10b981' : '#ef4444'}">
          ${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%
        </span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">High:</span>
        <span class="metric-value">${current.high.toFixed(2)}</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">Low:</span>
        <span class="metric-value">${current.low.toFixed(2)}</span>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">💰 Synthetic</div>
      <div class="panel-metric">
        <span class="metric-label">BTC:</span>
        <span class="metric-value">$${syntheticData.btc.toFixed(0)}</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">TOTAL:</span>
        <span class="metric-value">$${(syntheticData.total / 1000000).toFixed(2)}M</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">USDT.D:</span>
        <span class="metric-value">${syntheticData.usdtd.toFixed(2)}%</span>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">📈 Indicators</div>
      <div class="panel-metric">
        <span class="metric-label">RSI(14):</span>
        <span class="metric-value" style="color: ${currentRSI > 70 ? '#ef4444' : currentRSI < 30 ? '#10b981' : '#00ffff'}">
          ${currentRSI.toFixed(2)}
        </span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">MACD:</span>
        <span class="metric-value" style="color: ${currentMACD >= 0 ? '#10b981' : '#ef4444'}">
          ${currentMACD.toFixed(4)}
        </span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">MA(20):</span>
        <span class="metric-value">${ma20[ma20.length - 1]?.toFixed(2) || 'N/A'}</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">MA(50):</span>
        <span class="metric-value">${ma50[ma50.length - 1]?.toFixed(2) || 'N/A'}</span>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">⚙️ Volume</div>
      <div class="panel-metric">
        <span class="metric-label">Volume:</span>
        <span class="metric-value">${(current.volume / 1000).toFixed(1)}K</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">Buy Vol:</span>
        <span class="metric-value" style="color: #10b981">${(current.buyVol / 1000).toFixed(1)}K</span>
      </div>
      <div class="panel-metric">
        <span class="metric-label">Sell Vol:</span>
        <span class="metric-value" style="color: #ef4444">${(current.sellVol / 1000).toFixed(1)}K</span>
      </div>
    </div>
  `;
}

// ====== TICKER UPDATE ======
function updateTicker() {
  if (candles.length < 2) return;

  let current = candles[candles.length - 1];
  let change = ((current.close - candles[candles.length - 2].close) / candles[candles.length - 2].close) * 100;
  let changeClass = change >= 0 ? 'change-up' : 'change-down';

  tickerInfo.innerHTML = `
    <div class="ticker-item">
      <span class="ticker-label">BTC:</span>
      <span class="ticker-value">$${syntheticData.btc.toFixed(0)}</span>
      <span class="ticker-change ${syntheticData.btcChange >= 0 ? 'change-up' : 'change-down'}">
        ${syntheticData.btcChange >= 0 ? '+' : ''}${syntheticData.btcChange.toFixed(2)}%
      </span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">TOTAL:</span>
      <span class="ticker-value">$${(syntheticData.total / 1000000).toFixed(1)}M</span>
      <span class="ticker-change ${syntheticData.totalChange >= 0 ? 'change-up' : 'change-down'}">
        ${syntheticData.totalChange >= 0 ? '+' : ''}${syntheticData.totalChange.toFixed(2)}%
      </span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">USDT.D:</span>
      <span class="ticker-value">${syntheticData.usdtd.toFixed(2)}%</span>
      <span class="ticker-change ${syntheticData.usdtdChange >= 0 ? 'change-up' : 'change-down'}">
        ${syntheticData.usdtdChange >= 0 ? '+' : ''}${syntheticData.usdtdChange.toFixed(2)}%
      </span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">SYNTHETIC:</span>
      <span class="ticker-value">${current.close.toFixed(2)}</span>
      <span class="ticker-change ${change >= 0 ? 'change-up' : 'change-down'}">
        ${change >= 0 ? '+' : ''}${change.toFixed(2)}%
      </span>
    </div>
  `;
}

// ====== BOTTOM PANEL UPDATE ======
function updateBottomPanel() {
  if (candles.length === 0) return;

  let current = candles[candles.length - 1];
  let bids = [];
  let asks = [];

  for (let i = 0; i < 5; i++) {
    bids.push({
      price: (current.close - (i + 1) * 10).toFixed(2),
      size: (Math.random() * 5 + 1).toFixed(1)
    });
    asks.push({
      price: (current.close + (i + 1) * 10).toFixed(2),
      size: (Math.random() * 5 + 1).toFixed(1)
    });
  }

  let orderBookHTML = `
    <div class="book-side">
      <div class="book-header">💰 Bids</div>
      ${bids.map(b => `<div class="book-row"><span class="book-price">${b.price}</span><span class="book-size">${b.size}</span></div>`).join('')}
    </div>
    <div class="book-side">
      <div class="book-header">💰 Asks</div>
      ${asks.map(a => `<div class="book-row"><span class="book-price">${a.price}</span><span class="book-size">${a.size}</span></div>`).join('')}
    </div>
  `;

  bottomPanel.innerHTML = `<div class="order-book">${orderBookHTML}</div>`;
}

// ====== LIVE ENGINE ======
function updateEngine() {
  if (Math.random() > 0.8) {
    let lastCandle = candles[candles.length - 1];
    let newPrice = lastCandle.close + (Math.random() - 0.5) * 200;
    
    candles.push({
      time: Date.now(),
      open: lastCandle.close,
      close: newPrice,
      high: Math.max(lastCandle.close, newPrice) + Math.random() * 100,
      low: Math.min(lastCandle.close, newPrice) - Math.random() * 100,
      volume: Math.floor(Math.random() * 100000) + 50000,
      buyVol: Math.floor(Math.random() * 50000) + 25000,
      sellVol: Math.floor(Math.random() * 50000) + 25000
    });

    if (candles.length > 150) candles.shift();
  } else {
    let lastCandle = candles[candles.length - 1];
    lastCandle.close += (Math.random() - 0.5) * 50;
    lastCandle.high = Math.max(lastCandle.open, lastCandle.close) + Math.random() * 50;
    lastCandle.low = Math.min(lastCandle.open, lastCandle.close) - Math.random() * 50;
    lastCandle.volume += Math.floor(Math.random() * 5000);
  }

  syntheticData.btc += (Math.random() - 0.5) * 200;
  syntheticData.total += (Math.random() - 0.5) * 50000;
  syntheticData.usdtd += (Math.random() - 0.5) * 0.2;

  draw();
  updateRightPanel();
  updateTicker();
  updateBottomPanel();
  requestAnimationFrame(updateEngine);
}

// Initialize
draw();
updateRightPanel();
updateTicker();
updateBottomPanel();
requestAnimationFrame(updateEngine);
</script>
