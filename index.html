<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRANCIS TERMINAL • ELITE COMPOSITE V5</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#070c12;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
padding:16px;
}
h1{
font-size:28px;
margin-bottom:4px;
}
.sub{
color:#8ea2bd;
margin-bottom:16px;
}
.wrap{
display:grid;
grid-template-columns:1fr 320px;
gap:16px;
}
.panel,.side{
background:#101821;
border:1px solid #1e2a38;
border-radius:16px;
padding:14px;
}
.side{
display:grid;
gap:12px;
height:max-content;
}
.card{
background:#0c131b;
border-radius:12px;
padding:14px;
}
.lab{
font-size:12px;
color:#8ea2bd;
}
.val{
font-size:28px;
font-weight:700;
margin-top:8px;
}
canvas{
width:100%;
height:560px;
display:block;
background:#0a1017;
border-radius:12px;
}
.bias{
font-size:34px;
font-weight:700;
margin-top:12px;
}
.meta{
margin-top:8px;
font-size:13px;
color:#8ea2bd;
display:flex;
gap:18px;
flex-wrap:wrap;
}
.green{color:#16c784}
.red{color:#ea3943}
.gold{color:#f0b90b}
@media(max-width:900px){
.wrap{grid-template-columns:1fr}
canvas{height:420px}
}
</style>
</head>
<body>

<h1>FRANCIS TERMINAL</h1>
<div class="sub">Elite Composite Candle V5 • Fixed Stable Engine • Daily TF</div>

<div class="wrap">

<div class="panel">
<canvas id="chart" width="980" height="560"></canvas>
<div class="bias" id="biasText">Loading...</div>

<div class="meta">
<div>TF: <span class="gold">1D</span></div>
<div>Mode: <span class="green">LIVE</span></div>
<div>Refresh: 30s</div>
<div id="clock">--:--:--</div>
</div>
</div>

<div class="side">

<div class="card"><div class="lab">BTC.D</div><div class="val" id="btcdom">--</div></div>
<div class="card"><div class="lab">USDT.D</div><div class="val" id="usdtdom">--</div></div>
<div class="card"><div class="lab">ETHBTC</div><div class="val" id="ethbtc">--</div></div>
<div class="card"><div class="lab">ETH.D</div><div class="val" id="ethdom">--</div></div>
<div class="card"><div class="lab">TOTAL</div><div class="val" id="total">--</div></div>
<div class="card"><div class="lab">ROTATION SCORE</div><div class="val" id="score">--</div></div>

</div>

</div>

<script>
const cv=document.getElementById("chart");
const ctx=cv.getContext("2d");
let candles=[];

/* ---------- CLOCK ---------- */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

/* ---------- DRAW ---------- */
function bg(){
ctx.fillStyle="#0a1017";
ctx.fillRect(0,0,cv.width,cv.height);

ctx.strokeStyle="#15202c";
ctx.lineWidth=1;

for(let i=0;i<10;i++){
let y=i*(cv.height/10);
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(cv.width,y);
ctx.stroke();
}

for(let i=0;i<16;i++){
let x=i*(cv.width/16);
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,cv.height);
ctx.stroke();
}
}

function render(){

bg();
if(candles.length<2)return;

let max=Math.max(...candles.map(x=>x.high));
let min=Math.min(...candles.map(x=>x.low));
let range=max-min || 1;

let x=26,w=24,g=10;

candles.forEach(c=>{

let col="#f0b90b";
if(c.close>c.open) col="#16c784";
if(c.close<c.open) col="#ea3943";

let yh=((max-c.high)/range)*(cv.height-40)+20;
let yl=((max-c.low)/range)*(cv.height-40)+20;
let yo=((max-c.open)/range)*(cv.height-40)+20;
let yc=((max-c.close)/range)*(cv.height-40)+20;

ctx.strokeStyle=col;
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(x+w/2,yh);
ctx.lineTo(x+w/2,yl);
ctx.stroke();

ctx.fillStyle=col;
ctx.fillRect(x,Math.min(yo,yc),w,Math.max(3,Math.abs(yc-yo)));

x+=w+g;

});

}

/* ---------- DATA ---------- */
function rnd(a,b){return a+Math.random()*(b-a);}

function fake(){
return{
btc:rnd(57.6,59.4),
usdt:rnd(6.6,8.4),
eth:rnd(10.0,13.0),
eb:rnd(0.0288,0.0316),
total:rnd(2.45,2.88)
};
}

function calc(d){

let score =
(d.btc*0.65)+
((10-d.usdt)*1.2)+
(d.eb*900)+
(d.eth*0.50)+
(d.total*2.2);

return score;
}

function push(d){

let p=calc(d);
let prev=candles.length?candles[candles.length-1].close:p;

let open=prev;
let close=p;
let high=Math.max(open,close)+Math.random()*1.2;
let low=Math.min(open,close)-Math.random()*1.2;

candles.push({open,high,low,close});
if(candles.length>30)candles.shift();

render();

/* cards */
btcdom.innerText=d.btc.toFixed(2)+"%";
usdtdom.innerText=d.usdt.toFixed(2)+"%";
ethdom.innerText=d.eth.toFixed(2)+"%";
ethbtc.innerText=d.eb.toFixed(5);
total.innerText="$"+d.total.toFixed(2)+"T";
scoreEl=document.getElementById("score");
scoreEl.innerText=p.toFixed(2);

/* bias */
let txt="▶ SIDEWAYS", c="#f0b90b";

if(p>72){txt="▲ BULLISH";c="#16c784";}
else if(p<61){txt="▼ BEARISH";c="#ea3943";}

biasText.innerText=txt;
biasText.style.color=c;
}

async function load(){

try{

const cg=await fetch("https://api.coingecko.com/api/v3/global",{cache:"no-store"}).then(r=>r.json());
const pair=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHBTC",{cache:"no-store"}).then(r=>r.json());

const d={
btc:cg.data.market_cap_percentage.btc,
usdt:cg.data.market_cap_percentage.usdt,
eth:cg.data.market_cap_percentage.eth,
eb:parseFloat(pair.price),
total:cg.data.total_market_cap.usd/1e12
};

localStorage.setItem("elite_cache",JSON.stringify(d));
push(d);

}catch(e){

let c=localStorage.getItem("elite_cache");
if(c) push(JSON.parse(c));
else push(fake());

}

}

/* preload */
for(let i=0;i<22;i++) push(fake());

load();
setInterval(load,30000);
</script>

</body>
</html>
