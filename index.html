<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V15 Multi-TF Footprint</title>

<style>
body {
  margin:0;
  background:#05070c;
  color:#fff;
  font-family: monospace;
}

#controls {
  padding:10px;
  background:#0f172a;
}

button, select {
  background:#111827;
  color:#fff;
  border:none;
  padding:6px 10px;
  margin-right:10px;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<div id="controls">

  TF:
  <select id="tf" onchange="switchTF()">
    <option value="1">1m</option>
    <option value="5">5m</option>
    <option value="15">15m</option>
    <option value="60">1H</option>
    <option value="240">4H</option>
    <option value="1440">1D</option>
    <option value="10080">1W</option>
  </select>

  <button onclick="updateData()">NEW CANDLE</button>

</div>

<canvas id="chart"></canvas>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

// ---------------------
// TIMEFRAME STORAGE
// ---------------------
const TFs = {
  1: [], 5: [], 15: [],
  60: [], 240: [],
  1440: [], 10080: []
};

let currentTF = 1;

// ---------------------
// DATA FETCH (HOOK)
// ---------------------
async function fetchRealData(){

  // 🔌 Replace later with real API
  return {
    total: 1000 + Math.random()*10,
    usdt: 6 + Math.random()*0.3
  };
}

// ---------------------
// CREATE CANDLE
// ---------------------
async function updateData(){

  let data = await fetchRealData();

  let arr = TFs[currentTF];

  let prev = arr.length > 0 ? arr[arr.length-1] : null;

  let prevT = prev ? prev.total : data.total;
  let prevU = prev ? prev.usdt : data.usdt;

  let delta = (data.total - prevT) - (data.usdt - prevU);

  let levels = [];
  let rows = Math.max(4, Math.floor(Math.abs(delta) * 5));

  for(let i=0;i<rows;i++){
    levels.push({
      vol: Math.floor(Math.random()*80+20),
      side: delta > 0 ? "buy" : "sell"
    });
  }

  arr.push({
    total: data.total,
    usdt: data.usdt,
    delta,
    levels
  });

  if(arr.length > 25) arr.shift();

  draw();
}

// ---------------------
// DRAW FOOTPRINT
// ---------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let arr = TFs[currentTF];

  let x = 80;

  arr.forEach(c => {

    let centerY = canvas.height / 2;

    c.levels.forEach((lvl, i) => {

      let h = 18;
      let y = centerY - i*h;

      // background
      ctx.fillStyle = "#111";
      ctx.fillRect(x, y, 60, h-2);

      // color
      ctx.fillStyle = lvl.side === "buy"
        ? "rgba(34,197,94,0.4)"
        : "rgba(239,68,68,0.4)";
      ctx.fillRect(x, y, 60, h-2);

      // text
      ctx.fillStyle = "#fff";
      ctx.fillText(lvl.vol + "M", x+10, y+12);

    });

    x += 70;
  });
}

// ---------------------
// SWITCH TF
// ---------------------
function switchTF(){
  currentTF = parseInt(document.getElementById("tf").value);
  draw();
}

// initial draw
draw();

</script>

</body>
</html>
