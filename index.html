<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>V6000 TRUE TRADINGVIEW ENGINE FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#06111f;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
color:#dce8f5;
}
#top{
height:52px;
display:flex;
align-items:center;
padding:0 14px;
border-bottom:1px solid #0d2a42;
font-weight:700;
letter-spacing:.5px;
}
#chart{
width:100%;
height:calc(100vh - 52px);
}
</style>
</head>
<body>

<div id="top">FLOW TERMINAL • V6000 TRUE TRADINGVIEW CHART ENGINE</div>
<div id="chart"></div>

<script>
const el = document.getElementById("chart");

const chart = LightweightCharts.createChart(el,{
width:el.clientWidth,
height:el.clientHeight,
layout:{
background:{color:"#06111f"},
textColor:"#7089a3"
},
grid:{
vertLines:{color:"#0d2238"},
horzLines:{color:"#0d2238"}
},
rightPriceScale:{
borderColor:"#16324b"
},
timeScale:{
borderColor:"#16324b",
timeVisible:true,
secondsVisible:false
},
crosshair:{mode:1}
});

const candle = chart.addCandlestickSeries({
upColor:"#15e27a",
downColor:"#6e42ff",
borderUpColor:"#15e27a",
borderDownColor:"#6e42ff",
wickUpColor:"#15e27a",
wickDownColor:"#6e42ff"
});

const ema = chart.addLineSeries({
color:"#b98a2e",
lineWidth:2
});

let data=[];
let base=0;
let time=Math.floor(Date.now()/1000)-300*3600;

for(let i=0;i<300;i++){
let open=base;
let move=(Math.random()-.5)*3 + Math.sin(i/10)*1.2;
let close=open+move;
let high=Math.max(open,close)+Math.random()*1.5;
let low=Math.min(open,close)-Math.random()*1.5;

data.push({
time:time,
open:open,
high:high,
low:low,
close:close
});

base=close;
time+=3600;
}

candle.setData(data);

function calcEMA(){
let out=[];
let k=2/(21+1);
let prev=data[0].close;

for(let i=0;i<data.length;i++){
prev=data[i].close*k + prev*(1-k);
out.push({time:data[i].time,value:prev});
}
ema.setData(out);
}
calcEMA();

chart.timeScale().fitContent();

function updateBar(){

let last=data[data.length-1];

let move=(Math.random()-.5)*1.4;
last.close+=move;

if(last.close>last.high) last.high=last.close;
if(last.close<last.low) last.low=last.close;

candle.update(last);

calcEMA();
}

function newBar(){

let prev=data[data.length-1];

let t=prev.time+3600;
let open=prev.close;
let close=open+(Math.random()-.5)*2.5;
let high=Math.max(open,close)+Math.random();
let low=Math.min(open,close)-Math.random();

let bar={
time:t,
open:open,
high:high,
low:low,
close:close
};

data.push(bar);

if(data.length>400) data.shift();

candle.setData(data);
calcEMA();
}

setInterval(updateBar,1000);
setInterval(newBar,10000);

window.addEventListener("resize",()=>{
chart.applyOptions({
width:el.clientWidth,
height:el.clientHeight
});
chart.timeScale().fitContent();
});
</script>

</body>
</html>
