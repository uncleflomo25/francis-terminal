<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidity X Trading Platform</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    background:#050505;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.chart{
    display:flex;
    align-items:flex-end;
    height:100%;
    gap:2px;
    padding:20px;
}

.candle{
    width:100%;
    border-radius:2px 2px 0 0;
}
</style>
</head>

<body>

<div class="h-screen w-full bg-black text-white flex overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-64 border-r border-zinc-800 bg-zinc-950 flex flex-col">

        <div class="p-5 border-b border-zinc-800">
            <h1 class="text-2xl font-bold">
                LIQUIDITY X
            </h1>

            <p class="text-zinc-500 text-sm mt-1">
                Non-Custodial Trading Platform
            </p>
        </div>

        <div class="p-4">
            <button
                class="w-full rounded-2xl bg-emerald-500 hover:bg-emerald-400 transition p-3 font-semibold text-black">
                Connect Wallet
            </button>
        </div>

        <div class="px-4 pb-2 text-zinc-400 text-sm uppercase">
            Markets
        </div>

        <div class="flex-1 overflow-auto px-3 space-y-2">

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                BTCUSD
            </div>

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                ETHUSD
            </div>

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                XAUUSD
            </div>

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V25
            </div>

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V75
            </div>

            <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
                V100
            </div>

        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- TOPBAR -->
        <div class="h-16 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-6">

            <div>
                <div class="text-xl font-bold">
                    BTCUSD
                </div>

                <div class="text-sm text-zinc-500">
                    Institutional Liquidity Engine
                </div>
            </div>

            <div class="flex gap-2">

                <button class="px-4 py-2 rounded-xl bg-zinc-800">
                    1M
                </button>

                <button class="px-4 py-2 rounded-xl bg-zinc-800">
                    5M
                </button>

                <button class="px-4 py-2 rounded-xl bg-emerald-500 text-black font-bold">
                    1H
                </button>

                <button class="px-4 py-2 rounded-xl bg-zinc-800">
                    4H
                </button>

                <button class="px-4 py-2 rounded-xl bg-zinc-800">
                    1D
                </button>

            </div>

        </div>

        <!-- CENTER -->
        <div class="flex-1 flex overflow-hidden">

            <!-- CHART -->
            <div class="flex-1 relative bg-[#040404]">

                <div class="absolute top-6 left-6 z-10">
                    <div class="text-5xl font-bold">
                        103,428
                    </div>

                    <div class="text-emerald-400 text-lg">
                        +2.42%
                    </div>
                </div>

                <div id="chart" class="chart"></div>

            </div>

            <!-- ORDER PANEL -->
            <div class="w-96 border-l border-zinc-800 bg-zinc-950 flex flex-col">

                <div class="p-5 border-b border-zinc-800">
                    <h2 class="text-xl font-bold">
                        Trade Panel
                    </h2>
                </div>

                <div class="p-5 space-y-5">

                    <select
                        class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3">

                        <option>BTCUSD</option>
                        <option>ETHUSD</option>
                        <option>XAUUSD</option>
                        <option>V25</option>
                        <option>V75</option>
                        <option>V100</option>

                    </select>

                    <div class="grid grid-cols-2 gap-3">

                        <button
                            class="rounded-2xl p-4 bg-emerald-500 text-black font-bold">
                            BUY
                        </button>

                        <button
                            class="rounded-2xl p-4 bg-red-500 text-white font-bold">
                            SELL
                        </button>

                    </div>

                    <input
                        placeholder="Order Size"
                        class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-3">

                    <input
                        type="range"
                        min="1"
                        max="100"
                        class="w-full">

                    <div class="rounded-2xl bg-zinc-900 border border-zinc-800 p-4 space-y-3">

                        <div class="flex justify-between">
                            <span class="text-zinc-400">Margin</span>
                            <span>$245</span>
                        </div>

                        <div class="flex justify-between">
                            <span class="text-zinc-400">Liquidation</span>
                            <span>101,230</span>
                        </div>

                        <div class="flex justify-between">
                            <span class="text-zinc-400">Fees</span>
                            <span>0.04%</span>
                        </div>

                    </div>

                    <button
                        class="w-full rounded-2xl bg-emerald-500 text-black font-bold p-4">
                        Execute Trade
                    </button>

                </div>

            </div>

        </div>

        <!-- POSITIONS -->
        <div class="h-64 border-t border-zinc-800 bg-zinc-950 overflow-auto">

            <div class="px-6 py-4 border-b border-zinc-800">
                <h2 class="text-lg font-bold">
                    Open Positions
                </h2>
            </div>

            <div class="p-4 space-y-3">

                <div
                    class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4 flex justify-between">

                    <div>
                        <div class="font-semibold">
                            BTCUSD LONG
                        </div>

                        <div class="text-zinc-500 text-sm">
                            Entry: 103420
                        </div>
                    </div>

                    <div class="text-emerald-400 text-xl font-bold">
                        +245.20
                    </div>

                </div>

                <div
                    class="rounded-2xl border border-zinc-800 bg-zinc-900 p-4 flex justify-between">

                    <div>
                        <div class="font-semibold">
                            XAUUSD SHORT
                        </div>

                        <div class="text-zinc-500 text-sm">
                            Entry: 3218
                        </div>
                    </div>

                    <div class="text-red-400 text-xl font-bold">
                        -42.80
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const chart = document.getElementById("chart")

for(let i=0;i<120;i++){

    const candle = document.createElement("div")

    candle.classList.add("candle")

    const bullish = Math.random() > 0.45

    candle.style.background =
        bullish
        ? "#00ff88"
        : "#ff4444"

    candle.style.height =
        (80 + Math.random()*350) + "px"

    candle.style.flex = "1"

    chart.appendChild(candle)
}

</script>

</body>
</html>
