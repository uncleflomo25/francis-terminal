<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FRANCIS TERMINAL V5 TRUE FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#131722;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
overflow:hidden;
}

/* TOP */
.topbar{
height:52px;
background:#11161f;
border-bottom:1px solid #222b39;
display:flex;
align-items:center;
gap:8px;
padding:0 12px;
}
.logo{font-weight:700;margin-right:10px}
.btn{
background:#1e222d;
padding:7px 11px;
border-radius:6px;
cursor:pointer;
font-size:13px;
color:#cfd6e4;
user-select:none;
}
.btn:hover{background:#2a3140}

/* LAYOUT */
.wrap{
display:grid;
grid-template-columns:1fr 300px;
height:calc(100vh - 52px);
}
.left{
position:relative;
overflow:hidden;
background:#131722;
}
.right{
background:#0d1520;
border-left:1px solid #1f2937;
padding:12px;
display:grid;
gap:10px;
align-content:start;
}
.card{
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
padding:12px;
}
.lab{font-size:11px;color:#8ea2bd}
.val{font-size:28px;font-weight:700;margin-top:6px}

canvas{
position:absolute;
inset:0;
cursor:grab;
}

.water{
position:absolute;
top:18px;
left:18px;
font-size:28px;
font-weight:700;
color:rgba(255,255,255,.04);
pointer-events:none;
z-index:5;
}

.status{
position:absolute;
bottom:12px;
left:14px;
font-size:13px;
color:#94a3b8;
display:flex;
gap:14px;
z-index:5;
}

@media(max-width:950px){
.wrap{grid-template-columns:1fr}
.right{display:none}
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">FRANCIS TERMINAL</div>

<div class="btn" onclick="setTF(1200)">1m</div>
<div class="btn" onclick="setTF(2500)">5m</div>
<div class="btn" onclick="setTF(4000)">1H</div>
<div class="btn" onclick="setTF(7000)">4H</div>
<div class="btn" onclick="setTF(10000)">1D</div>

<div class="btn" onclick="zoomIn()">+</div>
<div class="btn" onclick="zoomOut()">-</div>
<div class="btn" onclick="resetView()">Reset</div>
</div>

<div class="wrap">

<div class="left" id="box">
<div class="water">FRANCIS TERMINAL</div>
<canvas id="chart"></canvas>

<div class="status">
<div>Composite Engine</div>
<div id="clock"></div>
<div id="live">LIVE</div>
</div>
</div>

<div class="right">
<div class="card"><div class="lab">BTC.D</div><div class="val" id="btc">--</div></div>
<div class="card"><div class="lab">USDT.D</div><div class="val" id="usdt">--</div></div>
<div class="card"><div class="lab">ETHBTC</div><div class="val" id="ethbtc">--</div></div>
<div class="card"><div class="lab">ETH.D</div><div class="val" id="ethd">--</div></div>
<div class="card"><div class="lab">TOTAL</div><div class="val" id="total">--</div></div>
<div class="card"><div class="lab">MODE</div><div class="val" id="mode">BALANCED</div></div>
</div>

</div>

<script>
const box=document.getElementById("box");
const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");

/* STATE */
let bars=[];
let zoom=1;
let pan=0;
let drag=false;
let startX=0;
let timer=null;
let speed=2500;

/* resize */
function resize(){
canvas.width=box.clientWidth;
canvas.height=box.clientHeight;
draw();
}
window.addEventListener("resize",resize);

/* clock */
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

/* controls */
function zoomIn(){zoom*=1.12;draw();}
function zoomOut(){zoom/=1.12;if(zoom<0.45)zoom=0.45;draw();}
function resetView(){zoom=1;pan=0;draw();}
function setTF(v){
speed=v;
clearInterval(timer);
timer=setInterval(update, speed);
}

/* mouse drag */
canvas.onmousedown=e=>{
drag=true;
startX=e.clientX;
canvas.style.cursor="grabbing";
};
window.onmouseup=()=>{
drag=false;
canvas.style.cursor="grab";
};
window.onmousemove=e=>{
if(!drag)return;
pan += e.clientX-startX;
startX=e.clientX;
draw();
};
canvas.onwheel=e=>{
e.preventDefault();
if(e.deltaY<0) zoomIn();
else zoomOut();
};

/* helpers */
function rnd(a,b){return a+Math.random()*(b-a);}

/* realistic starter */
function seed(){
let p=100;
for(let i=0;i<120;i++){
let o=p;
let move=rnd(-1.2,1.2); /* small move only */
let c=o+move;
let h=Math.max(o,c)+rnd(0.1,0.8);
let l=Math.min(o,c)-rnd(0.1,0.8);
bars.push({o,h,l,c});
p=c;
}
}

/* draw bg */
function bg(){
ctx.fillStyle="#131722";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#1f2430";
for(let i=0;i<12;i++){
let y=i*canvas.height/12;
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}
for(let i=0;i<18;i++){
let x=i*canvas.width/18;
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}
}

/* draw chart */
function draw(){

bg();
if(bars.length<2)return;

let max=Math.max(...bars.map(b=>b.h));
let min=Math.min(...bars.map(b=>b.l));
let range=max-min || 1;

/* protect giant crash moves */
if(range>40){
min=max-20;
range=20;
}

let w=9*zoom;
let gap=4*zoom;
let x=20+pan;

bars.forEach(b=>{

let col="#f0b90b";
if(b.c>b.o) col="#26a69a";
if(b.c<b.o) col="#ef5350";

let yo=((max-b.o)/range)*(canvas.height-50)+20;
let yc=((max-b.c)/range)*(canvas.height-50)+20;
let yh=((max-b.h)/range)*(canvas.height-50)+20;
let yl=((max-b.l)/range)*(canvas.height-50)+20;

ctx.strokeStyle=col;
ctx.beginPath();
ctx.moveTo(x+w/2,yh);
ctx.lineTo(x+w/2,yl);
ctx.stroke();

ctx.fillStyle=col;
ctx.fillRect(x,Math.min(yo,yc),w,Math.max(2,Math.abs(yc-yo)));

x += w+gap;
});

/* price line */
let last=bars[bars.length-1].c;
let py=((max-last)/range)*(canvas.height-50)+20;
ctx.strokeStyle="#d94b4b";
ctx.setLineDash([5,5]);
ctx.beginPath();
ctx.moveTo(0,py);
ctx.lineTo(canvas.width,py);
ctx.stroke();
ctx.setLineDash([]);

document.getElementById("live").innerText="LIVE "+last.toFixed(2);
}

/* process data = NO MORE CRASH DROP */
function process(d){

let prev=bars[bars.length-1].c;

/* use tiny normalized movement */
let force=
((d.ethbtc-0.03)*120)+
((d.ethd-10)*0.12)+
((58-d.btc)*0.10)+
((8-d.usdt)*0.08)+
((d.total-2.5)*0.30);

if(force>1.5) force=1.5;
if(force<-1.5) force=-1.5;

let o=prev;
let c=o+force;
let h=Math.max(o,c)+rnd(0.15,0.7);
let l=Math.min(o,c)-rnd(0.15,0.7);

bars.push({o,h,l,c});
if(bars.length>180) bars.shift();

draw();

/* side data */
btc.innerText=d.btc.toFixed(2)+"%";
usdt.innerText=d.usdt.toFixed(2)+"%";
ethbtc.innerText=d.ethbtc.toFixed(5);
ethd.innerText=d.ethd.toFixed(2)+"%";
total.innerText="$"+d.total.toFixed(2)+"T";

let mode="BALANCED";
let col="#f0b90b";

if(d.ethbtc>0.0303 && d.ethd>10.8){mode="ETH MODE";col="#26a69a";}
if(d.btc>58.4 && d.ethbtc<0.0299){mode="BTC MODE";col="#f0b90b";}
if(d.usdt>8.2){mode="DEFENSIVE";col="#ef5350";}

modeEl=document.getElementById("mode");
modeEl.innerText=mode;
modeEl.style.color=col;
}

/* fetch */
async function update(){

try{
const [cg,bn]=await Promise.all([
fetch("https://api.coingecko.com/api/v3/global").then(r=>r.json()),
fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHBTC").then(r=>r.json())
]);

const d={
btc:cg.data.market_cap_percentage.btc,
usdt:cg.data.market_cap_percentage.usdt,
ethd:cg.data.market_cap_percentage.eth,
ethbtc:parseFloat(bn.price),
total:cg.data.total_market_cap.usd/1e12
};

localStorage.setItem("francisV5",JSON.stringify(d));
process(d);

}catch(e){

let c=localStorage.getItem("francisV5");

if(c) process(JSON.parse(c));
else process({
btc:rnd(57.8,58.6),
usdt:rnd(6.8,8.0),
ethd:rnd(10.1,11.2),
ethbtc:rnd(0.0294,0.0304),
total:rnd(2.55,2.72)
});

}

}

/* boot */
resize();
seed();
draw();
update();
timer=setInterval(update,speed);
</script>

</body>
</html>
