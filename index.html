<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 FRANCIS TERMINAL V11 — DAILY SYNC</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
--text:#fff;
--muted:#c6a8ff;
--line:#7a2cff;
--green:#00ff9c;
--red:#ff4d6d;
--gold:#ffd700;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
min-height:100vh;
background:
radial-gradient(circle at 20% 10%, rgba(140,0,255,.18), transparent 20%),
radial-gradient(circle at 80% 15%, rgba(90,0,200,.15), transparent 22%),
radial-gradient(circle at 50% 85%, rgba(140,0,255,.12), transparent 25%),
linear-gradient(135deg,#000,#08000f,#180025,#000);
background-attachment:fixed;
}

.header{
text-align:center;
padding:14px;
font-size:22px;
font-weight:700;
background:rgba(0,0,0,.55);
border-bottom:1px solid var(--line);
}

.sub{
text-align:center;
font-size:12px;
color:var(--muted);
padding:6px 0 10px;
}

.top{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.box,.master{
background:#090611;
border:1px solid var(--line);
border-radius:14px;
padding:12px;
text-align:center;
}

.symbol{font-size:12px;color:var(--muted);}
.price{font-size:19px;font-weight:700;margin-top:4px;}
.arrow{font-size:20px;margin-top:5px;}
.note{font-size:11px;margin-top:4px;color:#b89cff;}

.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--gold);}

.master{
margin:0 10px 10px;
font-size:18px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.chart{
height:360px;
border:1px solid var(--line);
border-radius:14px;
overflow:hidden;
background:#000;
}

@media(max-width:1100px){
.top{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:700px){
.top,.grid{grid-template-columns:1fr;}
.chart{height:320px;}
}
</style>
</head>

<body>

<div class="header">💜 FRANCIS TERMINAL V11 — DAILY SYNC ENGINE</div>
<div class="sub">Top Panel Uses Daily Candle Direction</div>

<div class="top">

<div class="box">
<div class="symbol">USDT.D</div>
<div class="price" id="p1">DAILY</div>
<div class="arrow" id="a1">➜</div>
<div class="note" id="n1">Loading</div>
</div>

<div class="box">
<div class="symbol">ETHBTC</div>
<div class="price" id="p2">DAILY</div>
<div class="arrow" id="a2">➜</div>
<div class="note" id="n2">Loading</div>
</div>

<div class="box">
<div class="symbol">BTC.D</div>
<div class="price" id="p3">DAILY</div>
<div class="arrow" id="a3">➜</div>
<div class="note" id="n3">Loading</div>
</div>

<div class="box">
<div class="symbol">TOTAL</div>
<div class="price" id="p4">DAILY</div>
<div class="arrow" id="a4">➜</div>
<div class="note" id="n4">Loading</div>
</div>

<div class="box">
<div class="symbol">MASTER</div>
<div class="price" id="p5">SYNC</div>
<div class="arrow" id="a5">➜</div>
<div class="note" id="n5">Loading</div>
</div>

</div>

<div class="master" id="masterBox">Syncing Daily Candle Bias...</div>

<div class="grid">
<div id="c1" class="chart"></div>
<div id="c2" class="chart"></div>
<div id="c3" class="chart"></div>
<div id="c4" class="chart"></div>
</div>

<script>
function arrow(id,v){
if(v>0) document.getElementById(id).innerHTML='<span class="green">▲</span>';
else if(v<0) document.getElementById(id).innerHTML='<span class="red">▼</span>';
else document.getElementById(id).innerHTML='<span class="yellow">➜</span>';
}

async function ticker(sym){
let r=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+sym);
return await r.json();
}

async function gecko(){
let r=await fetch("https://api.coingecko.com/api/v3/global");
return await r.json();
}

async function update(){

try{

const btc = await ticker("BTCUSDT");
const eth = await ticker("ETHUSDT");
const ethbtc = await ticker("ETHBTC");
const cg = await gecko();

/* DAILY CHANGE = use 24h % as daily candle proxy */
let btcD = parseFloat(btc.priceChangePercent);
let ethD = parseFloat(eth.priceChangePercent);
let ebD  = parseFloat(ethbtc.priceChangePercent);

/* USDT.D daily inverse market flow */
let usdtD = -((btcD+ethD)/2);

/* TOTAL daily proxy */
let totalD = (btcD+ethD)/2;

/* BTC.D proxy */
let btcDomD = btcD;

/* ===== TOP PANEL DAILY ===== */

p1.innerText = usdtD.toFixed(2)+"%";
arrow("a1",usdtD);
n1.innerText = "Daily Candle";

p2.innerText = parseFloat(ethbtc.lastPrice).toFixed(6);
arrow("a2",ebD);
n2.innerText = "Daily Candle";

p3.innerText = btcDomD.toFixed(2)+"%";
arrow("a3",btcDomD);
n3.innerText = "Daily Candle";

p4.innerText = totalD.toFixed(2)+"%";
arrow("a4",totalD);
n4.innerText = "Daily Candle";

/* MASTER */
let score=0;
if(usdtD<0)score+=1;else score-=1;
if(ebD>0)score+=1;else score-=1;
if(btcDomD>0)score+=1;else score-=1;
if(totalD>0)score+=2;else score-=2;

let bias="SIDEWAYS";
let v=0;

if(score>=3){bias="BULLISH";v=1;}
if(score<=-3){bias="BEARISH";v=-1;}

p5.innerText=score;
arrow("a5",v);
n5.innerText=bias;

masterBox.innerText =
"MASTER DAILY BIAS: "+bias+" | SCORE: "+score;

}catch(e){
masterBox.innerText="Waiting For API...";
}
}

update();
setInterval(update,5000);

/* DAILY CHARTS */
setTimeout(function(){

new TradingView.widget({
container_id:"c1",
symbol:"CRYPTOCAP:USDT.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c2",
symbol:"BINANCE:ETHBTC",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c3",
symbol:"CRYPTOCAP:BTC.D",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

new TradingView.widget({
container_id:"c4",
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
theme:"dark",
style:"1",
autosize:true
});

},1200);
</script>

</body>
</html>
