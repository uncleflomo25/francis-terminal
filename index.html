<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>V900 DAILY TIMEFRAME ENGINE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#06111f;color:#d8e6ff;padding:14px}
h1{font-size:20px;color:#79c8ff;margin-bottom:12px}
.grid{
display:grid;
grid-template-columns:2fr 2fr 1fr;
gap:12px;
height:calc(100vh - 70px);
}
.panel{
background:#09192b;
border:1px solid #103558;
border-radius:10px;
padding:10px;
overflow:auto;
}
.title{
font-size:13px;
font-weight:700;
color:#8dbdff;
margin-bottom:8px;
text-transform:uppercase;
}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px;border-bottom:1px solid #102c47;text-align:left}
th{color:#7ea7d3;font-size:12px}
.up{color:#00e676;font-weight:700}
.down{color:#ff5a5a;font-weight:700}
.side{color:#ffd54f;font-weight:700}
.big{font-size:30px;font-weight:800;margin-bottom:6px}
.badge{
display:inline-block;
padding:6px 10px;
border-radius:8px;
font-weight:700;
margin-top:6px;
}
.green{background:#12351f;color:#00e676}
.red{background:#3c1515;color:#ff6b6b}
.yellow{background:#433a10;color:#ffd54f}
.feed{font-size:12px;line-height:1.7}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #102c47;padding:4px 0}
.small{font-size:12px;color:#7ea7d3}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.select{
background:#0b2238;
color:#fff;
border:1px solid #15456d;
padding:6px 10px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="topbar">
<h1>V900 DAILY TIMEFRAME INSTITUTIONAL ENGINE</h1>
<select class="select">
<option selected>1 Day</option>
</select>
</div>

<div class="grid">

<div class="panel">
<div class="title">Daily Candle Matrix (1D)</div>
<table>
<thead>
<tr>
<th>Asset</th>
<th>Open</th>
<th>Live</th>
<th>%</th>
<th>Bias</th>
</tr>
</thead>
<tbody id="assetRows"></tbody>
</table>
</div>

<div class="panel">
<div class="title">Daily Rotation Logic (1D)</div>
<table>
<thead>
<tr>
<th>Metric</th>
<th>Value</th>
<th>Bias</th>
<th>Meaning</th>
</tr>
</thead>
<tbody id="logicRows"></tbody>
</table>

<br>

<div class="title">Execution Board</div>
<table>
<thead>
<tr>
<th>Market</th>
<th>Signal</th>
<th>Status</th>
</tr>
</thead>
<tbody id="execRows"></tbody>
</table>
</div>

<div class="panel">
<div class="title">AI Regime Engine</div>
<div id="regime" class="big">LOADING...</div>
<div id="desc" class="small"></div>
<div id="signal"></div>

<br><br>

<div class="title">Live Feed (1D)</div>
<div class="feed" id="feed"></div>
</div>

</div>

<script>
const assets=["BTCUSDT","ETHUSDT","ETHBTC"];
let synth={BTCD:60.42,ETHD:10.80,USDTD:5.06,TOTAL:3.24};

function bias(p){
if(p>1.2)return["▲▲ STRONG UP","up"];
if(p>0.15)return["▲ UP","up"];
if(p<-1.2)return["▼▼ STRONG DOWN","down"];
if(p<-0.15)return["▼ DOWN","down"];
return["▶ SIDE","side"];
}

async function candle(sym){
let r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1d&limit=1`);
let d=await r.json();
return {open:+d[0][1],live:+d[0][4]};
}

function feed(txt){
let el=document.getElementById("feed");
let t=new Date().toLocaleTimeString();
el.innerHTML=`<div class='row'><span>${t}</span><span>${txt}</span></div>`+el.innerHTML;
}

async function run(){
try{
let out={},rows="";
for(let s of assets){
let x=await candle(s);
let p=((x.live-x.open)/x.open)*100;
let [txt,cls]=bias(p);
out[s]={...x,p,txt,cls};
rows+=`
<tr>
<td>${s}</td>
<td>${x.open.toFixed(s==="ETHBTC"?5:2)}</td>
<td>${x.live.toFixed(s==="ETHBTC"?5:2)}</td>
<td class="${cls}">${p.toFixed(2)}%</td>
<td class="${cls}">${txt}</td>
</tr>`;
}
document.getElementById("assetRows").innerHTML=rows;

/* logic rows fixed to daily */
let logicData=[
["BTC.D",synth.BTCD.toFixed(2)+"%"],
["ETH.D",synth.ETHD.toFixed(2)+"%"],
["USDT.D",synth.USDTD.toFixed(2)+"%"],
["TOTAL",synth.TOTAL.toFixed(2)+"T"]
];

let lr="";
logicData.forEach(v=>{
let n=(Math.random()-.5)*2;
let [txt,cls]=bias(n);
lr+=`
<tr>
<td>${v[0]}</td>
<td>${v[1]}</td>
<td class="${cls}">${txt}</td>
<td>${v[0]} daily candle</td>
</tr>`;
});
document.getElementById("logicRows").innerHTML=lr;

/* regime */
let regime="SIDEWAYS";
let desc="Mixed daily candles";
let color="yellow";
let sig="WAIT";

if(out.BTCUSDT.p<0 && out.ETHUSDT.p<0){
regime="RISK OFF TODAY";
desc="Both majors red on daily candle";
color="red";
sig="REDUCE RISK";
}
if(out.BTCUSDT.p>0 && out.ETHBTC.p<0){
regime="BTC SEASON TODAY";
desc="BTC stronger than ETH on daily candle";
color="green";
sig="BUY BTC";
}
if(out.ETHUSDT.p>0 && out.ETHBTC.p>0){
regime="ETH ROTATION TODAY";
desc="ETH leading on daily candle";
color="green";
sig="BUY ETH";
}

document.getElementById("regime").textContent=regime;
document.getElementById("desc").textContent=desc;
document.getElementById("signal").innerHTML=`<span class="badge ${color}">${sig}</span>`;

document.getElementById("execRows").innerHTML=`
<tr><td>BTCUSDT</td><td>${out.BTCUSDT.p>0?'LONG':'SHORT'}</td><td class="${out.BTCUSDT.cls}">${out.BTCUSDT.txt}</td></tr>
<tr><td>ETHUSDT</td><td>${out.ETHUSDT.p>0?'LONG':'SHORT'}</td><td class="${out.ETHUSDT.cls}">${out.ETHUSDT.txt}</td></tr>
<tr><td>ETHBTC</td><td>${out.ETHBTC.p>0?'LONG ETH':'LONG BTC'}</td><td class="${out.ETHBTC.cls}">${out.ETHBTC.txt}</td></tr>
`;

feed(regime);

}catch(e){
document.getElementById("regime").textContent="API ERROR";
document.getElementById("desc").textContent="Retrying Binance daily feed...";
}
}

run();
setInterval(run,10000);
</script>
</body>
</html>
