<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SMART MONEY TERMINAL V9</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#e5e7eb}
header{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #1e293b}
.wrap{display:grid;grid-template-columns:260px 1fr 340px;gap:12px;padding:12px}
.panel{background:#07101d;border:1px solid #1e293b;border-radius:14px;padding:12px}
.title{font-size:13px;font-weight:700;margin:8px 0}
.big{font-size:22px;font-weight:800}
.tf{padding:6px 8px;margin:2px;background:#0f172a;border-radius:6px;cursor:pointer;font-size:12px;}
.tf.active{background:#1d4ed8}
.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#eab308}
.purple{color:#a855f7}
.signal{font-size:28px;text-align:center;padding:10px}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table td{padding:4px;border-bottom:1px solid #132033;position:relative}
.heat{display:grid;grid-template-columns:repeat(20,1fr);gap:2px}
.heat div{height:14px}
.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<header>
<div>SMART MONEY TERMINAL V9</div>
<div id="status" class="yellow">CONNECTING...</div>
</header>

<div class="wrap">

<!-- LEFT -->
<div class="panel">

<div class="title">Regime</div>
<div class="big yellow" id="regime">-</div>

<div class="title">Timeframes</div>
<span class="tf active" onclick="setTF('1m',this)">1m</span>
<span class="tf" onclick="setTF('5m',this)">5m</span>
<span class="tf" onclick="setTF('15m',this)">15m</span>
<span class="tf" onclick="setTF('1h',this)">1H</span>
<span class="tf" onclick="setTF('4h',this)">4H</span>
<span class="tf" onclick="setTF('1d',this)">1D</span>

<div class="title">Price</div>
<div class="big" id="price">0</div>

<div class="title">CVD</div>
<div class="big yellow" id="cvd">0</div>

<div class="title">Delta</div>
<div class="big" id="delta">0</div>

<div class="title">Buy / Sell</div>
<div class="green big" id="buy">0</div>
<div class="red big" id="sell">0</div>

</div>

<!-- CENTER -->
<div class="panel">

<div class="title">Footprint (Clustered + Profile)</div>
<table class="table" id="tbl"></table>

<div class="title">Heatmap</div>
<div class="heat" id="heat"></div>

</div>

<!-- RIGHT -->
<div class="panel">

<div class="title">Signal</div>
<div class="signal yellow" id="signal">WAIT</div>

<div class="title">Rotation</div>
<div class="big" id="rotation">-</div>

<div class="title">Strength</div>
<div class="big" id="rotStr">-</div>

<div class="title">Bias</div>
<div class="big" id="bias">-</div>

<div class="title">Reason</div>
<div class="small" id="why">-</div>

</div>

</div>

<script>

/* CONFIG */
const CLUSTER_SIZE = 5;
let tf='1m';
const tfSec={'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400};

/* STATE */
let trades=[];
let lastPrice=0;
let cvd=0;

let btcPrice=0, ethPrice=0;
let prevBTC=0, prevETH=0;

let rotation="NEUTRAL";
let rotationStrength="WEAK";
let regime="NEUTRAL";

/* REGIME */
async function updateRegime(){
 try{
  const r=await fetch("https://api.coingecko.com/api/v3/global");
  const d=await r.json();

  let btcDom=d.data.market_cap_percentage.btc;
  let usdtDom=d.data.market_cap_percentage.usdt||0;

  if(usdtDom>6) regime="RISK-OFF";
  else if(btcDom>52) regime="BTC-LED";
  else regime="ALT";

  document.getElementById("regime").innerText=regime;
 }catch(e){}
}
setInterval(updateRegime,15000);
updateRegime();

/* WS */
let ws=new WebSocket("wss://stream.binance.com:9443/stream?streams=btcusdt@aggTrade/ethusdt@aggTrade");

ws.onopen=()=>{
 document.getElementById("status").innerText="LIVE";
 document.getElementById("status").className="green";
};

ws.onmessage=(m)=>{
 let msg=JSON.parse(m.data);
 let t=msg.data;

 let price=parseFloat(t.p);
 let qty=parseFloat(t.q);
 let sell=t.m;

 if(msg.stream.includes("btcusdt")){
  btcPrice=price;
  lastPrice=price;
  cvd += sell?-qty:qty;

  trades.push({
    time:Date.now()/1000,
    price,qty,
    side:sell?'sell':'buy'
  });
 }

 if(msg.stream.includes("ethusdt")){
  ethPrice=price;
 }

 updateRotation();
 update();
};

/* ROTATION */
function updateRotation(){

 if(!prevBTC || !prevETH){
  prevBTC=btcPrice;
  prevETH=ethPrice;
  return;
 }

 let btcMove=(btcPrice-prevBTC)/prevBTC;
 let ethMove=(ethPrice-prevETH)/prevETH;

 let diff=ethMove-btcMove;

 rotation = diff>0 ? "ALT" : "BTC";

 let s=Math.abs(diff);
 if(s>0.004) rotationStrength="STRONG";
 else if(s>0.002) rotationStrength="MEDIUM";
 else rotationStrength="WEAK";

 prevBTC=btcPrice;
 prevETH=ethPrice;
}

/* BUILD CLUSTERED */
function build(){

 let cut = Date.now()/1000 - tfSec[tf];

 let buy=0,sell=0;
 let ladder={};

 trades = trades.filter(t=>t.time>=cut);

 for(let t of trades){

  let cluster = Math.round(t.price/CLUSTER_SIZE)*CLUSTER_SIZE;

  if(!ladder[cluster]) ladder[cluster]={buy:0,sell:0};

  if(t.side==="buy"){
    ladder[cluster].buy+=t.qty;
    buy+=t.qty;
  } else {
    ladder[cluster].sell+=t.qty;
    sell+=t.qty;
  }
 }

 return {ladder,buy,sell,delta:buy-sell};
}

/* SIGNAL */
function signal(delta,buy,sell){

 let total=buy+sell;

 if(regime==="RISK-OFF") return ["SHORT","risk off","red"];

 if(rotation==="BTC" && delta>total*0.15)
  return ["LONG","btc strength","green"];

 if(rotation==="ALT" && rotationStrength==="STRONG")
  return ["NO TRADE","alt rotation","purple"];

 return ["WAIT","no edge","yellow"];
}

/* UPDATE */
function update(){

 let {ladder,buy,sell,delta}=build();

 document.getElementById("price").innerText=lastPrice.toFixed(2);
 document.getElementById("cvd").innerText=cvd.toFixed(2);
 document.getElementById("buy").innerText=buy.toFixed(2);
 document.getElementById("sell").innerText=sell.toFixed(2);
 document.getElementById("delta").innerText=delta.toFixed(2);

 let [s,w,c]=signal(delta,buy,sell);

 let el=document.getElementById("signal");
 el.innerText=s;
 el.className="signal "+c;

 document.getElementById("why").innerText=w;
 document.getElementById("rotation").innerText=rotation;
 document.getElementById("rotStr").innerText=rotationStrength;
 document.getElementById("bias").innerText=s;

 /* FOOTPRINT */

 let maxVol=0;
 Object.values(ladder).forEach(v=>{
  let t=v.buy+v.sell;
  if(t>maxVol) maxVol=t;
 });

 let html="";

 Object.keys(ladder).sort((a,b)=>b-a).slice(0,20).forEach(p=>{

  let b=ladder[p].buy;
  let s=ladder[p].sell;
  let total=b+s;
  let d=b-s;

  let volWidth = maxVol ? (total/maxVol)*100 : 0;
  let intensity = total ? Math.min(Math.abs(d)/total,1) : 0;

  html+=`
  <tr>
   <td>${p}</td>

   <td class="green">${b.toFixed(2)}</td>
   <td class="red">${s.toFixed(2)}</td>

   <td>
     <div style="
      position:absolute;
      left:0;top:0;height:100%;
      width:${volWidth}%;
      background:rgba(59,130,246,0.25);
     "></div>

     <span class="${d>0?'green':'red'}">${d.toFixed(2)}</span>
   </td>

   <td>
     <div style="
      height:6px;
      background:${d>0
        ? `rgba(34,197,94,${intensity})`
        : `rgba(239,68,68,${intensity})`
      };
     "></div>
   </td>

  </tr>`;
 });

 document.getElementById("tbl").innerHTML=html;

 /* HEATMAP */
 let heat=document.getElementById("heat");
 heat.innerHTML="";

 for(let i=0;i<20;i++){
  let d=document.createElement("div");
  let inten=Math.min(Math.abs(delta)/60,1);

  d.style.background = delta>0
   ? `rgba(34,197,94,${inten})`
   : `rgba(239,68,68,${inten})`;

  heat.appendChild(d);
 }

}

/* TF */
function setTF(x,el){
 tf=x;
 document.querySelectorAll(".tf").forEach(e=>e.classList.remove("active"));
 el.classList.add("active");
}

</script>

</body>
</html>
